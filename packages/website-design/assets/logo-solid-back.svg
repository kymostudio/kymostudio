<!-- kymo mark — solid black, tile-less. The node-graph K in black (#0A0A0F) on a
     transparent background: three round-capped strokes + six node handles kept as
     rings (black outer r5.8 + white core r2.44, so the donut reads on light
     surfaces). For stamping on light surfaces and single-colour print. Pairs with
     logo-black.svg (the badge). -->
<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <g transform="translate(50 50) scale(0.98) translate(-50 -50)">
    <line x1="33" y1="26.5" x2="33" y2="73.5" stroke="#0A0A0F" stroke-width="11.5" stroke-linecap="round"/>
    <line x1="65.5" y1="27" x2="34" y2="58.5" stroke="#0A0A0F" stroke-width="11.5" stroke-linecap="round"/>
    <line x1="48" y1="49.5" x2="67" y2="73" stroke="#0A0A0F" stroke-width="11.5" stroke-linecap="round"/>
    <circle cx="33" cy="26.5" r="5.8" fill="#0A0A0F"/>
    <circle cx="33" cy="26.5" r="2.44" fill="#fff"/>
    <circle cx="65.5" cy="27" r="5.8" fill="#0A0A0F"/>
    <circle cx="65.5" cy="27" r="2.44" fill="#fff"/>
    <circle cx="33" cy="73.5" r="5.8" fill="#0A0A0F"/>
    <circle cx="33" cy="73.5" r="2.44" fill="#fff"/>
    <circle cx="34" cy="58.5" r="5.8" fill="#0A0A0F"/>
    <circle cx="34" cy="58.5" r="2.44" fill="#fff"/>
    <circle cx="48" cy="49.5" r="5.8" fill="#0A0A0F"/>
    <circle cx="48" cy="49.5" r="2.44" fill="#fff"/>
    <circle cx="67" cy="73" r="5.8" fill="#0A0A0F"/>
    <circle cx="67" cy="73" r="2.44" fill="#fff"/>
  </g>
</svg>
