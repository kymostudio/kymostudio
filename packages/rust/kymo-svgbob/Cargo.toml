[package]
name = "kymo-svgbob"
version = "0.1.0"
edition = "2021"
rust-version = "1.74"
license = "Apache-2.0"
description = "svgbob (ASCII art -> SVG) compiled to wasm for the render-api worker."
repository = "https://github.com/kymostudio/kymostudio"

# cdylib -> wasm-bindgen; built only for wasm32 by deploy-render-api.yml.
[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
svgbob = "0.7"
wasm-bindgen = "0.2"

[profile.release]
opt-level = "z"
lto = true
strip = true

# Deterministic builds: same reasoning as kymostudio-core (pinned wasm-opt
# is flaky across hosts).
[package.metadata.wasm-pack.profile.release]
wasm-opt = false
