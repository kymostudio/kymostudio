# kymo-tex — kymo's own LaTeX-math → SVG renderer.
#
# A pruned fork of RaTeX (https://github.com/erweixin/RaTeX, MIT), vendored as
# the basis for kymo's pixel-faithful KaTeX renderer. Only the SVG-rendering
# core is kept (lexer · parser · layout · font · svg + KaTeX font embedding);
# the upstream cairo/gtk4/ffi/pdf/wasm/render platform crates are dropped — kymo
# wraps this from `kymostudio-core`. Upstream crates were renamed `ratex-*` →
# `kymo-*`; see NOTICE for the fork provenance + upstream attribution.
[workspace]
resolver = "2"
members = [
    "crates/kymo-tex-types",
    "crates/kymo-tex-font",
    "crates/kymo-tex-lexer",
    "crates/kymo-tex-parser",
    "crates/kymo-tex-layout",
    "crates/kymo-tex-katex-fonts",
    "crates/kymo-tex-font-loader",
    "crates/kymo-tex-unicode-font",
    "crates/kymo-tex-svg",
]

[workspace.package]
version = "0.1.11"
edition = "2021"
license = "MIT"
repository = "https://github.com/kymostudio/kymostudio"
homepage = "https://kymo.studio"
documentation = "https://github.com/kymostudio/kymostudio"

[workspace.dependencies]
kymo-tex-types  = { path = "crates/kymo-tex-types", version = "0.1.11" }
kymo-tex-font   = { path = "crates/kymo-tex-font", version = "0.1.11" }
kymo-tex-lexer  = { path = "crates/kymo-tex-lexer", version = "0.1.11" }
kymo-tex-parser = { path = "crates/kymo-tex-parser", version = "0.1.11" }
kymo-tex-layout = { path = "crates/kymo-tex-layout", version = "0.1.11" }
kymo-tex-katex-fonts = { path = "crates/kymo-tex-katex-fonts", version = "0.1.11" }
kymo-tex-font-loader = { path = "crates/kymo-tex-font-loader", version = "0.1.11" }
kymo-tex-unicode-font = { path = "crates/kymo-tex-unicode-font", version = "0.1.11" }
kymo-tex-svg    = { path = "crates/kymo-tex-svg", version = "0.1.11" }

phf        = { version = "0.11", features = ["macros"] }
thiserror  = "1.0"
serde      = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[profile.release]
lto = true
codegen-units = 1
strip = "symbols"
