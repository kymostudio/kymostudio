[package]
name = "kymostudio"
version = "0.4.8"
edition = "2021"
rust-version = "1.74"
description = "Prompt it. See it appear. Watch it animate."
license = "Apache-2.0"
repository = "https://github.com/kymostudio/kymostudio"
homepage = "https://github.com/kymostudio/kymostudio"
readme = "README.md"
keywords = ["svg", "png", "rasterizer", "diagram", "cli"]
categories = ["command-line-utilities", "multimedia::images"]

# The `kymo` CLI. The rasterization engine lives in kymostudio-core; this crate
# is a thin command-line front-end over `kymostudio_core::svg_to_png`.
[[bin]]
name = "kymo"
path = "src/main.rs"

[dependencies]
# Dependency convention (see docs/RELEASING.md): caret-pinned to the current MINOR
# series of kymostudio-core, NOT lockstep-bumped per patch. `^0.4` = >=0.4.0,
# <0.5.0 — the CLI uses the 0.4 core (it calls `svg_to_pdf`). `path` is for local
# dev (so CI builds against this repo's core); `version` is what crates.io
# resolves against — `release-crate.yml` publishes the core first, then this CLI
# with retry while the new core indexes.
kymostudio-core = { path = "../kymostudio-core", version = "0.4" }

[profile.release]
opt-level = 3
lto = true
strip = true

# cargo-dist (`dist`) builds release binaries with `--profile dist`; it must
# exist or `dist build` fails with "profile `dist` is not defined". Inherit the
# tuned release profile above (opt-level 3 + LTO + strip). See dist-workspace.toml.
[profile.dist]
inherits = "release"
