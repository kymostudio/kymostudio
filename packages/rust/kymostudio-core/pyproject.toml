[build-system]
requires = ["maturin>=1.7,<2"]
build-backend = "maturin"

[project]
name = "kymostudio-core"
# Version is sourced from Cargo.toml `[package] version` (maturin reads it when
# `version` is declared dynamic) — ONE source of truth, kept in monorepo lockstep
# by /kymo-bump. A static version here previously pinned the wheel to 0.3.3 while
# Cargo moved on, so PyPI stayed stuck at 0.3.3.
dynamic = ["version"]
description = "Prompt it. See it appear. Watch it animate. (Core)"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.10"
authors = [{ name = "rain1024", email = "anhv.ict91@gmail.com" }]
keywords = ["svg", "png", "rasterizer", "diagram", "resvg"]
classifiers = [
    "Programming Language :: Rust",
    "Programming Language :: Python :: 3",
    "Topic :: Multimedia :: Graphics",
]

[project.urls]
Homepage = "https://github.com/kymostudio/kymostudio"
Repository = "https://github.com/kymostudio/kymostudio"

[tool.maturin]
# Build the `python` feature; ship a single abi3 wheel (cp310-abi3).
features = ["python"]
module-name = "_kymostudio_core"
