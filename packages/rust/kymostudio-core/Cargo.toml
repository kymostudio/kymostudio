[package]
name = "kymostudio-core"
version = "0.3.6"
edition = "2021"
rust-version = "1.74"
description = "Type it. See it appear. Watch it animate. (Core)"
license = "Apache-2.0"
repository = "https://github.com/kymostudio/kymostudio"
homepage = "https://github.com/kymostudio/kymostudio"
readme = "README.md"
keywords = ["svg", "png", "rasterizer", "diagram", "resvg"]
categories = ["multimedia::images", "wasm"]

# rlib -> the `kymostudio` CLI crate + tests; cdylib -> Python (pyo3) and wasm
# (wasm-bindgen). The `kymo` binary lives in the sibling `kymostudio` crate.
[lib]
name = "kymostudio_core"
path = "src/lib.rs"
crate-type = ["rlib", "cdylib"]

[dependencies]
# Core SVG engine. system-fonts + memmap-fonts pull in fs/mmap (no good on
# wasm) so they live behind the `system-fonts` feature, OFF for the wasm build.
resvg = { version = "0.47", default-features = false, features = ["text", "raster-images"] }

# Binding deps — each pulled in only by its feature.
pyo3 = { version = "0.28", features = ["extension-module", "abi3-py310"], optional = true }
wasm-bindgen = { version = "0.2", optional = true }

# BPMN stack deps — pure logic (no resvg), pulled in only by the `bpmn` feature.
# roxmltree: read-only DOM whose tag_name().name() yields the *local* name, so the
# importer is namespace-agnostic exactly like Python's `_local()`. serde_json: the
# canonical model JSON the cross-language conformance suite compares against.
roxmltree = { version = "0.20", optional = true }
serde_json = { version = "1", optional = true }

[dev-dependencies]
# Used by tests/bpmn_conformance.rs to load + compare the shared golden JSON.
serde_json = "1"
# sha256 for the full-corpus SVG-render hash comparison (vs conformance/golden/bpmn_svg.json).
sha2 = "0.10"

[features]
# Native builds (CLI, tests, Python wheel) load system fonts so <text> renders.
default = ["system-fonts"]
system-fonts = ["resvg/system-fonts", "resvg/memmap-fonts"]

# Python extension module (maturin builds the cdylib with this on). Includes the
# BPMN stack so the `_kymostudio_core` wheel exposes bpmn_import/export/etc.
python = ["dep:pyo3", "system-fonts", "bpmn"]

# wasm (browser + Node) — deliberately NO system-fonts (no fs/mmap on wasm).
# BPMN is NOT in the wasm build yet (the JS library still has its own port); it
# joins when the JS delegation lands, to keep the wasm bundle lean until then.
wasm = ["dep:wasm-bindgen"]

# BPMN import/export/layout/shapes — the single-source-of-truth stack. On for
# native builds + the Python wheel; validated by tests/bpmn_conformance.rs against
# the shared conformance/golden/ JSON. Pure Rust (no resvg dependency).
bpmn = ["dep:roxmltree", "dep:serde_json"]

[profile.release]
opt-level = 3
lto = true
strip = true

# wasm-pack post-processing. wasm-opt is disabled for deterministic builds
# across environments (the prebuilt binary is flaky on some hosts); re-enable
# once a pinned wasm-opt is wired into CI to shrink the ~2.4 MB module.
[package.metadata.wasm-pack.profile.release]
wasm-opt = false
