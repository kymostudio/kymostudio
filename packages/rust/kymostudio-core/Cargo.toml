[package]
name = "kymostudio-core"
version = "0.4.6"
edition = "2021"
rust-version = "1.74"
description = "Prompt it. See it appear. Watch it animate. (Core)"
license = "Apache-2.0"
repository = "https://github.com/kymostudio/kymostudio"
homepage = "https://github.com/kymostudio/kymostudio"
readme = "README.md"
keywords = ["svg", "png", "rasterizer", "diagram", "resvg"]
categories = ["multimedia::images", "wasm"]

# rlib -> the `kymostudio` CLI crate + tests; cdylib -> Python (pyo3) and wasm
# (wasm-bindgen). The `kymo` binary lives in the sibling `kymostudio` crate.
[lib]
name = "kymostudio_core"
path = "src/lib.rs"
# rlib -> CLI crate + tests; cdylib -> Python (pyo3), wasm (wasm-bindgen), and
# the Android JNI .so (uniffi); staticlib -> the iOS .xcframework (uniffi).
crate-type = ["rlib", "cdylib", "staticlib"]

# Bindings generator for the native mobile build (uniffi proc-macro `--library`
# mode reads metadata from the compiled lib). Only built with the `mobile` feature.
[[bin]]
name = "uniffi-bindgen"
path = "src/bin/uniffi_bindgen.rs"
required-features = ["mobile"]

[dependencies]
# Core SVG engine. system-fonts + memmap-fonts pull in fs/mmap (no good on
# wasm) so they live behind the `system-fonts` feature, OFF for the wasm build.
resvg = { version = "0.47", default-features = false, features = ["text", "raster-images"] }

# Vector SVG→PDF. Brings its OWN usvg/resvg (0.45) — it can't share our resvg
# 0.47's usvg, so the PDF path parses with `svg2pdf::usvg` and the two engines
# coexist. A second SVG engine would ~double the wasm bundle, so this lives
# behind the `pdf` feature (ON for native/python, OFF for wasm).
svg2pdf = { version = "0.13", optional = true }

# Binding deps — each pulled in only by its feature.
pyo3 = { version = "0.28", features = ["extension-module", "abi3-py310"], optional = true }
wasm-bindgen = { version = "0.2", optional = true }

# BPMN stack deps — pure logic (no resvg), pulled in only by the `bpmn` feature.
# roxmltree: read-only DOM whose tag_name().name() yields the *local* name, so the
# importer is namespace-agnostic exactly like Python's `_local()`. serde_json: the
# canonical model JSON the cross-language conformance suite compares against.
roxmltree = { version = "0.20", optional = true }
serde_json = { version = "1", optional = true }
dagre = "0.1.1"
merman-core = { git = "https://github.com/Latias94/merman", rev = "89641493dc9bd72d2e9d8a22ebd0fc7c7c8294a3", default-features = false, optional = true }
ttf-parser = "0.25"
merman-render = { git = "https://github.com/Latias94/merman", rev = "89641493dc9bd72d2e9d8a22ebd0fc7c7c8294a3", default-features = false, optional = true }

# `.kymo` DSL front-end dep — pulled in only by the `kymo` feature (native
# mobile/CLI). The wasm (JS) and Python wheels DON'T enable `kymo`: each has its
# own native `.kymo` parser (dsl.ts / dsl.py), so regex stays out of those
# artifacts. The mobile build needs a Rust-side parser, where regex keeps the
# port near 1:1 with `dsl.py` and off the binary-size-critical wasm path.
regex = { version = "1", optional = true }

# Native mobile FFI (Kotlin + Swift bindings via uniffi proc-macro). Only pulled
# in by the `mobile` feature; the `cli` feature lets the `uniffi-bindgen` bin run.
uniffi = { version = "0.28", features = ["cli"], optional = true }

[dev-dependencies]
# Used by tests/bpmn_conformance.rs to load + compare the shared golden JSON.
serde_json = "1"
# sha256 for the full-corpus SVG-render hash comparison (vs conformance/golden/bpmn_svg.json).
sha2 = "0.10"
# tests/sequence_gaphor.rs parses the emitted .gaphor XML to assert every
# <ref refid> resolves to an element id (a dangling ref fails Gaphor's loader).
roxmltree = "0.20"

[features]
# Native builds (CLI, tests, Python wheel) load system fonts so <text> renders,
# and ship vector PDF output.
default = ["system-fonts", "pdf"]

# Opt-in: route flowchart layout through merman (the mermaid Rust port) sized by
# kymo's browser-calibrated metrics, rendered raster-safe by kymo. Matches
# mermaid.js far more tightly (median ~0.7% vs ~2.6%) at the cost of ~1.9 MB wasm.
merman-layout = ["dep:merman-core", "dep:merman-render", "dep:serde_json"]
system-fonts = ["resvg/system-fonts", "resvg/memmap-fonts"]

# Vector SVG→PDF via svg2pdf (native only — see the dep note above).
pdf = ["dep:svg2pdf"]

# Python extension module (maturin builds the cdylib with this on). Includes vector
# PDF and the BPMN stack, so the `_kymostudio_core` wheel exposes svg_to_pdf plus
# bpmn_import/bpmn_layout/bpmn_to_svg.
python = ["dep:pyo3", "system-fonts", "pdf", "bpmn"]

# wasm (browser + Node) — NO system-fonts (no fs/mmap on wasm), and NO pdf by
# default: svgToPng/svgToPdf live behind the `pdf` feature, which drags resvg's
# rasterizer plus a second SVG engine (svg2pdf's usvg 0.45) into the module —
# measured 2026-06-12: 6.1 MB raw / 1.4 MB brotli with them, 0.9 MB / 0.2 MB
# without. The published npm/vscode artifacts build `--features wasm,pdf` so the
# JS CLI keeps SVG→PDF/PNG parity with Python/Rust; the editor builds plain
# `wasm` and ships the lean module (its PNG export rasterizes via canvas).
# Includes bpmn so the JS library delegates BPMN import/export/layout/render to
# this one source of truth (adds roxmltree + serde_json, ~+100KB).
wasm = ["dep:wasm-bindgen", "bpmn"]

# BPMN import/export/layout/shapes — the single-source-of-truth stack. On for
# native builds + the Python wheel; validated by tests/bpmn_conformance.rs against
# the shared conformance/golden/ JSON. Pure Rust (no resvg dependency).
bpmn = ["dep:roxmltree", "dep:serde_json"]

# `.kymo` DSL front-end (parser + layout + alignment + rich SVG renderer) — the
# Rust port of packages/python/src/kymo. Native/mobile only; NOT enabled for the
# wasm/python artifacts (they have their own `.kymo` impl). Brings in `regex`.
# Also gates the headless `editor::EditorSession`.
kymo = ["dep:regex"]

# Native mobile bindings — the uniffi FFI surface (src/ffi.rs) over the editor
# session, generating Kotlin (Android .so) + Swift (iOS .xcframework). Implies
# `kymo` (the engine + editor). NO pdf / NO system-fonts (mobile registers a
# bundled font at startup); render_png uses resvg's rasterizer (always on).
mobile = ["kymo", "dep:uniffi"]

[profile.release]
opt-level = 3
lto = true
strip = true

# wasm-pack post-processing. wasm-opt is disabled for deterministic builds
# across environments (the prebuilt binary is flaky on some hosts); re-enable
# once a pinned wasm-opt is wired into CI to shrink the ~2.4 MB module.
[package.metadata.wasm-pack.profile.release]
wasm-opt = false
