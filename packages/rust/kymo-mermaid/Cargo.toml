[package]
name = "kymo-mermaid"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
description = "Pure-Rust Mermaid engine: parse + raster-safe SVG for every grammar (flowchart/sequence/class/state/er/block/mindmap/kanban/requirement) with native KaTeX math — no merman, no JS."

# cdylib -> wasm (the editor + render-api load this); rlib -> native tests.
[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
# The shared diagram substrate (Flowchart IR + layout + raster-safe SVG renderer
# + d2/dot/drawio/kymojson). kymo's OWN mermaid engine (default) builds on this
# alone — no merman, no git dep — so the lean editor path stays small.
kymo-graph = { path = "../kymo-graph", version = "0.1.0" }
kymo-layout = { path = "../kymo-layout", version = "0.1.0" }

wasm-bindgen = { version = "0.2", optional = true }

# `math` feature: kymo-tex draws `$$…$$` as KaTeX glyph outlines (ttf-parser reads
# KaTeX's own fonts via kymo-svg) — pure Rust, no merman. On by default; opt out
# (`default-features = false`) for the leanest build (math falls back to Unicode).
kymo-types = { path = "../kymo-tex/crates/kymo-types", optional = true }
kymo-parser = { path = "../kymo-tex/crates/kymo-parser", optional = true }
kymo-tex-layout = { path = "../kymo-tex/crates/kymo-tex-layout", optional = true }
kymo-svg = { path = "../kymo-tex/crates/kymo-svg", default-features = false, features = ["standalone", "embed-fonts"], optional = true }

[features]
default = ["math"]
wasm = ["dep:wasm-bindgen"]

# Native KaTeX `$$…$$` glyph rendering via kymo-tex (pure Rust). The flowchart
# renderer sizes math nodes by their glyph box and draws raster-safe outlines.
math = ["dep:kymo-types", "dep:kymo-parser", "dep:kymo-tex-layout", "dep:kymo-svg"]

[profile.release]
opt-level = "z"
lto = true
strip = true
codegen-units = 1

# Same call as kymostudio-core: wasm-opt -Oz shrinks raw size but makes the
# brotli wire size WORSE (measured 2026-06-12) — keep builds deterministic.
[package.metadata.wasm-pack.profile.release]
wasm-opt = false
