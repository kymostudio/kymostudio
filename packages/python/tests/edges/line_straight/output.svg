<?xml version="1.0" encoding="UTF-8"?><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 336 224"
width="336" height="224"
style="max-width: 100%; height: auto"
font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"><style> text { fill: #1f2937; }
.bg-grid { fill: url(#dot-grid); }
.region-rect {
fill: rgba(15, 23, 42, 0.02);
stroke: #232f3e; /* AWS navy — admin boundary */
stroke-width: 1.5;
stroke-dasharray: 6 5;
}
.region-rect--inner {
fill: rgba(124, 58, 237, 0.03);
stroke: #7c3aed; /* purple — logical subgroup */
stroke-width: 1.4;
stroke-dasharray: 4 4;
}
.region-rect--cluster {
fill: #eaf3ff; /* light-blue solid (mingrammer cluster look) */
stroke: #b8d0ee;
stroke-width: 1.2;
stroke-dasharray: none;
}
.region-label {
font-size: 13px; font-weight: 700; fill: #232f3e; letter-spacing: 0.06em;
text-transform: uppercase;
paint-order: stroke; stroke: #fafafa; stroke-width: 4; stroke-linejoin: round;
}
.region-label--inner { fill: #6d28d9; }
.region-label--cluster {
fill: #475569; font-size: 11px; letter-spacing: 0.02em;
text-transform: none; font-weight: 500;
paint-order: stroke; stroke: #eaf3ff; stroke-width: 3;
}
.component-name { font-size: 14px; font-weight: 700; text-anchor: middle; fill: #0f172a; }
.component-sub { font-size: 11.5px; font-weight: 400; text-anchor: middle; fill: #64748b; }
.diagram-title { font-size: 20px; font-weight: 800; text-anchor: middle; fill: #0f172a; letter-spacing: 0.01em; }
.diagram-subtitle { font-size: 13px; font-weight: 400; text-anchor: middle; fill: #64748b; }
.icon-shadow { filter: url(#shadow); }
.edge-path {
fill: none;
stroke: #64748b;
stroke-width: 1.8;
stroke-linejoin: round;
stroke-linecap: round;
/* `filter: drop-shadow(...)` removed — rsvg-convert mis-renders the
first path under a drop-shadow filter (drops it entirely). The
shadow was barely visible anyway. */
}
.edge-path--orange { stroke: #ea580c; }
.edge-shadow {
fill: none;
stroke: rgba(15, 23, 42, 0.06);
stroke-width: 4.5;
stroke-linejoin: round;
stroke-linecap: round;
}
.edge-label {
font-size: 11.5px; font-weight: 500; fill: #334155; text-anchor: middle;
paint-order: stroke; stroke: #fafafa; stroke-width: 4; stroke-linejoin: round;
}
.edge-label--ext { fill: #c2410c; font-weight: 600; }
.edge-label--small { font-size: 10.5px; } </style><defs><!-- Open-V arrowheads: stroke-only, thinner, more elegant than filled triangles.
markerUnits=userSpaceOnUse keeps the stroke at the declared width
regardless of the path's own stroke-width. --><marker id="arrow-gray" viewBox="0 0 12 10" refX="11" refY="5"
markerWidth="11" markerHeight="11" orient="auto" markerUnits="userSpaceOnUse"><path d="M2,1 L11,5 L2,9" fill="none"
stroke="#64748b" stroke-width="1.6"
stroke-linecap="round" stroke-linejoin="round"/></marker><marker id="arrow-orange" viewBox="0 0 12 10" refX="11" refY="5"
markerWidth="11" markerHeight="11" orient="auto" markerUnits="userSpaceOnUse"><path d="M2,1 L11,5 L2,9" fill="none"
stroke="#ea580c" stroke-width="1.6"
stroke-linecap="round" stroke-linejoin="round"/></marker><!-- Soft drop shadow for icons --><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="2" flood-color="#0f172a" flood-opacity="0.18"/></filter><!-- Engineering-paper dot grid (very subtle) --><pattern id="dot-grid" width="24" height="24" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r="0.8" fill="#0f172a" fill-opacity="0.045"/></pattern><!-- Gradient highlight for cube faces (subtle, top→bottom darken) --><linearGradient id="g-face-front" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#82c70a"/><stop offset="100%" stop-color="#6ba600"/></linearGradient><linearGradient id="g-face-top" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#b7e756"/><stop offset="100%" stop-color="#a0d440"/></linearGradient><linearGradient id="g-face-side" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#588a00"/><stop offset="100%" stop-color="#446a00"/></linearGradient><linearGradient id="g-box-orange" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#f59e0b"/></linearGradient><linearGradient id="g-cyl-orange" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fb923c"/><stop offset="100%" stop-color="#ea7c1e"/></linearGradient><linearGradient id="g-user-blue" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#1d4ed8"/></linearGradient></defs><rect width="336" height="224" fill="#fafafa"/><rect width="336" height="224" class="bg-grid"/><!-- title block (top, fixed) --><!-- content (auto-translated down by title_block_h) --><!-- region rects --><!-- edges --><path class="edge-path" d="M 99,64 L 229,160" marker-end="url(#arrow-gray)"/><!-- components --><g transform="translate(64, 64)"><g class="icon-shadow"><polygon points="-30,-17 0,-32 30,-17 30,17 0,32 -30,17"
fill="#e9f5d0" stroke="#3d5d00" stroke-width="1.6"/><!-- head --><circle cx="0" cy="-7" r="6.5" fill="#76b900"/><!-- glasses: two dots + bridge --><circle cx="-2.5" cy="-7" r="1" fill="#e9f5d0"/><circle cx="2.5" cy="-7" r="1" fill="#e9f5d0"/><!-- body / shoulders --><path d="M -14,18 Q -14,4 0,4 Q 14,4 14,18 Z" fill="#76b900"/><!-- collar V --><path d="M -4,6 L 0,12 L 4,6" fill="#e9f5d0" stroke="none"/></g><text class="component-name" y="55" style="font-size:14px"></text><text class="component-sub" y="72"></text></g><g transform="translate(264, 160)"><g class="icon-shadow"><polygon points="-30,-17 0,-32 30,-17 30,17 0,32 -30,17"
fill="#e9f5d0" stroke="#3d5d00" stroke-width="1.6"/><!-- head --><circle cx="0" cy="-7" r="6.5" fill="#76b900"/><!-- glasses: two dots + bridge --><circle cx="-2.5" cy="-7" r="1" fill="#e9f5d0"/><circle cx="2.5" cy="-7" r="1" fill="#e9f5d0"/><!-- body / shoulders --><path d="M -14,18 Q -14,4 0,4 Q 14,4 14,18 Z" fill="#76b900"/><!-- collar V --><path d="M -4,6 L 0,12 L 4,6" fill="#e9f5d0" stroke="none"/></g><text class="component-name" y="55" style="font-size:14px"></text><text class="component-sub" y="72"></text></g><!-- region labels (drawn last so they sit on top of crossing arrows) --></svg>
