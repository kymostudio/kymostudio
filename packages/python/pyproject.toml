[project]
name = "kymostudio"
version = "0.4.0"
description = "Type it. See it appear. Watch it animate."
readme = "README.md"
license = "Apache-2.0"
license-files = ["LICENSE"]
requires-python = ">=3.10"
authors = [
    { name = "rain1024", email = "anhv.ict91@gmail.com" },
]
keywords = ["diagram", "diagram-as-code", "svg", "architecture", "dsl", "animation"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Topic :: Multimedia :: Graphics :: Presentation",
    "Topic :: Software Development :: Documentation",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]
dependencies = [
    # The shared resvg/svg2pdf engine (the `_kymostudio_core` extension module).
    # It is the sole runtime dependency: SVG→PNG rasterization for `kymo … out.png`
    # and the Excalidraw icon embedding, plus SVG→PDF (`svg_to_pdf`) for
    # `kymo … out.pdf` — matching the Rust CLI / JS wasm build.
    # Dependency convention (see docs/RELEASING.md): caret-pinned to current MINOR
    # series — `>=0.3,<0.4` ≡ Rust `^0.3` ≡ npm `^0.3`; the floor stays at an
    # already-published core and is raised to 0.4 by `/kymo-bump minor` at the
    # release that ships `svg_to_pdf` (PDF output requires that 0.4 core).
    "kymostudio-core>=0.3,<0.4",
]

[project.urls]
Homepage = "https://github.com/kymostudio/kymostudio"
Repository = "https://github.com/kymostudio/kymostudio"
Issues = "https://github.com/kymostudio/kymostudio/issues"

[project.optional-dependencies]
webp = ["pillow>=10.0"]

[project.scripts]
kymo = "kymo.cli:main"

[dependency-groups]
dev = [
    "pytest>=8.0",
    "ruff>=0.6",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff]
target-version = "py310"
line-length = 100

[tool.ruff.lint]
# pyflakes (F: undefined names, unused imports/vars) + pycodestyle (E) + isort (I).
select = ["E", "F", "I"]
# Not enforced — deliberate style in this codebase:
#   E501 line-length: dense SVG / BPMN-XML literals are intentionally long.
#   E701 compact one-line `if cond: stmt`: used for tabular min/max geometry.
ignore = ["E501", "E701"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kymo"]
