<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Kymostudio editor — guest · new diagram</title>
<meta name="description" content="Guest flow #2 — full-screen, format-first 'New diagram' chooser (Mermaid, PlantUML…) that opens a working starter in the editor. Pure HTML/CSS + vanilla JS." />
<style>
  :root{
    --bg:#ececec; --titlebar:#e9e9ea; --panel:#ffffff;
    --ink:#1c1c1e; --ink-soft:#3a3a3c; --muted:#8a8a8e; --muted2:#a9a9ad;
    --line:#e9e9ec; --hover:#f3f3f5;
    --navy:#242131; --accent:#3478f6;
    --green:#34c759; --green-ink:#1f9d4d; --teal-ink:#0e8aa0;
    --pink:#fde7ef; --pink-ink:#e0095f;
    --radius:12px;
    --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Monaco,Consolas,monospace;
    --font:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  [hidden]{display:none !important}
  html,body{height:100%;margin:0}
  body{font-family:var(--font);color:var(--ink);background:var(--panel);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  :focus-visible{outline:2px solid var(--accent);outline-offset:1px;border-radius:6px}

  /* =========================================================
     CHOOSER — full-screen, format-first "New diagram"
     ========================================================= */
  .chooser{position:fixed;inset:0;overflow:auto;display:grid;place-items:center;padding:clamp(16px,4vw,48px);
    background:radial-gradient(120% 90% at 50% -10%, #fff5f9 0%, #fbfbfc 46%, #f6f6f8 100%)}
  .ch-panel{width:100%;max-width:780px}
  .ch-head{text-align:center;margin-bottom:22px}
  .ch-logo{width:40px;height:40px;border-radius:12px;display:inline-block;box-shadow:0 4px 14px rgba(224,9,95,.28);margin-bottom:14px}
  .ch-head h1{margin:0 0 6px;font:800 25px var(--font);letter-spacing:-.02em;color:var(--ink)}
  .ch-head p{margin:0 auto;max-width:430px;font:500 13.5px var(--font);line-height:1.5;color:var(--muted)}
  .ch-fields{display:flex;gap:10px;margin-bottom:18px}
  .ch-field{display:flex;align-items:center;gap:9px;padding:0 13px;background:#fff;border:1px solid var(--line);border-radius:11px;box-shadow:0 1px 2px rgba(0,0,0,.04);transition:border-color .15s ease,box-shadow .15s ease}
  .ch-field svg{flex:none;width:16px;height:16px;color:var(--muted2)}
  .ch-field input{flex:1;min-width:0;padding:11px 0;border:0;outline:0;background:transparent;font:500 13.5px var(--font);color:var(--ink)}
  .ch-field input::placeholder{color:var(--muted2)}
  .ch-field:focus-within{border-color:var(--pink-ink);box-shadow:0 0 0 3px var(--pink)}
  .ch-field.name{flex:0 0 33%}
  .ch-field.search{flex:1}

  .ch-sec{font:700 11px var(--font);letter-spacing:.05em;text-transform:uppercase;color:var(--muted2);margin:0 2px 9px}
  .ch-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:22px}
  .fmt-card{display:flex;align-items:center;gap:13px;padding:13px 14px;text-align:left;background:#fff;border:1px solid var(--line);border-radius:14px;cursor:pointer;transition:border-color .14s ease,box-shadow .14s ease,transform .05s ease}
  .fmt-card:hover{border-color:var(--pink-ink);box-shadow:0 6px 20px -8px rgba(224,9,95,.3)}
  .fmt-card:active{transform:translateY(1px)}
  .fmt-ic{flex:none;width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;color:var(--ink-soft);background:#f4f4f6}
  .fmt-card:hover .fmt-ic{color:var(--pink-ink);background:var(--pink)}
  .fmt-ic svg{width:22px;height:22px}
  .fmt-tx{min-width:0;flex:1}
  .fmt-name{display:flex;align-items:center;gap:7px;font:700 14px var(--font);color:var(--ink)}
  .fmt-name .top{font:800 9px var(--font);letter-spacing:.04em;color:var(--pink-ink);background:var(--pink);padding:2px 6px;border-radius:5px}
  .fmt-sub{margin-top:2px;font:500 12px var(--font);color:var(--muted)}

  .ch-types{display:flex;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:24px}
  .ch-types .ch-sec{margin:0 4px 0 2px}
  .type-chip{display:inline-flex;align-items:center;gap:7px;padding:7px 13px;background:#fff;border:1px solid var(--line);border-radius:999px;font:600 12.5px var(--font);color:var(--ink-soft);cursor:pointer;transition:border-color .14s ease,color .14s ease}
  .type-chip:hover{border-color:var(--pink-ink);color:var(--pink-ink)}

  .ch-foot{text-align:center}
  .paste-link{display:inline-flex;align-items:center;gap:6px;font:600 13px var(--font);color:var(--accent);text-decoration:none;padding:6px 10px;border-radius:8px}
  .paste-link:hover{background:#eef4ff}
  .ch-empty{padding:26px;text-align:center;color:var(--muted2);font:500 13px var(--font)}

  /* =========================================================
     APP — the editor shell (revealed after a pick)
     ========================================================= */
  .window{width:100%;height:100%;background:var(--bg);overflow:hidden;display:flex;flex-direction:column}
  .titlebar{height:46px;flex:none;display:flex;align-items:center;gap:9px;padding:0 14px;background:var(--titlebar);border-bottom:.5px solid var(--line)}
  .tb-logo{width:20px;height:20px;border-radius:18%;display:block;flex:none;box-shadow:0 1px 2px rgba(0,0,0,.14)}
  .tabs{display:flex;align-items:center;gap:3px}
  .tab{height:26px;display:flex;align-items:center;gap:7px;padding:0 11px;border-radius:8px;font:600 12.5px var(--font);color:var(--muted);cursor:default;white-space:nowrap;border:0;background:transparent}
  .tab.active{background:#fff;color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.06),inset 0 0 0 .5px rgba(0,0,0,.07)}
  .tab .draft{width:7px;height:7px;border-radius:50%;background:#e0a23c;flex:none}
  .tab .ext{color:var(--muted);font-weight:600}
  .tb-plus{width:25px;height:25px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--muted2);border:0;background:transparent;cursor:pointer}
  .tb-plus:hover{background:rgba(0,0,0,.05)}
  .tb-plus svg{width:16px;height:16px}
  .tb-right{margin-left:auto;display:flex;align-items:center;gap:6px}
  .signin{display:flex;align-items:center;gap:7px;height:28px;padding:0 13px 0 10px;border-radius:8px;border:.5px solid #dcdce0;background:#fff;color:var(--ink);font:600 12.5px var(--font);cursor:pointer;box-shadow:0 1px 2px rgba(0,0,0,.05)}
  .signin:hover{background:#fafafa;border-color:#cfcfd4}
  .signin svg{width:15px;height:15px}
  .iconbtn{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#6f6f74;border:0;background:transparent;cursor:pointer}
  .iconbtn:hover{background:rgba(0,0,0,.05);color:var(--ink-soft)}
  .iconbtn svg{width:16px;height:16px}

  .body{display:flex;flex:1;min-height:0;overflow:hidden}
  .rail{width:48px;flex:none;background:#f1f1f3;border-right:.5px solid var(--line);display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 0}
  .railbtn{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:#80808a;border:0;background:transparent;cursor:pointer}
  .railbtn:hover{background:rgba(0,0,0,.05);color:var(--ink-soft)}
  .railbtn.active{color:var(--pink-ink);background:var(--pink)}
  .railbtn svg{width:19px;height:19px}
  .railspring{flex:1}

  .editor{width:340px;flex:none;background:var(--panel);display:flex;flex-direction:column;min-height:0;border-right:.5px solid var(--line)}
  .ed-head{display:flex;align-items:center;gap:8px;padding:11px 16px 6px;font:700 11px var(--font);letter-spacing:.05em;color:var(--muted2)}
  .ed-head .fmt{margin-left:auto;font:700 10px var(--font);letter-spacing:.02em;color:var(--pink-ink);background:var(--pink);padding:2px 8px;border-radius:6px}
  .ed-scroll{flex:1;overflow:auto;padding:4px 0 12px;font-family:var(--mono);font-size:12.5px;line-height:1.92}
  .ln{display:flex}
  .ln .num{width:38px;flex:none;text-align:right;padding-right:14px;color:#c4c4cc;user-select:none}
  .ln .code{flex:1;white-space:pre-wrap;word-break:break-word;color:var(--ink-soft)}
  .ed-foot{flex:none;display:flex;align-items:center;gap:8px;padding:10px 16px;border-top:.5px solid var(--line);font:600 11.5px var(--font);color:var(--muted)}
  .ed-foot .gd{width:7px;height:7px;border-radius:50%;background:var(--green);flex:none}

  .canvas{flex:1;display:flex;flex-direction:column;min-width:0;background:#fbfbfc}
  .canvas-top{height:40px;flex:none;display:flex;align-items:center;gap:10px;padding:0 12px;border-bottom:.5px solid var(--line);background:var(--panel)}
  .diag-title{font-size:13px;font-weight:700;color:var(--ink)}
  .kind-wrap{position:relative}
  .kind-badge{display:flex;align-items:center;gap:6px;font:700 11px var(--font);color:var(--pink-ink);background:var(--pink);padding:3px 7px 3px 8px;border:0;border-radius:999px;cursor:pointer}
  .kind-badge:hover{background:#fbd9e6}
  .kind-badge .kd{width:7px;height:7px;border-radius:2px;background:var(--pink-ink)}
  .kind-badge .kchev{width:13px;height:13px;opacity:.7;transition:transform .15s ease}
  .kind-badge[aria-expanded="true"] .kchev{transform:rotate(180deg)}
  .kind-pop{position:absolute;top:calc(100% + 7px);left:0;z-index:21;width:198px;padding:6px;background:#fff;border:.5px solid #e3e3e7;border-radius:12px;box-shadow:0 16px 40px rgba(0,0,0,.18)}
  .kind-pop .grp{padding:5px 8px 3px;font:700 10px var(--font);letter-spacing:.04em;text-transform:uppercase;color:var(--muted2)}
  .kind-pop button{display:flex;width:100%;align-items:center;gap:9px;padding:7px 9px;border:0;border-radius:8px;background:transparent;font:600 12.5px var(--font);color:var(--ink);cursor:pointer}
  .kind-pop button:hover{background:var(--hover)}
  .kind-pop button .gi{width:18px;height:18px;display:flex;align-items:center;justify-content:center;color:var(--muted);flex:none}
  .kind-pop button .gi svg{width:16px;height:16px}
  .kind-pop button.on{color:var(--pink-ink)}
  .kind-pop button.on .gi{color:var(--pink-ink)}
  .kind-pop button .chk{width:14px;height:14px;margin-left:auto;color:var(--pink-ink)}
  .cspring{flex:1}
  .ctools{display:flex;align-items:center;gap:1px;color:var(--muted)}
  .ct{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;color:var(--muted);border:0;background:transparent;cursor:pointer}
  .ct:hover{background:var(--hover);color:var(--ink-soft)}
  .ct svg{width:16px;height:16px}
  .ct-sep{width:1px;height:18px;background:var(--line);margin:0 5px}
  .pct{font-size:12px;font-weight:600;color:var(--muted);padding:0 6px;min-width:42px;text-align:center}
  .share-wrap{position:relative}
  .share-pop{position:absolute;top:calc(100% + 7px);right:0;z-index:20;width:208px;padding:6px;background:#fff;border:.5px solid #e3e3e7;border-radius:12px;box-shadow:0 16px 40px rgba(0,0,0,.18)}
  .share-pop .grp{padding:5px 8px 3px;font:700 10px var(--font);letter-spacing:.04em;text-transform:uppercase;color:var(--muted2)}
  .share-pop button{display:flex;width:100%;align-items:center;gap:9px;padding:8px 9px;border:0;border-radius:8px;background:transparent;font:600 12.5px var(--font);color:var(--ink);cursor:pointer}
  .share-pop button:hover{background:var(--hover)}
  .share-pop button svg{width:15px;height:15px;color:var(--muted);flex:none}
  .share-pop .ext{margin-left:auto;font:600 11px var(--font);color:var(--muted2)}
  .share-pop hr{border:0;border-top:.5px solid var(--line);margin:5px 4px}

  .stage{flex:1;position:relative;overflow:auto;background-color:#fbfbfc;background-image:radial-gradient(circle,#e0e0e6 1.1px,transparent 1.1px);background-size:22px 22px}
  .stage .center{position:absolute;inset:0;display:grid;place-items:center}
  .diagram{height:min(78%,540px);width:auto;max-width:88%;transform-origin:center center;transition:transform .12s ease}

  .ic{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

  @media (max-width:760px){
    .ch-fields{flex-direction:column}.ch-field.name{flex:none}
    .ch-grid{grid-template-columns:1fr}
    .body{flex-direction:column}
    .rail{width:100%;height:46px;flex-direction:row;border-right:0;border-bottom:.5px solid var(--line);padding:0 8px}
    .editor{width:100%;flex:none;height:42%;border-right:0;border-bottom:.5px solid var(--line)}
    .signin .lbl{display:none}.signin{padding:0 10px}.tab .ext{display:none}
  }
</style>
</head>
<body>

<!-- ============ CHOOSER (first screen) ============ -->
<div class="chooser" id="chooser">
  <div class="ch-panel">
    <div class="ch-head">
      <svg class="ch-logo" viewBox="0 0 100 100" aria-hidden="true">
        <rect width="100" height="100" rx="18" fill="#e0095f"/>
        <g transform="translate(50 50) scale(0.98) translate(-50 -50)">
          <line x1="33" y1="26.5" x2="33" y2="73.5" stroke="#fff" stroke-width="11.5" stroke-linecap="round"/>
          <line x1="65.5" y1="27" x2="34" y2="58.5" stroke="#fff" stroke-width="11.5" stroke-linecap="round"/>
          <line x1="48" y1="49.5" x2="67" y2="73" stroke="#fff" stroke-width="11.5" stroke-linecap="round"/>
          <circle cx="33" cy="26.5" r="5.8" fill="#fff"/><circle cx="65.5" cy="27" r="5.8" fill="#fff"/>
          <circle cx="33" cy="73.5" r="5.8" fill="#fff"/><circle cx="34" cy="58.5" r="5.8" fill="#fff"/>
          <circle cx="48" cy="49.5" r="5.8" fill="#fff"/><circle cx="67" cy="73" r="5.8" fill="#fff"/>
        </g>
      </svg>
      <h1>New diagram</h1>
      <p>Pick a language to start — you get a working starter. Or paste existing code.</p>
    </div>

    <div class="ch-fields">
      <label class="ch-field name">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>
        <input type="text" placeholder="File name" aria-label="File name" />
      </label>
      <label class="ch-field search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" id="chSearch" placeholder="Search 20+ types — try “sequence” or “plantuml”" aria-label="Search diagram types" />
      </label>
    </div>

    <div class="ch-sec">Languages</div>
    <div class="ch-grid" id="formatGrid"></div>
    <div class="ch-empty" id="chEmpty" hidden>No match — try “mermaid”, “sequence”, “bpmn”…</div>

    <div class="ch-types" id="typeRow">
      <span class="ch-sec">Popular types</span>
    </div>

    <div class="ch-foot">
      <a class="paste-link" href="index-2-req1.html">
        Paste code instead
        <svg class="ic" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
      </a>
    </div>
  </div>
</div>

<!-- ============ APP (revealed after a pick) ============ -->
<div class="window" id="app" role="application" aria-label="Kymostudio editor (guest)" hidden>
  <div class="titlebar">
    <svg class="tb-logo" viewBox="0 0 100 100" aria-hidden="true">
      <rect width="100" height="100" rx="18" fill="#e0095f"/>
      <g transform="translate(50 50) scale(0.98) translate(-50 -50)">
        <line x1="33" y1="26.5" x2="33" y2="73.5" stroke="#fff" stroke-width="11.5" stroke-linecap="round"/>
        <line x1="65.5" y1="27" x2="34" y2="58.5" stroke="#fff" stroke-width="11.5" stroke-linecap="round"/>
        <line x1="48" y1="49.5" x2="67" y2="73" stroke="#fff" stroke-width="11.5" stroke-linecap="round"/>
        <circle cx="33" cy="26.5" r="5.8" fill="#fff"/><circle cx="65.5" cy="27" r="5.8" fill="#fff"/>
        <circle cx="33" cy="73.5" r="5.8" fill="#fff"/><circle cx="34" cy="58.5" r="5.8" fill="#fff"/>
        <circle cx="48" cy="49.5" r="5.8" fill="#fff"/><circle cx="67" cy="73" r="5.8" fill="#fff"/>
      </g>
    </svg>
    <div class="tabs">
      <button class="tab active" aria-current="page" title="Untitled draft — not saved">
        <span class="draft" aria-hidden="true"></span><span id="tabName">Untitled</span><span class="ext" id="tabExt">.mmd</span>
      </button>
    </div>
    <button class="tb-plus" id="newBtn" title="New diagram" aria-label="New diagram"><svg class="ic" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg></button>
    <div class="tb-right">
      <button class="signin" title="Sign in to save your work" aria-label="Sign in with Google">
        <svg viewBox="0 0 18 18" aria-hidden="true"><path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.92c1.7-1.57 2.68-3.88 2.68-6.62Z"/><path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.92-2.26c-.8.54-1.84.86-3.04.86-2.34 0-4.32-1.58-5.02-3.7H.96v2.34A9 9 0 0 0 9 18Z"/><path fill="#FBBC05" d="M3.98 10.72a5.4 5.4 0 0 1 0-3.44V4.94H.96a9 9 0 0 0 0 8.12l3.02-2.34Z"/><path fill="#EA4335" d="M9 3.58c1.32 0 2.5.46 3.44 1.35l2.58-2.58C13.46.9 11.43 0 9 0A9 9 0 0 0 .96 4.94l3.02 2.34C4.68 5.16 6.66 3.58 9 3.58Z"/></svg>
        <span class="lbl">Sign in</span>
      </button>
      <button class="iconbtn" title="Appearance" aria-label="Appearance"><svg class="ic" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg></button>
    </div>
  </div>

  <div class="body">
    <nav class="rail" aria-label="Tools">
      <button class="railbtn active" title="Source" aria-label="Source" aria-pressed="true"><svg class="ic" viewBox="0 0 24 24" aria-hidden="true"><path d="M9 9.5 6.5 12 9 14.5M15 9.5 17.5 12 15 14.5"/></svg></button>
      <button class="railbtn" id="railNew" title="Templates" aria-label="Templates"><svg class="ic" viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg></button>
      <button class="railbtn" title="Search" aria-label="Search"><svg class="ic" viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg></button>
      <span class="railspring"></span>
      <button class="railbtn" title="Settings" aria-label="Settings"><svg class="ic" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/></svg></button>
    </nav>

    <section class="editor" aria-label="Source code">
      <div class="ed-head">SOURCE<span class="fmt" id="fmtPill">MERMAID</span></div>
      <div class="ed-scroll" id="edScroll"></div>
      <div class="ed-foot"><span class="gd" aria-hidden="true"></span>Guest · changes stay in this browser</div>
    </section>

    <section class="canvas" aria-label="Diagram preview">
      <div class="canvas-top">
        <span class="diag-title" id="diagTitle">Untitled</span>
        <div class="kind-wrap">
          <button class="kind-badge" id="kindBtn" aria-haspopup="menu" aria-expanded="false" title="Switch language">
            <span class="kd" aria-hidden="true"></span><span id="kindLabel">Mermaid</span>
            <svg class="ic kchev" viewBox="0 0 24 24" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg>
          </button>
          <div class="kind-pop" id="kindPop" role="menu" hidden></div>
        </div>
        <span class="cspring"></span>
        <div class="ctools">
          <div class="share-wrap">
            <button class="ct share-btn" title="Share &amp; export" aria-label="Share and export" aria-haspopup="menu" aria-expanded="false"><svg class="ic" viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 13.5l6.8 4M15.4 6.5l-6.8 4"/></svg></button>
            <div class="share-pop" role="menu" hidden>
              <div class="grp">Share</div>
              <button role="menuitem"><svg class="ic" viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1 1"/><path d="M14 11a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1-1"/></svg>Copy link</button>
              <hr/>
              <div class="grp">Export</div>
              <button role="menuitem"><svg class="ic" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>SVG<span class="ext">.svg</span></button>
              <button role="menuitem"><svg class="ic" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>PNG<span class="ext">.png</span></button>
            </div>
          </div>
          <span class="ct-sep" aria-hidden="true"></span>
          <button class="ct" data-zoom="out" title="Zoom out" aria-label="Zoom out"><svg class="ic" viewBox="0 0 24 24"><path d="M5 12h14"/></svg></button>
          <span class="pct">100%</span>
          <button class="ct" data-zoom="in" title="Zoom in" aria-label="Zoom in"><svg class="ic" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></button>
          <button class="ct" data-zoom="fit" title="Fit to view" aria-label="Fit to view"><svg class="ic" viewBox="0 0 24 24"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg></button>
        </div>
      </div>
      <div class="stage">
        <div class="center">
          <svg class="diagram" xmlns="http://www.w3.org/2000/svg" viewBox="12 12 348 526" role="img" aria-label="Rendered diagram">
            <defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b6b6bf"></path></marker></defs>
            <style>
              .fc-shape{fill:#fff;stroke:var(--navy);stroke-width:1.7}
              .fc-label{fill:var(--navy);font:600 13px var(--font);text-anchor:middle;dominant-baseline:central}
              .elabel{fill:#6f6f74;font:600 11px var(--font);text-anchor:middle}
              .edges path{stroke:#cdcdd5;stroke-width:2.2}
            </style>
            <g class="edges" fill="none">
              <path d="M280,70 C280,110 280,78 280,118" marker-end="url(#arrow)"></path>
              <path d="M280,182 C280,222 280,190 280,230" marker-end="url(#arrow)"></path>
              <text class="elabel" x="280" y="200">Yes</text>
              <path d="M218,150 C178,150 216,253 176,253" marker-end="url(#arrow)"></path>
              <text class="elabel" x="197" y="195.5">No</text>
              <path d="M280,276 C280,316 280,284 280,324" marker-end="url(#arrow)"></path>
              <path d="M280,370 C280,410 280,378 280,418" marker-end="url(#arrow)"></path>
              <path d="M100,276 C100,316 100,284 100,324" marker-end="url(#arrow)"></path>
            </g>
            <g class="nodes">
              <rect class="fc-shape" x="212" y="24" width="136" height="46" rx="9"></rect><text class="fc-label" x="280" y="47">Receive order</text>
              <polygon class="fc-shape" points="280,118 342,150 280,182 218,150"></polygon><text class="fc-label" x="280" y="150">In stock?</text>
              <rect class="fc-shape" x="216" y="230" width="128" height="46" rx="9"></rect><text class="fc-label" x="280" y="253">Take payment</text>
              <rect class="fc-shape" x="24" y="230" width="152" height="46" rx="9"></rect><text class="fc-label" x="100" y="253">Notify customer</text>
              <rect class="fc-shape" x="224" y="324" width="112" height="46" rx="9"></rect><text class="fc-label" x="280" y="347">Pack items</text>
              <ellipse class="fc-shape" cx="280" cy="472" rx="54" ry="54"></ellipse><text class="fc-label" x="280" y="472">Ship order</text>
              <rect class="fc-shape" x="36" y="324" width="128" height="46" rx="9"></rect><text class="fc-label" x="100" y="347">Cancel order</text>
            </g>
          </svg>
        </div>
      </div>
    </section>
  </div>
</div>

<script>
  // ---- format catalogue (labels/desc/glyph from templates.tsx, starters from samples.ts) ----
  var G = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">';
  var FORMATS = [
    { key:"mermaid", name:"Mermaid", ext:".mmd", top:true, sub:"Text diagrams, 14 types",
      glyph:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M23.99 2.115A12.22 12.22 0 0 0 12 10.149A12.22 12.22 0 0 0 .01 2.115a12.23 12.23 0 0 0 5.32 10.604a6.56 6.56 0 0 1 2.845 5.423v3.754h7.65v-3.754a6.56 6.56 0 0 1 2.844-5.423a12.22 12.22 0 0 0 5.32-10.604Z"/></svg>',
      source:"graph TD\n  A[Start] --> B{Is it working?}\n  B -->|Yes| C[Ship it]\n  B -->|No| D[Debug]\n  D --> B\n" },
    { key:"plantuml", name:"PlantUML", ext:".puml", sub:"UML from plain text",
      glyph:G+'<path d="M5.5 13.5v4m0-4h13m-13 0V10m13 3.5v4m0-4V10m-13 0V6.5m0 3.5h13m0 0V6.5m-2.5 11h5V21h-5zm-13 0h5V21H3zm13-11h5V3h-5zm-13 0h5V3H3z"/></svg>',
      source:"@startuml\nAlice -> Bob: Authentication Request\nBob --> Alice: Authentication Response\n\nAlice -> Bob: Another authentication Request\nAlice <-- Bob: Another authentication Response\n@enduml\n" },
    { key:"kymo", name:"Kymo", ext:".kymo", sub:"Native animated diagrams",
      glyph:'<svg viewBox="0 0 64 64" fill="currentColor"><path transform="translate(9.90 53.26) scale(0.029471 -0.029471)" d="M312 -25C447 -25 524 55 524 197V378L650 508L974 97C1043 9 1105 -25 1196 -25C1312 -25 1400 64 1400 180C1400 240 1369 304 1296 394L984 780L1282 1098C1342 1162 1364 1208 1364 1272C1364 1381 1274 1468 1163 1468C1091 1468 1036 1440 975 1372L532 871H524V1246C524 1388 447 1468 312 1468C177 1468 100 1388 100 1246V197C100 55 177 -25 312 -25Z"/></svg>',
      source:"flowchart TD {\n  A[Receive order] --> B{In stock?}\n  B -->|Yes| C[Take payment]\n  B -->|No| D[Notify customer]\n  C --> E[Pack items]\n  E --> F((Ship order))\n  D --> G[Cancel order]\n}\n" },
    { key:"bpmn", name:"BPMN", ext:".bpmn", sub:"Business process models",
      glyph:G+'<circle cx="4.5" cy="12" r="2.5"/><rect x="9" y="8.5" width="7" height="7" rx="1.5"/><circle cx="20" cy="12" r="2.5"/><path d="M7 12h2M16 12h1.5"/></svg>',
      source:'<?xml version="1.0" encoding="UTF-8"?>\n<bpmn:definitions xmlns:bpmn="http://www.omg.org/spec/BPMN/20100524/MODEL" id="defs">\n  <bpmn:process id="proc" isExecutable="false">\n    <bpmn:startEvent id="start" name="Start" />\n    <bpmn:task id="task" name="Do work" />\n    <bpmn:endEvent id="end" name="End" />\n    <bpmn:sequenceFlow id="f1" sourceRef="start" targetRef="task" />\n    <bpmn:sequenceFlow id="f2" sourceRef="task" targetRef="end" />\n  </bpmn:process>\n</bpmn:definitions>\n' },
    { key:"d2", name:"D2", ext:".d2", sub:"Modern declarative diagrams",
      glyph:G+'<rect x="3" y="4.5" width="18" height="15" rx="2"/><rect x="6" y="8" width="5.2" height="3.6" rx="0.9"/><rect x="12.8" y="12" width="5.2" height="3.6" rx="0.9"/><path d="M11.2 9.8h2.1c1 0 1.5.5 1.5 1.5v1"/></svg>',
      source:"direction: right\n\nclient: Client\nserver: Server {\n  api: API\n  db: Database {\n    shape: cylinder\n  }\n}\n\nclient -> server.api: request\nserver.api -> server.db: query\n" },
    { key:"dbml", name:"DBML", ext:".dbml", sub:"Database schemas, dbdiagram",
      glyph:G+'<rect x="4" y="4" width="16" height="16" rx="2"/><path d="M4 8.5h16"/><path d="M4 8.5V6a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v2.5z" fill="currentColor" stroke="none"/><path d="M11 8.5V20"/></svg>',
      source:"Table users {\n  id integer [primary key]\n  username varchar\n  created_at timestamp\n}\n\nTable posts {\n  id integer [primary key]\n  title varchar\n  user_id integer\n}\n\nRef: posts.user_id > users.id\n" },
    { key:"graphviz", name:"GraphViz", ext:".dot", sub:"Graphs via DOT",
      glyph:G+'<circle cx="5" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="5" r="2"/><circle cx="5" cy="19" r="2"/><circle cx="19" cy="19" r="2"/><path d="M6.4 6.4 10.6 10.6M17.6 6.4 13.4 10.6M6.4 17.6 10.6 13.4M17.6 17.6 13.4 13.4"/></svg>',
      source:"digraph G {\n  rankdir=LR;\n  node [shape=box, style=rounded];\n  Start -> Parse -> Render;\n  Parse -> Error [style=dashed];\n}\n" },
    { key:"wavedrom", name:"WaveDrom", ext:".json", sub:"Digital timing diagrams",
      glyph:G+'<path d="M3 16V8h4v8h4V8h4v8h4V8h2"/></svg>',
      source:'{ "signal": [\n  { "name": "clk",  "wave": "p......" },\n  { "name": "bus",  "wave": "x.34.5x", "data": ["head", "body", "tail"] },\n  { "name": "wire", "wave": "0.1..0." }\n]}\n' }
  ];
  // popular diagram types — all Mermaid starters
  var TYPES = [
    { name:"Flowchart", source:"flowchart TD\n  A[Start] --> B{OK?}\n  B -->|Yes| C[Ship]\n  B -->|No| D[Fix]\n  D --> B\n" },
    { name:"Sequence", source:"sequenceDiagram\n  Alice->>Bob: Hello Bob\n  Bob-->>Alice: Hi Alice\n" },
    { name:"Class", source:"classDiagram\n  class Animal {\n    +String name\n    +run()\n  }\n  Animal <|-- Dog\n" },
    { name:"ER", source:"erDiagram\n  CUSTOMER ||--o{ ORDER : places\n  ORDER ||--|{ LINE_ITEM : contains\n" },
    { name:"State", source:"stateDiagram-v2\n  [*] --> Idle\n  Idle --> Running: start\n  Running --> [*]: stop\n" },
    { name:"C4", source:"C4Context\n  title System Context\n  Person(c, \"Customer\")\n  System(s, \"App\")\n  Rel(c, s, \"Uses\")\n" },
    { name:"Gantt", source:"gantt\n  title Plan\n  section Build\n  Design :a1, 2024-01-01, 7d\n  Code   :after a1, 14d\n" }
  ];

  (function(){
    var $ = function(s){ return document.querySelector(s); };
    var chooser = $("#chooser"), app = $("#app"), grid = $("#formatGrid"),
        typeRow = $("#typeRow"), chEmpty = $("#chEmpty"), search = $("#chSearch");

    // build format cards
    FORMATS.forEach(function(f){
      var b = document.createElement("button");
      b.className = "fmt-card"; b.dataset.k = (f.name + " " + f.key + " " + f.sub).toLowerCase();
      b.innerHTML = '<span class="fmt-ic" aria-hidden="true">'+f.glyph+'</span>'+
        '<span class="fmt-tx"><span class="fmt-name">'+f.name+(f.top?' <span class="top">POPULAR</span>':'')+'</span>'+
        '<span class="fmt-sub">'+f.sub+'</span></span>';
      b.addEventListener("click", function(){ open(f); });
      grid.appendChild(b);
    });
    // build type chips — all Mermaid starters
    TYPES.forEach(function(t){
      var c = document.createElement("button");
      c.className = "type-chip"; c.dataset.k = t.name.toLowerCase();
      c.textContent = t.name;
      c.addEventListener("click", function(){ open({ name:"Mermaid", ext:".mmd", key:"mermaid", source:t.source }); });
      typeRow.appendChild(c);
    });

    // language switcher (in the canvas top bar) — swap kind without leaving the editor
    var kindBtn = $("#kindBtn"), kindPop = $("#kindPop"), currentKey = null;
    kindPop.innerHTML = '<div class="grp">Language</div>';
    FORMATS.forEach(function(f){
      var it = document.createElement("button");
      it.setAttribute("role", "menuitem"); it.dataset.k = f.key;
      it.innerHTML = '<span class="gi" aria-hidden="true">'+f.glyph+'</span>'+f.name+
        '<svg class="ic chk" viewBox="0 0 24 24" aria-hidden="true" hidden><path d="M20 6 9 17l-5-5"/></svg>';
      it.addEventListener("click", function(){ open(f); setKindPop(false); });
      kindPop.appendChild(it);
    });
    function markKind(){
      kindPop.querySelectorAll("button").forEach(function(b){
        var on = b.dataset.k === currentKey; b.classList.toggle("on", on);
        var chk = b.querySelector(".chk"); if(chk) chk.hidden = !on;
      });
    }
    function setKindPop(o){ kindPop.hidden = !o; kindBtn.setAttribute("aria-expanded", String(o)); if(o) markKind(); }
    kindBtn.addEventListener("click", function(e){ e.stopPropagation(); setKindPop(kindPop.hidden); });
    document.addEventListener("click", function(e){ if(!kindPop.hidden && !kindPop.contains(e.target) && !kindBtn.contains(e.target)) setKindPop(false); });
    document.addEventListener("keydown", function(e){ if(e.key==="Escape" && !kindPop.hidden){ setKindPop(false); kindBtn.focus(); } });

    // live search filter
    search.addEventListener("input", function(){
      var q = search.value.trim().toLowerCase();
      var any = false;
      grid.querySelectorAll(".fmt-card").forEach(function(c){ var hit = !q || c.dataset.k.indexOf(q) !== -1; c.hidden = !hit; if(hit) any = true; });
      typeRow.querySelectorAll(".type-chip").forEach(function(c){ c.hidden = !!q && c.dataset.k.indexOf(q) === -1; });
      chEmpty.hidden = any;
    });
    search.addEventListener("keydown", function(e){
      if(e.key === "Enter"){ var first = grid.querySelector(".fmt-card:not([hidden])") || typeRow.querySelector(".type-chip:not([hidden])"); if(first) first.click(); }
    });

    // render code into the editor
    function renderCode(text){
      var lines = text.replace(/\n+$/,"").split("\n"), html = "";
      for(var i=0;i<lines.length;i++){
        var safe = lines[i].replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
        html += '<div class="ln"><span class="num">'+(i+1)+'</span><span class="code">'+(safe||" ")+'</span></div>';
      }
      $("#edScroll").innerHTML = html;
    }

    // open the editor with a starter (f = { name, ext, key, source })
    function open(f){
      renderCode(f.source);
      $("#fmtPill").textContent = f.name.toUpperCase();
      $("#kindLabel").textContent = f.name;
      $("#tabExt").textContent = f.ext;
      currentKey = f.key; markKind();
      chooser.hidden = true; app.hidden = false;
    }
    function reopen(){ app.hidden = true; chooser.hidden = false; search.focus(); }
    $("#newBtn").addEventListener("click", reopen);
    $("#railNew").addEventListener("click", reopen);

    // ---- shared chrome interactions ----
    var sBtn = $(".share-btn"), pop = $(".share-pop");
    var setPop = function(open){ pop.hidden = !open; sBtn.setAttribute("aria-expanded", String(open)); };
    sBtn.addEventListener("click", function(e){ e.stopPropagation(); setPop(pop.hidden); });
    document.addEventListener("click", function(e){ if(!pop.hidden && !pop.contains(e.target)) setPop(false); });
    document.addEventListener("keydown", function(e){ if(e.key==="Escape" && !pop.hidden){ setPop(false); sBtn.focus(); } });
    pop.querySelectorAll("button").forEach(function(i){ i.addEventListener("click", function(){ setPop(false); }); });

    var svg = $(".diagram"), pct = $(".pct"), z = 100;
    var apply = function(){ svg.style.transform = "scale(" + (z/100) + ")"; pct.textContent = Math.round(z) + "%"; };
    var step = function(d){ z = Math.min(400, Math.max(25, z+d)); apply(); };
    $('[data-zoom="out"]').addEventListener("click", function(){ step(-10); });
    $('[data-zoom="in"]').addEventListener("click", function(){ step(10); });
    $('[data-zoom="fit"]').addEventListener("click", function(){ z = 100; apply(); });
  })();
</script>
</body>
</html>
