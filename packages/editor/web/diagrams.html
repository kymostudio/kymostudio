<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>My diagrams · kymo</title>
    <script src="https://accounts.google.com/gsi/client" async></script>
    <style>
      :root { --bg:#0f1115; --panel:#171a21; --border:#262b35; --fg:#e6e9ef; --muted:#8b93a3; --accent:#5b9dff; }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body { background: var(--bg); color: var(--fg); font: 14px/1.5 ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; display: flex; flex-direction: column; }
      header { display: flex; align-items: center; gap: 10px; padding: 10px 16px; border-bottom: 1px solid var(--border); background: var(--panel); }
      header strong { font-size: 15px; }
      .spacer { flex: 1; }
      .muted { font-size: 12px; color: var(--muted); }
      button, .link { background:#1f2430; color:var(--fg); border:1px solid var(--border); border-radius:6px; padding:6px 10px; font:inherit; font-size:13px; cursor:pointer; text-decoration:none; }
      button:hover, .link:hover { border-color: var(--accent); }
      [hidden] { display: none !important; }
      main { flex: 1; overflow: auto; padding: 22px 16px; }
      #signin { display: grid; place-items: center; gap: 14px; padding: 80px 0; }
      .wrap { max-width: 760px; margin: 0 auto; }
      .status { margin: 0 2px 12px; }
      .list { display: flex; flex-direction: column; gap: 8px; }
      .row { display: flex; flex-direction: column; gap: 2px; padding: 12px 14px; border: 1px solid var(--border); border-radius: 10px; background: var(--panel); color: var(--fg); text-decoration: none; }
      .row:hover { border-color: var(--accent); background: #1b1f28; }
      .row .title { font-weight: 600; font-size: 14px; }
      .row .meta { font-size: 12px; color: var(--muted); }
    </style>
  </head>
  <body>
    <header>
      <strong>My diagrams</strong>
      <div class="spacer"></div>
      <span class="muted" id="email" hidden></span>
      <button id="refresh" hidden>Refresh</button>
      <button id="newbtn" hidden>+ New</button>
      <a class="link" href="/">Editor</a>
      <button id="signout" hidden>Sign out</button>
    </header>
    <main>
      <div class="wrap">
        <div id="signin" hidden>
          <p class="muted">Sign in with Google to see your diagrams.</p>
          <div id="gbtn"></div>
        </div>
        <div id="app" hidden>
          <div class="status muted" id="status"></div>
          <div id="list" class="list"></div>
        </div>
      </div>
    </main>
    <script src="/diagrams.js"></script>
  </body>
</html>
