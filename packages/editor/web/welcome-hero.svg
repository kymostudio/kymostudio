 2s10 4.477 10 10" opacity=".5"/><path fill="currentColor" d="M8.97 8.97a.75.75 0 0 1 1.06 0L12 10.94l1.97-1.97a.75.75 0 1 1 1.06 1.06L13.06 12l1.97 1.97a.75.75 0 0 1-1.06 1.06L12 13.06l-1.97 1.97a.75.75 0 0 1-1.06-1.06L10.94 12l-1.97-1.97a.75.75 0 0 1 0-1.06"/></svg></g>
  <text class="lab" x="72" y="154" style="animation-delay:0.50s">Submit request</text><text class="lab" x="216" y="154" style="animation-delay:0.60s">Manager review</text><text class="lab" x="360" y="154" style="animation-delay:0.70s">Approved?</text><text class="lab" x="504" y="154" style="animation-delay:0.80s">Finance</text><text class="lab" x="648" y="154" style="animation-delay:0.90s">Provisioned</text><text class="lab rlab" x="360" y="266" style="animation-delay:1.00s">Rejected</text>
  <g class="spot" style="animation-delay:1s"><rect class="card" filter="url(#csh)" x="12" y="14" width="232" height="60" rx="12"/><circle cx="34" cy="36" r="11" fill="#e0095f"/><text x="34" y="40" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">1</text><text class="ct" x="52" y="32">Submit request</text><text class="cd" x="52" y="49">Employee files an access request</text><text class="cd" x="26" y="64">with a business justification.</text><path d="M64,74 l8,9 l8,-9 z" fill="#fff"/></g><g class="spot" style="animation-delay:3.3s"><rect class="card" filter="url(#csh)" x="100" y="14" width="232" height="60" rx="12"/><circle cx="122" cy="36" r="11" fill="#e0095f"/><text x="122" y="40" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">2</text><text class="ct" x="140" y="32">Manager review</text><text class="cd" x="140" y="49">Line manager checks the request</text><text class="cd" x="114" y="64">against team policy.</text><path d="M208,74 l8,9 l8,-9 z" fill="#fff"/></g><g class="spot" style="animation-delay:5.6s"><rect class="card" filter="url(#csh)" x="244" y="14" width="232" height="60" rx="12"/><circle cx="266" cy="36" r="11" fill="#e0095f"/><text x="266" y="40" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">3</text><text class="ct" x="284" y="32">Approval gateway</text><text class="cd" x="284" y="49">Routes Yes → Finance, or</text><text class="cd" x="258" y="64">No → Rejected.</text><path d="M352,74 l8,9 l8,-9 z" fill="#fff"/></g><g class="spot" style="animation-delay:7.9s"><rect class="card" filter="url(#csh)" x="388" y="14" width="232" height="60" rx="12"/><circle cx="410" cy="36" r="11" fill="#e0095f"/><text x="410" y="40" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">4</text><text class="ct" x="428" y="32">Finance check</text><text class="cd" x="428" y="49">Finance confirms budget and the</text><text class="cd" x="402" y="64">cost-centre allocation.</text><path d="M496,74 l8,9 l8,-9 z" fill="#fff"/></g><g class="spot" style="animation-delay:10.2s"><rect class="card" filter="url(#csh)" x="472" y="14" width="232" height="60" rx="12"/><circle cx="494" cy="36" r="11" fill="#e0095f"/><text x="494" y="40" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">5</text><text class="ct" x="512" y="32">Provisioned</text><text class="cd" x="512" y="49">Access is granted and the</text><text class="cd" x="486" y="64">requester is notified.</text><path d="M640,74 l8,9 l8,-9 z" fill="#fff"/></g>
