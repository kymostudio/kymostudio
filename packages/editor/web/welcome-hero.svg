<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-28 -50 768 319" width="768" height="319">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#0f172a" fill-opacity="0.05"/>
    </pattern>
  </defs>
  <style>
    text { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
    .title { fill: #0f172a; font-size: 17px; font-weight: 700; }
    .label { fill: #1e293b; font-size: 13px; font-weight: 600; text-anchor: middle; }
    .elabel { fill: #64748b; font-size: 10.5px; text-anchor: middle; }
    .fc-shape { fill: #eff6ff; stroke: #3b82f6; stroke-width: 1.6; }
    .fc-shape-line { fill: none; stroke: #3b82f6; stroke-width: 1.6; stroke-linecap: round; }
    .fc-label { fill: #1e3a8a; font-size: 13px; font-weight: 600; text-anchor: middle; dominant-baseline: central; }
  </style>
  <rect x="-28" y="-50" width="768" height="319" rx="14" fill="#f8fafc"/>
  <rect x="-28" y="-50" width="768" height="319" rx="14" fill="url(#grid)"/>
  
  <g class="edges">
    <path d="M160,133 C200,133 168,133 208,133" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M332,133 C372,133 352,133 392,133" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
    <text class="elabel" x="362" y="127">Yes</text>
    <path d="M332,133 C372,133 340,47 380,47" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
    <text class="elabel" x="356" y="84">No</text>
    <path d="M520,133 C560,133 540,133 580,133" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  </g>
  <g class="nodes">
    <rect class="fc-shape" x="24" y="110" width="136" height="46" rx="6"/><text class="fc-label" x="92" y="133">Receive order</text>
    <polygon class="fc-shape" points="270,101 332,133 270,165 208,133"/><text class="fc-label" x="270" y="133">In stock?</text>
    <rect class="fc-shape" x="392" y="110" width="128" height="46" rx="6"/><text class="fc-label" x="456" y="133">Take payment</text>
    <rect class="fc-shape" x="380" y="24" width="152" height="46" rx="6"/><text class="fc-label" x="456" y="47">Notify customer</text>
    <ellipse class="fc-shape" cx="634" cy="133" rx="54" ry="54"/><text class="fc-label" x="634" y="133">Ship order</text>
  </g>
</svg>
