<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Access-request approval workflow with Yes and No branches, each step annotated" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0.5,0.5 L6.5,3 L0.5,5.5" fill="none" stroke="#9aa3bd" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <marker id="arn" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0.5,0.5 L6.5,3 L0.5,5.5" fill="none" stroke="#c2c6d4" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <filter id="csh" x="-30%" y="-40%" width="160%" height="200%"><feDropShadow dx="0" dy="5" stdDeviation="9" flood-color="#242131" flood-opacity="0.16"/></filter>
    <filter id="bl" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="9"/></filter>
    <style>
    .e{fill:none;stroke:#9aa3bd;stroke-width:2;stroke-linecap:round;stroke-dasharray:1;opacity:0;animation:draw .5s ease both}
    .en{stroke:#c2c6d4}
    .ico{transform-box:fill-box;transform-origin:center;opacity:0;animation:pop .55s cubic-bezier(.2,.85,.25,1) both}
    .lab{fill:#2b2740;font-size:12px;font-weight:600;text-anchor:middle;opacity:0;animation:fade .5s ease both}
    .rlab{fill:#8b8fa0}
    .elbl{fill:#8b8fa0;font-size:11px;font-weight:600;text-anchor:middle;opacity:0;animation:fade .5s ease both}
    .spot{opacity:0;animation:spot 15s ease infinite}
    .halo{fill:#e0095f;filter:url(#bl);opacity:0;animation:spoth 15s ease infinite}.haln{fill:#9296a8}
    .fy{fill:none;stroke:#e0095f;stroke-width:2.4;stroke-linecap:round;stroke-dasharray:1.5 11;opacity:0;animation:fin .6s ease 1.6s both,fmove 1s linear 1.6s infinite}
    .fn{fill:none;stroke:#9296a8;stroke-width:2.2;stroke-linecap:round;stroke-dasharray:1.5 11;opacity:0;animation:fin .6s ease 1.6s both,fmove 1.1s linear 1.6s infinite}
    .card{fill:#fff;stroke:#ececf2;stroke-width:1}
    .ct{fill:#211f2e;font-size:11.5px;font-weight:700}.cd{fill:#6e6a7c;font-size:10px;font-weight:500}
    @keyframes draw{from{opacity:0;stroke-dashoffset:1}15%{opacity:1}to{opacity:1;stroke-dashoffset:0}}
    @keyframes pop{from{opacity:0;transform:translateY(8px) scale(.85)}to{opacity:1;transform:none}}
    @keyframes fade{to{opacity:1}}
    @keyframes fin{to{opacity:.8}}
    @keyframes fmove{to{stroke-dashoffset:-12.5}}
    @keyframes spot{0%{opacity:0}1.3%{opacity:1}11%{opacity:1}13%{opacity:0}100%{opacity:0}}
    @keyframes spoth{0%{opacity:0}1.3%{opacity:.4}11%{opacity:.4}13%{opacity:0}100%{opacity:0}}
    @media (prefers-reduced-motion:reduce){.e,.ico,.lab,.elbl{animation:none;opacity:1;stroke-dashoffset:0}.spot,.fy,.fn{animation:none}}
</style>
  </defs>
  <circle class="halo" style="animation-delay:1s" cx="72" cy="120" r="26"/><circle class="halo" style="animation-delay:3.3s" cx="216" cy="120" r="26"/><circle class="halo" style="animation-delay:5.6s" cx="360" cy="120" r="26"/><circle class="halo" style="animation-delay:7.9s" cx="504" cy="120" r="26"/><circle class="halo" style="animation-delay:10.2s" cx="648" cy="120" r="26"/><circle class="halo haln" style="animation-delay:12.5s" cx="360" cy="232" r="26"/>
  
  <path id="e1" class="e" pathLength="1" marker-end="url(#ar)" d="M98,120 H188"/>
  <path id="e2" class="e" pathLength="1" marker-end="url(#ar)" d="M242,120 H332"/>
  <path id="e3" class="e" pathLength="1" marker-end="url(#ar)" d="M386,120 H476"/>
  <path id="e4" class="e" pathLength="1" marker-end="url(#ar)" d="M530,120 H620"/>
  <path id="e5" class="e en" pathLength="1" marker-end="url(#arn)" d="M360,146 V204"/>
  <text id="ly" class="elbl" x="432" y="108" style="animation-delay:1.1s">Yes</text>
  <text id="ln" class="elbl" x="378" y="178" style="animation-delay:1.1s">No</text>

  
  <path class="fy" d="M98,120 H188"/><path class="fy" d="M242,120 H332"/>
  <path class="fy" d="M386,120 H476"/><path class="fy" d="M530,120 H620"/>
  <path class="fn" d="M360,146 V204"/>

