<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>kymo · flowchart</title>
    <script src="https://accounts.google.com/gsi/client" async></script>
    <style>
      :root { --bg:#0f1115; --panel:#171a21; --border:#262b35; --fg:#e6e9ef; --muted:#8b93a3; --accent:#5b9dff; --error:#ff6b6b; }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body { background: var(--bg); color: var(--fg); font: 14px/1.5 ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; display: flex; flex-direction: column; }
      header { display: flex; align-items: center; gap: 10px; padding: 10px 16px; border-bottom: 1px solid var(--border); background: var(--panel); }
      header h1 { font-size: 15px; font-weight: 600; margin: 0; letter-spacing: 0.2px; }
      header h1 span { color: var(--accent); }
      .spacer { flex: 1; }
      .muted { font-size: 12px; color: var(--muted); }
      .diagram-name { font-size: 13px; font-weight: 500; color: var(--muted); padding: 2px 6px; border-radius: 6px; }
      .diagram-name.editable { cursor: text; }
      .diagram-name.editable:hover { color: var(--fg); background: #1c212b; }
      .diagram-input { font: inherit; font-size: 13px; background: #12141a; border: 1px solid var(--accent); border-radius: 6px; color: var(--fg); padding: 2px 6px; outline: none; min-width: 120px; }
      button { background:#1f2430; color:var(--fg); border:1px solid var(--border); border-radius:6px; padding:6px 10px; font:inherit; cursor:pointer; }
      button:hover { border-color: var(--accent); }
      [hidden] { display: none !important; }
      /* account dropdown */
      .account { position: relative; }
      .acct-btn { display: inline-flex; align-items: center; gap: 2px; padding: 3px 5px 3px 3px; border-radius: 999px; background: #202531; }
      .acct-btn:hover { border-color: var(--accent); }
      .avatar { width: 26px; height: 26px; border-radius: 50%; display: grid; place-items: center; font-weight: 600; font-size: 13px; color: #15171c; }
      .acct-btn .chev { color: var(--muted); font-size: 11px; line-height: 1; padding: 0 3px; }
      .acct-menu { position: absolute; right: 0; top: calc(100% + 6px); min-width: 220px; background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 6px; box-shadow: 0 10px 30px rgba(0,0,0,.45); z-index: 20; }
      .acct-head { padding: 8px 10px 10px; font-size: 11px; color: var(--muted); border-bottom: 1px solid var(--border); }
      .acct-head b { display: block; color: var(--fg); font-size: 13px; font-weight: 600; margin-top: 2px; word-break: break-all; }
      .acct-item { display: block; width: 100%; text-align: left; background: transparent; border: 1px solid transparent; border-radius: 6px; padding: 8px 10px; margin-top: 4px; color: var(--fg); }
      .acct-item:hover { background: #1f2430; border-color: transparent; }
      main { flex: 1; display: flex; min-height: 0; }
      .pane { flex: 1; min-width: 0; display: flex; flex-direction: column; }
      .pane + .pane { border-left: 1px solid var(--border); }
      textarea { flex:1; width:100%; resize:none; border:0; outline:none; padding:14px; background:#12141a; color:var(--fg); font:13px/1.6 ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace; tab-size:2; }
      #preview { flex:1; overflow:auto; display:flex; align-items:center; justify-content:center; padding:20px; background: repeating-conic-gradient(#14171d 0% 25%, #11141a 0% 50%) 50% / 22px 22px; }
      #preview svg { max-width: 100%; height: auto; }
      .status { font-size:12px; padding:6px 12px; border-top:1px solid var(--border); color:var(--muted); min-height:28px; white-space:pre-wrap; }
      .status.error { color: var(--error); }
    </style>
  </head>
  <body>
    <header>
      <span class="diagram-name" id="diagram-label" title="Đổi tên"></span>
      <input class="diagram-input" id="diagram-input" maxlength="60" placeholder="Tên diagram" hidden />
      <div class="spacer"></div>
      <span class="muted" id="signin-hint"></span>
      <div id="gbtn"></div>
      <div class="account" id="account" hidden>
        <button class="acct-btn" id="account-btn" aria-haspopup="menu" aria-expanded="false" title="Account">
          <span class="avatar" id="account-avatar">?</span><span class="chev">▾</span>
        </button>
        <div class="acct-menu" id="account-menu" role="menu" hidden>
          <div class="acct-head">Signed in as<b id="menu-email"></b></div>
          <button class="acct-item" id="signout-btn" role="menuitem">Sign out</button>
        </div>
      </div>
      <button id="newbtn" title="New diagram">+ New</button>
      <button id="download">Download SVG</button>
    </header>
    <main>
      <section class="pane"><textarea id="src" spellcheck="false" autocapitalize="off" autocomplete="off"></textarea></section>
      <section class="pane"><div id="preview"></div></section>
    </main>
    <div class="status" id="status">Loading engine…</div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
