<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kymostudio</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://mcp.kymo.studio" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400..800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <script src="https://accounts.google.com/gsi/client?hl=en" async></script> <!-- pin GIS UI to English: the renderButton locale field alone doesn't override browser locale -->
    <link rel="stylesheet" href="/styles.css" />
    <script>
      // Kroki share links (?k=<kind>&s=<payload>): the diagram is the whole point
      // of the page, so start its render before the app bundle even downloads —
      // decode the payload and POST to kroki.io right now. renderKroki()
      // (web/kroki.ts) adopts the in-flight response when React mounts, instead
      // of waiting main.js + mount + debounce (~1.5s on 4G) to send the same request.
      (function () {
        try {
          var q = new URLSearchParams(location.search);
          var k = q.get("k"), s = q.get("s");
          if (!k || !s || q.get("d") || k === "kymo" || typeof DecompressionStream !== "function") return;
          window.__earlyKroki = (async function () {
            var bin = atob(s.replace(/-/g, "+").replace(/_/g, "/"));
            var bytes = Uint8Array.from(bin, function (c) { return c.charCodeAt(0); });
            var src = await new Response(new Blob([bytes]).stream().pipeThrough(new DecompressionStream("deflate"))).text();
            // The cached render proxy (web/const.ts RENDER_API) — edge cache hit
            // skips kroki's server render entirely. If this fails, renderKroki()
            // falls back to a fresh request (proxy, then kroki.io direct).
            var res = fetch("https://mcp.kymo.studio/api/render/" + encodeURIComponent(k) + "/svg", { method: "POST", headers: { "content-type": "text/plain" }, body: src });
            res.catch(function () {});
            return { kind: k, src: src, res: res };
          })();
          window.__earlyKroki.catch(function () {}); // a dead warm-up must not surface as an unhandled rejection
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
