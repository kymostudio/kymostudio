<?xml version="1.0" encoding="UTF-8"?><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 476 110"
width="476" height="110"
style="max-width: 100%; height: auto"
font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"><style> text { fill: #1f2937; }
.bg-grid { fill: url(#dot-grid); }
.region-rect {
fill: rgba(15, 23, 42, 0.02);
stroke: #232f3e; /* AWS navy — admin boundary */
stroke-width: 1.5;
stroke-dasharray: 6 5;
}
.region-rect--inner {
fill: rgba(124, 58, 237, 0.03);
stroke: #7c3aed; /* purple — logical subgroup */
stroke-width: 1.4;
stroke-dasharray: 4 4;
}
.region-rect--cluster {
fill: #eaf3ff; /* light-blue solid (mingrammer cluster look) */
stroke: #b8d0ee;
stroke-width: 1.2;
stroke-dasharray: none;
}
.region-label {
font-size: 13px; font-weight: 700; fill: #232f3e; letter-spacing: 0.06em;
text-transform: uppercase;
paint-order: stroke; stroke: #fafafa; stroke-width: 4; stroke-linejoin: round;
}
.region-label--inner { fill: #6d28d9; }
.region-label--cluster {
fill: #475569; font-size: 11px; letter-spacing: 0.02em;
text-transform: none; font-weight: 500;
paint-order: stroke; stroke: #eaf3ff; stroke-width: 3;
}
.component-name { font-size: 14px; font-weight: 700; text-anchor: middle; fill: #0f172a; }
.component-sub { font-size: 11.5px; font-weight: 400; text-anchor: middle; fill: #64748b; }
.diagram-title { font-size: 20px; font-weight: 800; text-anchor: middle; fill: #0f172a; letter-spacing: 0.01em; }
.diagram-subtitle { font-size: 13px; font-weight: 400; text-anchor: middle; fill: #64748b; }
.icon-shadow { filter: url(#shadow); }
.edge-path {
fill: none;
stroke: #64748b;
stroke-width: 1.8;
stroke-linejoin: round;
stroke-linecap: round;
/* `filter: drop-shadow(...)` removed — rsvg-convert mis-renders the
first path under a drop-shadow filter (drops it entirely). The
shadow was barely visible anyway. */
}
.edge-path--orange { stroke: #ea580c; }
.edge-shadow {
fill: none;
stroke: rgba(15, 23, 42, 0.06);
stroke-width: 4.5;
stroke-linejoin: round;
stroke-linecap: round;
}
.edge-label {
font-size: 11.5px; font-weight: 500; fill: #334155; text-anchor: middle;
paint-order: stroke; stroke: #fafafa; stroke-width: 4; stroke-linejoin: round;
}
.edge-label--ext { fill: #c2410c; font-weight: 600; }
.edge-label--small { font-size: 10.5px; }

.bpmn-event { fill: #ffffff; }
.bpmn-event--start{ stroke: #4b5563; stroke-width: 1.6; }
.bpmn-event--end { stroke: #4b5563; stroke-width: 3.4; }
.bpmn-event--ring { stroke: #4b5563; stroke-width: 1.5; }
.bpmn-task { fill: #ffffff; stroke: #4b5563; stroke-width: 1.6; }
.bpmn-gateway { fill: #ffffff; stroke: #4b5563; stroke-width: 1.6; }
.bpmn-data { fill: #ffffff; stroke: #6b7280; stroke-width: 1.4; }
.bpmn-marker { fill: none; stroke: #374151; stroke-width: 1.7;
stroke-linecap: round; stroke-linejoin: round; }
.bpmn-marker--fill{ fill: #374151; stroke: none; }
.bpmn-label { font-size: 12.5px; fill: #1f2937; text-anchor: middle; }
.bpmn-label--out { font-size: 11.5px; fill: #374151; text-anchor: middle;
paint-order: stroke; stroke: #fafafa; stroke-width: 3;
stroke-linejoin: round; }
.bpmn-anno-text { font-size: 12px; fill: #374151; }
.bpmn-flow { fill: none; stroke: #374151; stroke-width: 1.6;
stroke-linejoin: round; stroke-linecap: round; }
.bpmn-flow--message { stroke-dasharray: 7 5; }
.bpmn-flow--assoc { stroke: #6b7280; stroke-width: 1.3; stroke-dasharray: 1.5 4; }
.bpmn-flow-label { font-size: 11px; fill: #334155; text-anchor: middle;
paint-order: stroke; stroke: #fafafa; stroke-width: 3.5;
stroke-linejoin: round; }
.region-rect--pool{ fill: rgba(248,250,252,0.5); stroke: #94a3b8;
stroke-width: 1.4; stroke-dasharray: none; }
.region-rect--lane{ fill: none; stroke: #cbd5e1; stroke-width: 1.1;
stroke-dasharray: none; }
.bpmn-pool-band { stroke: #94a3b8; stroke-width: 1.4; }
.bpmn-lane-band { stroke: #cbd5e1; stroke-width: 1.1; }
.bpmn-pool-label { font-size: 12.5px; font-weight: 600; fill: #475569;
letter-spacing: 0.02em; } </style><defs><!-- Open-V arrowheads: stroke-only, thinner, more elegant than filled triangles.
markerUnits=userSpaceOnUse keeps the stroke at the declared width
regardless of the path's own stroke-width. --><marker id="arrow-gray" viewBox="0 0 12 10" refX="11" refY="5"
markerWidth="11" markerHeight="11" orient="auto" markerUnits="userSpaceOnUse"><path d="M2,1 L11,5 L2,9" fill="none"
stroke="#64748b" stroke-width="1.6"
stroke-linecap="round" stroke-linejoin="round"/></marker><marker id="arrow-orange" viewBox="0 0 12 10" refX="11" refY="5"
markerWidth="11" markerHeight="11" orient="auto" markerUnits="userSpaceOnUse"><path d="M2,1 L11,5 L2,9" fill="none"
stroke="#ea580c" stroke-width="1.6"
stroke-linecap="round" stroke-linejoin="round"/></marker><!-- Soft drop shadow for icons --><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="2" flood-color="#0f172a" flood-opacity="0.18"/></filter><!-- Engineering-paper dot grid (very subtle) --><pattern id="dot-grid" width="24" height="24" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r="0.8" fill="#0f172a" fill-opacity="0.045"/></pattern><!-- Gradient highlight for cube faces (subtle, top→bottom darken) --><linearGradient id="g-face-front" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#82c70a"/><stop offset="100%" stop-color="#6ba600"/></linearGradient><linearGradient id="g-face-top" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#b7e756"/><stop offset="100%" stop-color="#a0d440"/></linearGradient><linearGradient id="g-face-side" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#588a00"/><stop offset="100%" stop-color="#446a00"/></linearGradient><linearGradient id="g-box-orange" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#f59e0b"/></linearGradient><linearGradient id="g-cyl-orange" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fb923c"/><stop offset="100%" stop-color="#ea7c1e"/></linearGradient><linearGradient id="g-user-blue" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#1d4ed8"/></linearGradient><!-- BPMN sequence-flow head: filled solid triangle --><marker id="bpmn-seq-end" viewBox="0 0 12 12" refX="10.5" refY="6"
markerWidth="12" markerHeight="12" orient="auto" markerUnits="userSpaceOnUse"><path d="M1,1.5 L11,6 L1,10.5 Z" fill="#374151"/></marker><!-- BPMN message-flow head: open (hollow) triangle --><marker id="bpmn-msg-end" viewBox="0 0 14 14" refX="12" refY="7"
markerWidth="13" markerHeight="13" orient="auto" markerUnits="userSpaceOnUse"><path d="M1.5,2 L12,7 L1.5,12 Z" fill="#ffffff" stroke="#374151" stroke-width="1.2"/></marker><!-- BPMN message-flow tail: small hollow circle --><marker id="bpmn-msg-start" viewBox="0 0 12 12" refX="6" refY="6"
markerWidth="11" markerHeight="11" orient="auto" markerUnits="userSpaceOnUse"><circle cx="6" cy="6" r="3.6" fill="#ffffff" stroke="#374151" stroke-width="1.2"/></marker><!-- BPMN association head: thin open V --><marker id="bpmn-assoc-end" viewBox="0 0 12 10" refX="10" refY="5"
markerWidth="11" markerHeight="11" orient="auto" markerUnits="userSpaceOnUse"><path d="M2,1 L11,5 L2,9" fill="none" stroke="#6b7280" stroke-width="1.3"
stroke-linecap="round" stroke-linejoin="round"/></marker></defs><rect width="476" height="110" fill="#fafafa"/><rect width="476" height="110" class="bg-grid"/><!-- title block (top, fixed) --><!-- content (auto-translated down by title_block_h) --><!-- region rects --><!-- edges --><path class="bpmn-flow" d="M 66,55 L 110,55" marker-end="url(#bpmn-seq-end)"/><path class="bpmn-flow" d="M 160,55 L 210,55" marker-end="url(#bpmn-seq-end)"/><path class="bpmn-flow" d="M 260,55 L 310,55" marker-end="url(#bpmn-seq-end)"/><path class="bpmn-flow" d="M 360,55 L 410,55" marker-end="url(#bpmn-seq-end)"/><!-- components --><circle class="bpmn-event bpmn-event--start" cx="48" cy="55" r="18"/><polygon class="bpmn-gateway" points="135,30 160,55 135,80 110,55"/><g class="bpmn-marker" stroke-width="2.4"><line x1="124.5" y1="44.5" x2="145.5" y2="65.5"/><line x1="145.5" y1="44.5" x2="124.5" y2="65.5"/></g><text class="bpmn-label--out" x="135" y="97.03"> X? </text><polygon class="bpmn-gateway" points="235,30 260,55 235,80 210,55"/><g class="bpmn-marker" stroke-width="2.4"><line x1="235" y1="44.5" x2="235" y2="65.5"/><line x1="224.5" y1="55" x2="245.5" y2="55"/></g><polygon class="bpmn-gateway" points="335,30 360,55 335,80 310,55"/><circle class="bpmn-marker" stroke-width="2.4" cx="335" cy="55" r="8.92"/><circle class="bpmn-event bpmn-event--end" cx="428" cy="55" r="18"/><!-- region labels (drawn last so they sit on top of crossing arrows) --></svg>
