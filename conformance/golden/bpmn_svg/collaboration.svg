<?xml version="1.0" encoding="UTF-8"?><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1030 530"
width="1030" height="530"
style="max-width: 100%; height: auto"
font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"><style> text { fill: #1f2937; }
.bg-grid { fill: url(#dot-grid); }
.region-rect {
fill: rgba(15, 23, 42, 0.02);
stroke: #232f3e; /* AWS navy — admin boundary */
stroke-width: 1.5;
stroke-dasharray: 6 5;
}
.region-rect--inner {
fill: rgba(124, 58, 237, 0.03);
stroke: #7c3aed; /* purple — logical subgroup */
stroke-width: 1.4;
stroke-dasharray: 4 4;
}
.region-rect--cluster {
fill: #eaf3ff; /* light-blue solid (mingrammer cluster look) */
stroke: #b8d0ee;
stroke-width: 1.2;
stroke-dasharray: none;
}
.region-label {
font-size: 13px; font-weight: 700; fill: #232f3e; letter-spacing: 0.06em;
text-transform: uppercase;
paint-order: stroke; stroke: #fafafa; stroke-width: 4; stroke-linejoin: round;
}
.region-label--inner { fill: #6d28d9; }
.region-label--cluster {
fill: #475569; font-size: 11px; letter-spacing: 0.02em;
text-transform: none; font-weight: 500;
paint-order: stroke; stroke: #eaf3ff; stroke-width: 3;
}
.component-name { font-size: 14px; font-weight: 700; text-anchor: middle; fill: #0f172a; }
.component-sub { font-size: 11.5px; font-weight: 400; text-anchor: middle; fill: #64748b; }
.diagram-title { font-size: 20px; font-weight: 800; text-anchor: middle; fill: #0f172a; letter-spacing: 0.01em; }
.diagram-subtitle { font-size: 13px; font-weight: 400; text-anchor: middle; fill: #64748b; }
.icon-shadow { filter: url(#shadow); }
.edge-path {
fill: none;
stroke: #64748b;
stroke-width: 1.8;
stroke-linejoin: round;
stroke-linecap: round;
/* `filter: drop-shadow(...)` removed — rsvg-convert mis-renders the
first path under a drop-shadow filter (drops it entirely). The
shadow was barely visible anyway. */
}
.edge-path--orange { stroke: #ea580c; }
.edge-shadow {
fill: none;
stroke: rgba(15, 23, 42, 0.06);
stroke-width: 4.5;
stroke-linejoin: round;
stroke-linecap: round;
}
.edge-label {
font-size: 11.5px; font-weight: 500; fill: #334155; text-anchor: middle;
paint-order: stroke; stroke: #fafafa; stroke-width: 4; stroke-linejoin: round;
}
.edge-label--ext { fill: #c2410c; font-weight: 600; }
.edge-label--small { font-size: 10.5px; }

.bpmn-event { fill: #ffffff; }
.bpmn-event--start{ stroke: #4b5563; stroke-width: 1.6; }
.bpmn-event--end { stroke: #4b5563; stroke-width: 3.4; }
.bpmn-event--ring { stroke: #4b5563; stroke-width: 1.5; }
.bpmn-task { fill: #ffffff; stroke: #4b5563; stroke-width: 1.6; }
.bpmn-gateway { fill: #ffffff; stroke: #4b5563; stroke-width: 1.6; }
.bpmn-data { fill: #ffffff; stroke: #6b7280; stroke-width: 1.4; }
.bpmn-marker { fill: none; stroke: #374151; stroke-width: 1.7;
stroke-linecap: round; stroke-linejoin: round; }
.bpmn-marker--fill{ fill: #374151; stroke: none; }
.bpmn-label { font-size: 12.5px; fill: #1f2937; text-anchor: middle; }
.bpmn-label--out { font-size: 11.5px; fill: #374151; text-anchor: middle;
paint-order: stroke; stroke: #fafafa; stroke-width: 3;
stroke-linejoin: round; }
.bpmn-anno-text { font-size: 12px; fill: #374151; }
.bpmn-flow { fill: none; stroke: #374151; stroke-width: 1.6;
stroke-linejoin: round; stroke-linecap: round; }
.bpmn-flow--message { stroke-dasharray: 7 5; }
.bpmn-flow--assoc { stroke: #6b7280; stroke-width: 1.3; stroke-dasharray: 1.5 4; }
.bpmn-flow-label { font-size: 11px; fill: #334155; text-anchor: middle;
paint-order: stroke; stroke: #fafafa; stroke-width: 3.5;
stroke-linejoin: round; }
.region-rect--pool{ fill: rgba(248,250,252,0.5); stroke: #94a3b8;
stroke-width: 1.4; stroke-dasharray: none; }
.region-rect--lane{ fill: none; stroke: #cbd5e1; stroke-width: 1.1;
stroke-dasharray: none; }
.bpmn-pool-band { stroke: #94a3b8; stroke-width: 1.4; }
.bpmn-lane-band { stroke: #cbd5e1; stroke-width: 1.1; }
.bpmn-pool-label { font-size: 12.5px; font-weight: 600; fill: #475569;
letter-spacing: 0.02em; } </style><defs><!-- Open-V arrowheads: stroke-only, thinner, more elegant than filled triangles.
markerUnits=userSpaceOnUse keeps the stroke at the declared width
regardless of the path's own stroke-width. --><marker id="arrow-gray" viewBox="0 0 12 10" refX="11" refY="5"
markerWidth="11" markerHeight="11" orient="auto" markerUnits="userSpaceOnUse"><path d="M2,1 L11,5 L2,9" fill="none"
stroke="#64748b" stroke-width="1.6"
stroke-linecap="round" stroke-linejoin="round"/></marker><marker id="arrow-orange" viewBox="0 0 12 10" refX="11" refY="5"
markerWidth="11" markerHeight="11" orient="auto" markerUnits="userSpaceOnUse"><path d="M2,1 L11,5 L2,9" fill="none"
stroke="#ea580c" stroke-width="1.6"
stroke-linecap="round" stroke-linejoin="round"/></marker><!-- Soft drop shadow for icons --><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="2" flood-color="#0f172a" flood-opacity="0.18"/></filter><!-- Engineering-paper dot grid (very subtle) --><pattern id="dot-grid" width="24" height="24" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r="0.8" fill="#0f172a" fill-opacity="0.045"/></pattern><!-- Gradient highlight for cube faces (subtle, top→bottom darken) --><linearGradient id="g-face-front" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#82c70a"/><stop offset="100%" stop-color="#6ba600"/></linearGradient><linearGradient id="g-face-top" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#b7e756"/><stop offset="100%" stop-color="#a0d440"/></linearGradient><linearGradient id="g-face-side" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#588a00"/><stop offset="100%" stop-color="#446a00"/></linearGradient><linearGradient id="g-box-orange" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#f59e0b"/></linearGradient><linearGradient id="g-cyl-orange" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fb923c"/><stop offset="100%" stop-color="#ea7c1e"/></linearGradient><linearGradient id="g-user-blue" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#1d4ed8"/></linearGradient><!-- BPMN sequence-flow head: filled solid triangle --><marker id="bpmn-seq-end" viewBox="0 0 12 12" refX="10.5" refY="6"
markerWidth="12" markerHeight="12" orient="auto" markerUnits="userSpaceOnUse"><path d="M1,1.5 L11,6 L1,10.5 Z" fill="#374151"/></marker><!-- BPMN message-flow head: open (hollow) triangle --><marker id="bpmn-msg-end" viewBox="0 0 14 14" refX="12" refY="7"
markerWidth="13" markerHeight="13" orient="auto" markerUnits="userSpaceOnUse"><path d="M1.5,2 L12,7 L1.5,12 Z" fill="#ffffff" stroke="#374151" stroke-width="1.2"/></marker><!-- BPMN message-flow tail: small hollow circle --><marker id="bpmn-msg-start" viewBox="0 0 12 12" refX="6" refY="6"
markerWidth="11" markerHeight="11" orient="auto" markerUnits="userSpaceOnUse"><circle cx="6" cy="6" r="3.6" fill="#ffffff" stroke="#374151" stroke-width="1.2"/></marker><!-- BPMN association head: thin open V --><marker id="bpmn-assoc-end" viewBox="0 0 12 10" refX="10" refY="5"
markerWidth="11" markerHeight="11" orient="auto" markerUnits="userSpaceOnUse"><path d="M2,1 L11,5 L2,9" fill="none" stroke="#6b7280" stroke-width="1.3"
stroke-linecap="round" stroke-linejoin="round"/></marker></defs><rect width="1030" height="530" fill="#fafafa"/><rect width="1030" height="530" class="bg-grid"/><!-- title block (top, fixed) --><!-- content (auto-translated down by title_block_h) --><!-- region rects --><rect class="region-rect region-rect--pool" x="30" y="30" width="970" height="60"/><line class="bpmn-pool-band" x1="60" y1="30" x2="60" y2="90"/><rect class="region-rect region-rect--pool" x="30" y="120" width="970" height="380"/><line class="bpmn-pool-band" x1="60" y1="120" x2="60" y2="500"/><rect class="region-rect region-rect--lane" x="60" y="120" width="940" height="180"/><line class="bpmn-lane-band" x1="90" y1="120" x2="90" y2="300"/><rect class="region-rect region-rect--lane" x="60" y="300" width="940" height="200"/><line class="bpmn-lane-band" x1="90" y1="300" x2="90" y2="500"/><!-- edges --><path class="bpmn-flow bpmn-flow--message" d="M 118,90 L 118,192" marker-start="url(#bpmn-msg-start)" marker-end="url(#bpmn-msg-end)"/><path class="bpmn-flow bpmn-flow--message" d="M 592,350 L 592,90" marker-start="url(#bpmn-msg-start)" marker-end="url(#bpmn-msg-end)"/><path class="bpmn-flow" d="M 136,210 L 190,210" marker-end="url(#bpmn-seq-end)"/><path class="bpmn-flow" d="M 290,210 L 350,210" marker-end="url(#bpmn-seq-end)"/><path class="bpmn-flow" d="M 375,235 L 375,305 L 240,305 L 240,350" marker-end="url(#bpmn-seq-end)"/><text class="bpmn-flow-label" x="391" y="267"> yes </text><path class="bpmn-flow" d="M 400,210 L 470,210" marker-end="url(#bpmn-seq-end)"/><line class="bpmn-flow" x1="409.0" y1="205.0" x2="419.0" y2="215.0"/><text class="bpmn-flow-label" x="434" y="195"> no </text><path class="bpmn-flow" d="M 570,210 L 640,210" marker-end="url(#bpmn-seq-end)"/><path class="bpmn-flow" d="M 290,390 L 350,390" marker-end="url(#bpmn-seq-end)"/><path class="bpmn-flow" d="M 450,390 L 510,390" marker-end="url(#bpmn-seq-end)"/><path class="bpmn-flow" d="M 610,390 L 680,390" marker-end="url(#bpmn-seq-end)"/><path class="bpmn-flow bpmn-flow--assoc" d="M 420,430 L 500,446"/><!-- components --><circle class="bpmn-event bpmn-event--start" cx="118" cy="210" r="18"/><g transform="translate(118, 210)"><g class="bpmn-marker" stroke="#4b5563"><rect x="-11.34" y="-7.94" width="22.68" height="15.88" rx="1"/><path d="M-11.34,-7.94 L0,1.19 L11.34,-7.94"/></g></g><text class="bpmn-label--out" x="118" y="238.03"> Order </text><text class="bpmn-label--out" x="118" y="252.03"> received </text><rect class="bpmn-task" x="190" y="170" width="100" height="80" rx="9"/><g class="bpmn-marker" transform="translate(194, 174)"><circle cx="7" cy="4.5" r="3"/><path d="M1.5,14 C1.5,9.5 12.5,9.5 12.5,14"/></g><text class="bpmn-label" x="240" y="210.88"> Review </text><text class="bpmn-label" x="240" y="225.88"> order </text><polygon class="bpmn-gateway" points="375,185 400,210 375,235 350,210"/><text class="bpmn-label--out" x="375" y="252.03"> Approved? </text><rect class="bpmn-task" x="470" y="170" width="100" height="80" rx="9"/><g class="bpmn-marker" transform="translate(474, 174)"><circle cx="7" cy="4.5" r="3"/><path d="M1.5,14 C1.5,9.5 12.5,9.5 12.5,14"/></g><text class="bpmn-label" x="520" y="210.88"> Notify </text><text class="bpmn-label" x="520" y="225.88"> customer </text><circle class="bpmn-event bpmn-event--end" cx="658" cy="210" r="18"/><text class="bpmn-label--out" x="658" y="238.03"> Order </text><text class="bpmn-label--out" x="658" y="252.03"> rejected </text><rect class="bpmn-task" x="190" y="350" width="100" height="80" rx="9"/><g class="bpmn-marker" transform="translate(194, 354)"><path d="M7,1 L9,2 L11,1.5 L12,3.5 L13.5,5 L13,7 L13.5,9 L12,10.5 L11,12.5 L9,12 L7,13 L5,12 L3,12.5 L2,10.5 L0.5,9 L1,7 L0.5,5 L2,3.5 L3,1.5 L5,2 Z" /><circle cx="7" cy="7" r="2.6"/></g><text class="bpmn-label" x="240" y="390.88"> Reserve </text><text class="bpmn-label" x="240" y="405.88"> stock </text><rect class="bpmn-task" x="350" y="350" width="100" height="80" rx="9"/><g class="bpmn-marker" transform="translate(354, 354)"><path d="M3,7 L3,4.2 M5.5,7 L5.5,3 M8,7 L8,3 M10.5,7 L10.5,4.2"/><path d="M3,7 L3,10 C3,13.5 11,13.5 11,10 L11,6"/><path d="M3,8 L1.3,9.6"/></g><text class="bpmn-label" x="400" y="398.38"> Pack items </text><rect class="bpmn-task" x="510" y="350" width="100" height="80" rx="9"/><g class="bpmn-marker--fill" transform="translate(514, 354)"><path d="M0,1 L14,1 L14,11 L0,11 Z"/><path d="M0,1 L7,7 L14,1" fill="none" stroke="#ffffff" stroke-width="1"/></g><text class="bpmn-label" x="560" y="390.88"> Dispatch </text><text class="bpmn-label" x="560" y="405.88"> shipment </text><circle class="bpmn-event bpmn-event--end" cx="698" cy="390" r="18"/><text class="bpmn-label--out" x="698" y="425.02"> Shipped </text><path class="bpmn-data" d="M215,456 A25,10 0 0 0 265,456 L265,486 A25,10 0 0 1 215,486 Z"/><path class="bpmn-data" fill="none" d="M215,456 A25,10 0 0 0 265,456"/><text class="bpmn-label--out" x="240" y="513.02"> Inventory </text><path class="bpmn-data" d="M382,446 L406.48,446 L418,457.52 L418,496 L382,496 Z"/><path class="bpmn-data" d="M406.48,446 L406.48,457.52 L418,457.52"/><text class="bpmn-label--out" x="400" y="506.02"> Shipping </text><text class="bpmn-label--out" x="400" y="520.02"> label </text><path class="bpmn-marker" stroke="#6b7280" d="M498,446 L490,446 L490,490 L498,490"/><text class="bpmn-anno-text" x="503" y="458"> Fragile goods — manual </text><text class="bpmn-anno-text" x="503" y="472.5"> quality check </text><!-- region labels (drawn last so they sit on top of crossing arrows) --><text class="bpmn-pool-label" x="45" y="60" text-anchor="middle" transform="rotate(-90 45 60)"> Customer </text><text class="bpmn-pool-label" x="45" y="310" text-anchor="middle" transform="rotate(-90 45 310)"> Online Shop </text><text class="bpmn-pool-label" x="75" y="210" text-anchor="middle" transform="rotate(-90 75 210)"> Sales </text><text class="bpmn-pool-label" x="75" y="400" text-anchor="middle" transform="rotate(-90 75 400)"> Fulfilment </text></svg>
