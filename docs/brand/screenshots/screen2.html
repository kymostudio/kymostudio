<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KymoStudio — complex sequence diagram (WYSIWYG)</title>
<script>
  if(/(?:^|[?&])embed\b/.test(location.search))document.documentElement.classList.add('embed');
</script>
<style>
  :root{
    --bg:#ececec; --titlebar:#e9e9ea; --panel:#fff;
    --ink:#1c1c1e; --ink-soft:#3a3a3c; --muted:#8a8a8e; --muted2:#a9a9ad;
    --line:#e9e9ec; --hover:#f3f3f5; --navy:#242131;
    --green:#34c759; --green-ink:#1f9d4d; --blue-ink:#2f6fed; --teal-ink:#0e8aa0;
    --pink:#fde7ef; --pink-ink:#e0095f;
    --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Monaco,Consolas,monospace;
    --font:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}

  /* ---------- 3-layer presentation mockup ---------- */
  html{background:#000}
  html,body{width:100%;height:100%;overflow:hidden}
  body{
    margin:0;font-family:var(--font);color:var(--ink);background:#000;
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
    display:flex;align-items:center;justify-content:center;width:100vw;height:100vh;
  }
  .mat{padding:80px 96px;background:#d6d6d8;border-radius:28px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px}

  /* scene controller */
  .scenebar{display:flex;align-items:center;gap:5px;background:#fff;border-radius:14px;padding:6px;box-shadow:0 8px 24px -8px rgba(0,0,0,.30),0 0 0 .5px rgba(0,0,0,.06)}
  .sc-ctrl{width:30px;height:30px;border:none;border-radius:9px;background:#f1f1f3;color:#5a5a5f;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0}
  .sc-ctrl:hover{background:#e9e9ec}
  .sc-ctrl svg{width:15px;height:15px}
  .sc-play.on{background:var(--pink);color:var(--pink-ink)}
  .sc-sep{width:1px;height:22px;background:var(--line);margin:0 3px}
  .scene-btn{height:30px;padding:0 12px 0 8px;border:none;border-radius:9px;background:transparent;color:var(--ink-soft);font:600 12.5px var(--font);cursor:pointer;display:flex;align-items:center;gap:7px;white-space:nowrap}
  .scene-btn:hover{background:var(--hover)}
  .scene-btn .g{width:18px;height:18px;display:flex;align-items:center;justify-content:center;color:#8a8a8e}
  .scene-btn .g svg{width:16px;height:16px}
  .scene-btn.active{background:var(--pink);color:var(--pink-ink)}
  .scene-btn.active .g{color:var(--pink-ink)}

  /* window */
  .window{width:1280px;height:720px;background:var(--bg);border-radius:16px;box-shadow:0 24px 60px -12px rgba(0,0,0,.35),0 0 0 .5px rgba(0,0,0,.10);overflow:hidden;position:relative;display:flex;flex-direction:column}
  html.embed,html.embed body{background:transparent}
  html.embed .mat{padding:0;background:transparent;border-radius:0;gap:0}
  html.embed .scenebar{display:none}
  html.embed .window{box-shadow:none}

  /* titlebar */
  .titlebar{height:44px;flex:none;display:flex;align-items:center;gap:10px;padding:0 14px 0 13px;background:var(--titlebar);position:relative}
  .traffic{display:flex;gap:8px;align-items:center;margin-right:6px}
  .dot{width:12px;height:12px;border-radius:50%}
  .dot.r{background:#ff5f57;box-shadow:inset 0 0 0 .5px rgba(0,0,0,.10)}
  .dot.y{background:#febc2e;box-shadow:inset 0 0 0 .5px rgba(0,0,0,.10)}
  .dot.g{background:#28c840;box-shadow:inset 0 0 0 .5px rgba(0,0,0,.10)}
  .tb-logo{width:18px;height:18px;border-radius:18%;display:block;flex:none;margin-right:2px;box-shadow:0 1px 2px rgba(0,0,0,.14)}
  .ed-tabs{display:flex;align-items:center;gap:3px;flex:none}
  .ed-tab{height:26px;display:flex;align-items:center;gap:7px;padding:0 11px;border-radius:8px;font:600 12.5px var(--font);color:var(--ink);white-space:nowrap;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.06),inset 0 0 0 .5px rgba(0,0,0,.07)}
  .ed-tab .ic{width:11px;height:11px;border-radius:3px;flex:none}
  .tb-plus{width:25px;height:25px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--muted2)}
  .tb-plus svg{width:16px;height:16px}
  .tb-right{margin-left:auto;display:flex;align-items:center;gap:6px}
  .src-toggle{height:26px;display:flex;align-items:center;gap:6px;padding:0 10px;border-radius:8px;font:600 11.5px var(--font);color:#6f6f74;cursor:pointer;background:rgba(0,0,0,.04)}
  .src-toggle:hover{background:rgba(0,0,0,.07)}
  .src-toggle svg{width:13px;height:13px}
  .src-toggle.on{background:var(--pink);color:var(--pink-ink)}
  .iconbtn{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#6f6f74}
  .iconbtn svg{width:16px;height:16px}

  /* body */
  .body{display:flex;flex:1;min-height:0;overflow:hidden}
  .rail{width:48px;flex:none;background:#f1f1f3;border-right:.5px solid var(--line);display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 0}
  .rail .klogo{width:28px;height:28px;border-radius:18%;margin-bottom:8px;display:block;box-shadow:0 1px 2px rgba(0,0,0,.12)}
  .railbtn{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:#80808a}
  .railbtn svg{width:19px;height:19px}
  .railbtn.active{color:var(--pink-ink);background:var(--pink)}
  .railspring{flex:1}

  /* canvas */
  .canvas{flex:1;display:flex;flex-direction:column;min-width:0;background:#fbfbfc}
  .canvas-top{height:40px;flex:none;display:flex;align-items:center;gap:10px;padding:0 14px;border-bottom:.5px solid var(--line);background:var(--panel)}
  .diag-title{font-size:13px;font-weight:700;color:var(--ink)}
  .kind-badge{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:var(--pink-ink);background:var(--pink);padding:3px 9px 3px 8px;border-radius:999px}
  .kind-badge .kd{width:7px;height:7px;border-radius:2px;background:var(--pink-ink)}
  .cspring{flex:1}
  .ctools{display:flex;align-items:center;gap:1px;color:var(--muted)}
  .ct{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center}
  .ct.on{color:var(--pink-ink);background:var(--pink)}
  .ct svg{width:16px;height:16px}
  .pct{font-size:12px;font-weight:600;color:var(--muted);padding:0 7px}
  .canvas-stage{flex:1;position:relative;overflow:hidden;background-color:#fbfbfc;background-image:radial-gradient(circle,#e0e0e6 1.1px,transparent 1.1px);background-size:22px 22px}
  .cam{position:absolute;left:0;top:0;transform-origin:0 0;transition:transform .6s cubic-bezier(.45,.05,.2,1)}

  /* palette — element catalogue */
  .palette{position:absolute;left:24px;top:50%;transform:translateY(-50%);width:166px;z-index:6;background:#fff;border-radius:15px;padding:11px 11px 9px;box-shadow:0 16px 38px -12px rgba(0,0,0,.24),0 0 0 .5px rgba(0,0,0,.06);max-height:calc(100% - 28px);overflow:hidden}
  .palette-h{font:700 9.5px var(--font);color:var(--muted2);letter-spacing:.07em;margin:2px 3px 7px}
  .palette-h.mt{margin-top:11px}
  .pgrid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
  .chip{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;height:46px;border-radius:9px;background:#fbfbfc;border:1px solid var(--line);cursor:grab;font:600 9px var(--font);color:var(--ink-soft);text-align:center;transition:transform .15s,box-shadow .15s,background .2s}
  .chip .ci{width:22px;height:18px;display:flex;align-items:center;justify-content:center}
  .chip .ci svg{width:18px;height:18px;color:var(--navy)}
  .chip.grab{background:#fff;transform:translateY(-1px) scale(1.04);box-shadow:0 0 0 2px rgba(224,9,95,.55),0 7px 14px -6px rgba(0,0,0,.22);z-index:2}
  .chip.grab .ci svg{color:var(--pink-ink)}

  /* drag preview */
  .drag-preview{position:absolute;left:0;top:0;z-index:55;pointer-events:none;opacity:0;display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 12px;border-radius:10px;background:#fff;box-shadow:0 10px 22px -6px rgba(0,0,0,.30),0 0 0 .5px rgba(0,0,0,.10);font:600 9px var(--font);color:var(--ink);white-space:nowrap;transition:transform .5s cubic-bezier(.45,.05,.2,1),opacity .2s}
  .drag-preview .ci svg{width:18px;height:18px;color:var(--pink-ink)}

  /* ---- diagram SVG element styles ---- */
  .slot{fill:none;stroke:var(--pink-ink);stroke-width:1.5;stroke-dasharray:6 5;opacity:0}
  .slot.hot{opacity:.9;animation:slotpulse 1.1s ease-in-out infinite}
  @keyframes slotpulse{0%,100%{opacity:.45}50%{opacity:.95}}

  .fg{opacity:0}
  .fg.show{animation:pop .42s both}

  .boxframe{fill:rgba(120,120,140,.05);stroke:#c2c4d0;stroke-width:1.3}
  .boxtab{fill:#eceef4;stroke:#c2c4d0;stroke-width:1}
  .boxkw{fill:#5b5870;font:800 11px var(--font)}

  .lifeline{stroke:#cdced6;stroke-width:1.5;stroke-dasharray:4 5}
  .seq-box{fill:#fff;stroke:var(--navy);stroke-width:1.6}
  .seq-focus{fill:var(--pink-ink);stroke:var(--pink-ink)}
  .seq-name{fill:var(--navy);font:700 12px var(--font);text-anchor:middle}
  .seq-name.on{fill:#fff}
  .seq-st{fill:var(--muted2);font:italic 600 8.5px var(--font);text-anchor:middle}
  .seq-st.on{fill:rgba(255,255,255,.8)}
  .seq-ic{fill:none;stroke:var(--navy);stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
  .seq-ic.on{stroke:#fff}
  .actor{fill:none;stroke:var(--navy);stroke-width:1.9;stroke-linecap:round}

  .act-bar{fill:#eef0f7;stroke:#b3b6c6;stroke-width:1.1}
  .destroy-x{stroke:var(--pink-ink);stroke-width:2.4;stroke-linecap:round}

  /* messages */
  .edge .mline{fill:none;stroke:var(--navy);stroke-width:1.7;stroke-linecap:round;stroke-dasharray:1;stroke-dashoffset:1}
  .edge.show .mline{animation:edgedraw .42s ease forwards}
  .edge.reply .mline,.edge.async .mline{stroke:#5b5870}
  .edge.reply .mline{stroke-dasharray:6 5;stroke-dashoffset:0;opacity:0}
  .edge.reply.show .mline{animation:fadein .36s ease both}
  .mhead{fill:var(--navy)}
  .edge.reply .mhead,.edge.async .mhead{fill:#5b5870}
  .mhead-open{fill:none;stroke:#5b5870;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
  .mcross{stroke:var(--pink-ink);stroke-width:2;stroke-linecap:round}
  .edge .mhead,.edge .mhead-open,.edge .mcross,.edge .mlabel,.edge .mlabel-bg,.edge .autonum,.edge .autonum-t{opacity:0}
  .edge.show .mhead,.edge.show .mhead-open,.edge.show .mcross{animation:fadein .22s ease .32s both}
  .edge.show .mlabel,.edge.show .mlabel-bg{animation:fadein .22s ease .22s both}
  .edge.show .autonum,.edge.show .autonum-t{animation:fadein .22s ease .12s both}
  .mlabel{fill:#56535f;font:600 11px var(--font);text-anchor:middle}
  .mlabel.l{text-anchor:start}
  .mlabel-bg{fill:#fbfbfc}
  .autonum{fill:var(--navy)}
  .autonum-t{fill:#fff;font:800 9px var(--font);text-anchor:middle}

  /* notes */
  .note{opacity:0}
  .note.show{animation:pop .4s both}
  .note-box{fill:#fff8e1;stroke:#e6c66a;stroke-width:1.1}
  .note-txt{fill:#7a5e12;font:600 10.5px var(--font);text-anchor:middle}

  /* fragments */
  .frame{opacity:0}
  .frame.show{animation:pop .42s both}
  .frame-box{fill:none;stroke:#b3b6c6;stroke-width:1.3}
  .frame-tab{fill:#eceef4;stroke:#b3b6c6;stroke-width:1}
  .frame-kw{fill:#5b5870;font:800 10px var(--font);text-anchor:middle;letter-spacing:.02em}
  .frame-cond{fill:#56535f;font:700 10.5px var(--font)}
  .frame-div{stroke:#b3b6c6;stroke-width:1.1;stroke-dasharray:5 4;opacity:0}
  .frame-div.show{animation:fadein .3s ease both}
  .frame-divcond{fill:#56535f;font:700 10px var(--font);opacity:0}
  .frame-divcond.show{animation:fadein .3s ease both}
  .frame-divbg{opacity:0}
  .frame-divbg.show{animation:fadein .3s ease both}

  /* connection port */
  .port{fill:#fff;stroke:var(--pink-ink);stroke-width:2;opacity:0}
  .port.hot{animation:porton 1s ease both}

  /* source overlay */
  .srcpanel{position:absolute;right:0;top:0;bottom:0;width:300px;z-index:8;background:#fff;border-left:.5px solid var(--line);box-shadow:-10px 0 30px -16px rgba(0,0,0,.2);transform:translateX(100%);transition:transform .35s cubic-bezier(.45,.05,.2,1);display:flex;flex-direction:column}
  .srcpanel.on{transform:none}
  .srchead{padding:11px 16px 7px;font:600 11px var(--font);color:var(--muted2);letter-spacing:.03em;display:flex;align-items:center;gap:8px}
  .srchead .fmt{margin-left:auto;font:700 10px var(--font);color:var(--pink-ink);background:var(--pink);padding:2px 8px;border-radius:6px}
  .srcbody{flex:1;overflow:auto;padding:2px 14px 14px;font-family:var(--mono);font-size:11px;line-height:1.7;white-space:pre;color:var(--ink-soft)}
  .srcbody .k{color:var(--pink-ink)}.srcbody .t{color:var(--teal-ink)}.srcbody .s{color:var(--green-ink)}.srcbody .a{color:#8a5cf0}.srcbody .m{color:var(--muted2)}

  /* ghost */
  .ghost{position:absolute;left:0;top:0;z-index:60;pointer-events:none;opacity:0;display:flex;align-items:flex-start;filter:drop-shadow(0 3px 5px rgba(0,0,0,.22));transition:transform .4s cubic-bezier(.45,.05,.2,1),opacity .25s ease}
  .ghost svg{width:23px;height:23px;display:block}
  .ghost .tag{margin:15px 0 0 -3px;background:var(--pink-ink);color:#fff;font-size:11px;font-weight:700;padding:2px 8px;border-radius:9px;border-top-left-radius:3px;white-space:nowrap}
  .ghost .ring{position:absolute;left:2px;top:2px;width:10px;height:10px;border-radius:50%;border:2px solid var(--pink-ink);opacity:0}
  .ghost .ring.tap{animation:tap .55s ease-out}
  @keyframes tap{0%{opacity:.6;transform:scale(.35)}100%{opacity:0;transform:scale(2.7)}}

  @keyframes edgedraw{to{stroke-dashoffset:0}}
  @keyframes pop{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
  @keyframes fadein{from{opacity:0}to{opacity:1}}
  @keyframes porton{0%{opacity:0;transform:scale(.4)}30%{opacity:1;transform:scale(1.1)}70%{opacity:1;transform:scale(1)}100%{opacity:0}}
</style>
</head>
<body>
<div class="mat">

  <div class="scenebar">
    <button class="sc-ctrl sc-prev" title="Replay"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>
    <button class="sc-ctrl sc-play" title="Play"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 5l12 7-12 7z"/></svg></button>
    <span class="sc-sep"></span>
    <button class="scene-btn" data-scene="0"><span class="g"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M5 4v16M14 4v16"/><path d="M5 10h7M12 10l-3-2.4M12 10l-3 2.4"/></svg></span>Messages</button>
    <button class="scene-btn" data-scene="1"><span class="g"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 11h18M7 4v3"/></svg></span>Fragments</button>
    <button class="scene-btn" data-scene="2"><span class="g"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M12 4v16" stroke-dasharray="3 2"/></svg></span>Advanced</button>
    <span class="sc-sep"></span>
    <button class="sc-ctrl sc-next" title="Replay"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></button>
  </div>

<div class="window">

  <div class="titlebar">
    <div class="traffic"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span></div>
    <svg class="tb-logo" viewBox="0 0 100 100" aria-hidden="true">
      <rect width="100" height="100" rx="18" fill="#e0095f"/>
      <g transform="translate(50 50) scale(0.98) translate(-50 -50)">
        <line x1="33" y1="26.5" x2="33" y2="73.5" stroke="#fff" stroke-width="11.5" stroke-linecap="round"/>
        <line x1="65.5" y1="27" x2="34" y2="58.5" stroke="#fff" stroke-width="11.5" stroke-linecap="round"/>
        <line x1="48" y1="49.5" x2="67" y2="73" stroke="#fff" stroke-width="11.5" stroke-linecap="round"/>
        <circle cx="33" cy="26.5" r="5.8" fill="#fff"/><circle cx="33" cy="26.5" r="2.44" fill="#e0095f"/>
        <circle cx="65.5" cy="27" r="5.8" fill="#fff"/><circle cx="65.5" cy="27" r="2.44" fill="#e0095f"/>
        <circle cx="33" cy="73.5" r="5.8" fill="#fff"/><circle cx="33" cy="73.5" r="2.44" fill="#e0095f"/>
        <circle cx="34" cy="58.5" r="5.8" fill="#fff"/><circle cx="34" cy="58.5" r="2.44" fill="#e0095f"/>
        <circle cx="48" cy="49.5" r="5.8" fill="#fff"/><circle cx="48" cy="49.5" r="2.44" fill="#e0095f"/>
        <circle cx="67" cy="73" r="5.8" fill="#fff"/><circle cx="67" cy="73" r="2.44" fill="#e0095f"/>
      </g>
    </svg>
    <div class="ed-tabs"><div class="ed-tab"><span class="ic" style="background:#e0095f"></span>chat-flow.kymo</div></div>
    <div class="tb-plus"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></div>
    <div class="tb-right">
      <div class="src-toggle" title="View Mermaid source"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 8-4 4 4 4M15 8l4 4-4 4"/></svg>Source</div>
      <div class="iconbtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg></div>
    </div>
  </div>

  <div class="body">
    <div class="rail">
      <svg class="klogo" viewBox="0 0 100 100" aria-hidden="true">
        <rect width="100" height="100" rx="18" fill="#e0095f"/>
        <g transform="translate(50 50) scale(0.98) translate(-50 -50)">
          <line x1="33" y1="26.5" x2="33" y2="73.5" stroke="#fff" stroke-width="11.5" stroke-linecap="round"/>
          <line x1="65.5" y1="27" x2="34" y2="58.5" stroke="#fff" stroke-width="11.5" stroke-linecap="round"/>
          <line x1="48" y1="49.5" x2="67" y2="73" stroke="#fff" stroke-width="11.5" stroke-linecap="round"/>
          <circle cx="33" cy="26.5" r="5.8" fill="#fff"/><circle cx="33" cy="26.5" r="2.44" fill="#e0095f"/>
          <circle cx="65.5" cy="27" r="5.8" fill="#fff"/><circle cx="65.5" cy="27" r="2.44" fill="#e0095f"/>
          <circle cx="33" cy="73.5" r="5.8" fill="#fff"/><circle cx="33" cy="73.5" r="2.44" fill="#e0095f"/>
          <circle cx="34" cy="58.5" r="5.8" fill="#fff"/><circle cx="34" cy="58.5" r="2.44" fill="#e0095f"/>
          <circle cx="48" cy="49.5" r="5.8" fill="#fff"/><circle cx="48" cy="49.5" r="2.44" fill="#e0095f"/>
          <circle cx="67" cy="73" r="5.8" fill="#fff"/><circle cx="67" cy="73" r="2.44" fill="#e0095f"/>
        </g>
      </svg>
      <div class="railbtn active" title="Select / move"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3l7.5 18 2.2-7.3L20 11.5z"/></svg></div>
      <div class="railbtn" title="Shapes"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg></div>

<script>
(function(){
  var NS = 'http://www.w3.org/2000/svg';
  var win = document.querySelector('.window');
  var stage = document.querySelector('.canvas-stage');
  var cam = document.querySelector('.cam');
  var svg = document.querySelector('.diagram');
  var paletteEl = document.querySelector('.palette');
  var preview = document.querySelector('.drag-preview');
  var ghost = document.querySelector('.ghost');
  var ring = ghost.querySelector('.ring');
  var playBtn = document.querySelector('.sc-play');

  var diagTitle = document.querySelector('.diag-title');
  function S(tag, attrs, kids){ var e = document.createElementNS(NS, tag); if(attrs) for(var k in attrs) e.setAttribute(k, attrs[k]); if(kids) kids.forEach(function(c){ e.appendChild(c); }); return e; }
  function TX(x, y, cls, txt, anchor){ var t = S('text', {x:x, y:y, 'class':cls}); if(anchor) t.setAttribute('text-anchor', anchor); t.textContent = txt; return t; }

  /* ============================ SCENES ============================ */
  // Three scenes that progressively review the sequence-diagram vocabulary.
  var SCENES = [
    { id:'msg', label:'Messages', title:'AI chat · basic flow', autonum:false,
      parts:[ {id:'U',label:'User',st:'actor'}, {id:'App',label:'Chat App',st:'boundary'},
              {id:'API',label:'Chat API',st:'control',focus:true}, {id:'M',label:'Model',st:'participant'} ],
      boxes:[],
      ops:[
        {t:'note', over:['App','API'], text:'live SSE stream'},
        {t:'msg', from:'U',   to:'App', kind:'sync',  text:'Ask a question', act:'App'},
        {t:'msg', from:'App', to:'API', kind:'sync',  text:'POST /chat', act:'API'},
        {t:'msg', from:'API', to:'M',   kind:'sync',  text:'infer', act:'M'},
        {t:'msg', from:'M',   to:'API', kind:'reply', text:'tokens', deact:'M'},
        {t:'note', side:'right', part:'API', text:'stream to client'},
        {t:'msg', from:'API', to:'App', kind:'reply', text:'stream', deact:'API'},
        {t:'msg', from:'App', to:'U',   kind:'reply', text:'answer', deact:'App'}
      ] },
    { id:'frag', label:'Fragments', title:'AI chat · cache & retrieval logic', autonum:true,
      parts:[ {id:'U',label:'User',st:'actor'}, {id:'App',label:'Chat App',st:'boundary'},
              {id:'API',label:'Chat API',st:'control',focus:true}, {id:'Cache',label:'Cache',st:'entity'},
              {id:'VS',label:'Vector Store',st:'database'} ],
      boxes:[],
      ops:[
        {t:'msg', from:'U',   to:'App', kind:'sync', text:'Ask', act:'App'},
        {t:'msg', from:'App', to:'API', kind:'sync', text:'POST /chat', act:'API'},
        {t:'frag', kind:'opt', label:'authenticated'},
          {t:'msg', from:'API', to:'Cache', kind:'sync', text:'check session'},
        {t:'end'},
        {t:'frag', kind:'alt', label:'cache hit'},
          {t:'msg', from:'API',   to:'Cache', kind:'sync',  text:'get(key)', act:'Cache'},
          {t:'msg', from:'Cache', to:'API',   kind:'reply', text:'value', deact:'Cache'},
        {t:'div', kind:'else', label:'cache miss'},
          {t:'frag', kind:'loop', label:'every shard'},
            {t:'msg', from:'API', to:'VS',  kind:'sync',  text:'embed & search', act:'VS'},
            {t:'msg', from:'VS',  to:'API', kind:'reply', text:'top-k', deact:'VS'},
          {t:'end'},
        {t:'end'},
        {t:'frag', kind:'loop', label:'every token'},
          {t:'msg', from:'API', to:'App', kind:'reply', text:'token'},
        {t:'end'},
        {t:'msg', from:'API', to:'App', kind:'reply', text:'answer', deact:'API'},
        {t:'msg', from:'App', to:'U',   kind:'reply', text:'done', deact:'App'}
      ] },
    { id:'adv', label:'Advanced', title:'AI chat · RAG with async rerank', autonum:true,
      parts:[ {id:'U',label:'User',st:'actor'}, {id:'App',label:'Chat App',st:'boundary'},
              {id:'API',label:'Chat API',st:'control',focus:true}, {id:'Cache',label:'Cache',st:'entity',box:'ret'},
              {id:'VS',label:'Vector Store',st:'database',box:'ret'}, {id:'JQ',label:'Job Queue',st:'queue',box:'async'},
              {id:'Wk',label:'Workers',st:'collections',box:'async'}, {id:'W',label:'Worker',st:'participant',box:'async',created:true} ],
      boxes:[ {id:'ret',label:'Retrieval',from:'Cache',to:'VS'}, {id:'async',label:'Async workers',from:'JQ',to:'W'} ],
      ops:[
        {t:'note', over:['App','API'], text:'streamed over SSE'},
        {t:'msg', from:'U',   to:'App', kind:'sync',  text:'Ask a question', act:'App'},
        {t:'msg', from:'App', to:'API', kind:'bi',    text:'open chat · handshake'},
        {t:'msg', from:'App', to:'API', kind:'sync',  text:'POST /chat', act:'API'},
        {t:'frag', kind:'opt', label:'authenticated'},
          {t:'msg', from:'API', to:'Cache', kind:'sync', text:'check session'},
        {t:'end'},
        {t:'frag', kind:'alt', label:'cache hit'},
          {t:'msg', from:'API',   to:'Cache', kind:'sync',  text:'get(key)', act:'Cache'},
          {t:'msg', from:'Cache', to:'API',   kind:'reply', text:'value', deact:'Cache'},
        {t:'div', kind:'else', label:'cache miss'},
          {t:'frag', kind:'loop', label:'every shard'},
            {t:'msg', from:'API', to:'VS',  kind:'sync',  text:'embed & search', act:'VS'},
            {t:'msg', from:'VS',  to:'API', kind:'reply', text:'top-k chunks', deact:'VS'},
          {t:'end'},
        {t:'end'},
        {t:'frag', kind:'par', label:'fan-out rerank'},
          {t:'msg', from:'API', to:'JQ', kind:'async', text:'enqueue rerank'},
        {t:'div', kind:'and', label:''},
          {t:'msg', from:'JQ', to:'Wk', kind:'async', text:'dispatch batch'},
          {t:'create', part:'W', from:'Wk', text:'spawn worker'},
          {t:'msg', from:'W', to:'API', kind:'reply', text:'reranked'},
        {t:'end'},
        {t:'frag', kind:'critical', label:'DB available'},
          {t:'msg', from:'API', to:'VS', kind:'sync', text:'persist trace'},
        {t:'div', kind:'option', label:'timeout'},
          {t:'msg', from:'API', to:'API', kind:'sync', text:'retry once', act:'API'},
        {t:'end'},
        {t:'note', side:'right', part:'API', text:'stream tokens'},
        {t:'frag', kind:'loop', label:'every token'},
          {t:'msg', from:'API', to:'App', kind:'reply', text:'token'},
        {t:'end'},
        {t:'frag', kind:'break', label:'on stream error'},
          {t:'msg', from:'API', to:'App', kind:'cross', text:'abort'},
        {t:'end'},
        {t:'destroy', part:'W'},
        {t:'msg', from:'API', to:'App', kind:'reply', text:'final answer', deact:'API'},
        {t:'msg', from:'App', to:'U',   kind:'reply', text:'done', deact:'App'}
      ] }
  ];

  /* ============================ GEOMETRY + GENERATOR ============================ */
  var COL0 = 92, COLW = 132, HEAD_Y = 24, HEAD_H = 40, TOP = 132, ROW = 30;
  var HEAD_CY = HEAD_Y - 2 + HEAD_H/2;
  // module state, (re)built per scene by genScene()
  var PARTS, BOXES, OPS, AUTON, px, W, H, frames, acts, stepEls, allDivs;

  function arrowHead(kind, x, y, dir){
    var s = 9 * dir;
    if(kind === 'cross') return [S('path', {'class':'mcross', d:'M'+(x-6)+','+(y-6)+' l12,12 M'+(x+6)+','+(y-6)+' l-12,12'})];
    if(kind === 'async') return [S('path', {'class':'mhead-open', d:'M'+(x-s)+','+(y-4.5)+' L'+x+','+y+' L'+(x-s)+','+(y+4.5)})];
    return [S('path', {'class':'mhead', d:'M'+x+','+y+' l'+(-s)+',-4.5 v9 z'})];
  }
  function labelBg(cx, y, txt){ var w = Math.max(28, txt.length * 6.0 + 10); return [S('rect', {'class':'mlabel-bg', x:cx-w/2, y:y-18, width:w, height:15, rx:4}), TX(cx, y-7, 'mlabel', txt)]; }
  function stereoGlyph(p, cx, on){
    var g = S('g'), ic = 'seq-ic' + (on ? ' on' : ''), y0 = HEAD_Y;
    function add(tag, a){ a['class'] = ic; g.appendChild(S(tag, a)); }
    if(p.st === 'boundary'){ add('path', {d:'M'+(cx-22)+','+(y0+4)+' v22 M'+(cx-22)+','+(y0+15)+' h7'}); add('circle', {cx:cx-8, cy:y0+15, r:6.5}); }
    else if(p.st === 'control'){ add('circle', {cx:cx-6, cy:y0+16, r:7}); add('path', {d:'M'+(cx-6)+','+(y0+9)+' l-2.6,1.4 M'+(cx-6)+','+(y0+9)+' l1.2,2.6'}); }
    else if(p.st === 'entity'){ add('circle', {cx:cx-8, cy:y0+13, r:6.2}); add('path', {d:'M'+(cx-17)+','+(y0+24)+' h18'}); }
    else if(p.st === 'database'){ add('ellipse', {cx:cx-8, cy:y0+8, rx:6.5, ry:2.5}); add('path', {d:'M'+(cx-14.5)+','+(y0+8)+' v15 a6.5,2.5 0 0 0 13,0 v-15'}); }
    else if(p.st === 'collections'){ add('rect', {x:cx-18, y:y0+9, width:13, height:11, rx:1.5}); add('rect', {x:cx-13, y:y0+5, width:13, height:11, rx:1.5}); }
    else if(p.st === 'queue'){ add('rect', {x:cx-20, y:y0+9, width:24, height:14, rx:7}); add('path', {d:'M'+(cx-9)+','+(y0+9)+' v14'}); }
    else { add('rect', {x:cx-19, y:y0+8, width:16, height:16, rx:2}); add('path', {d:'M'+(cx-19)+','+(y0+13)+' h16'}); }
    return g;
  }
  function addStep(s){ stepEls.push(s); return s; }
  function actBarFor(op){ for(var i=0;i<acts.length;i++){ if(acts[i].part===op.act && acts[i].start===op.y) return acts[i]._el; } return null; }

  function genScene(sc){
    PARTS = sc.parts; BOXES = sc.boxes || []; OPS = sc.ops; AUTON = !!sc.autonum;
    px = {}; PARTS.forEach(function(p, i){ px[p.id] = COL0 + i * COLW; });
    W = COL0 + (PARTS.length - 1) * COLW + 96;
    frames = []; acts = []; stepEls = []; allDivs = [];

    // pass 1 — assign rows, resolve activations / fragments / create-destroy
    var openActs = {}, fstack = [], num = 0, y = TOP, createY = {}, destroyY = {};
    OPS.forEach(function(op){
      if(op.t === 'frag'){ var f = {kind:op.kind, label:op.label, start:y, depth:fstack.length, divs:[], minx:1e9, maxx:-1e9}; frames.push(f); fstack.push(f); y += 42; return; }
      if(op.t === 'div'){ fstack[fstack.length-1].divs.push({kind:op.kind, label:op.label, y:y+6}); y += 38; return; }
      if(op.t === 'end'){ fstack.pop().end = y; y += 14; return; }
      op.y = y;
      if(op.t === 'create'){ createY[op.part] = y; }
      if(op.t === 'msg' || op.t === 'create'){
        op.num = ++num;
        var a = op.from, b = op.to || op.part;
        fstack.forEach(function(f){ f.minx = Math.min(f.minx, px[a], px[b]); f.maxx = Math.max(f.maxx, px[a], px[b]); });
        if(op.act){ var d = (openActs[op.act] ? openActs[op.act].length : 0); var bar = {part:op.act, start:y, depth:d}; acts.push(bar); (openActs[op.act] = openActs[op.act] || []).push(bar); }
        if(op.deact && openActs[op.deact] && openActs[op.deact].length){ openActs[op.deact].pop().end = y; }
      }
      if(op.t === 'destroy'){ destroyY[op.part] = y; }
      y += ROW;
    });
    H = y + 26;
    for(var kk in openActs){ openActs[kk].forEach(function(b){ if(b.end == null) b.end = H - 40; }); }

    svg.innerHTML = '';
    svg.setAttribute('width', W); svg.setAttribute('height', H); svg.setAttribute('viewBox', '0 0 ' + W + ' ' + H);

    // boxes (behind)
    BOXES.forEach(function(bx){
      var x0 = px[bx.from] - 58, x1 = px[bx.to] + 58;
      var g = S('g', {'class':'fg'});
      g.appendChild(S('rect', {'class':'boxframe', x:x0, y:10, width:(x1-x0), height:H-26, rx:10}));
      g.appendChild(S('path', {'class':'boxtab', d:'M'+x0+',10 H'+(x0+58)+' V24 L'+(x0+50)+',30 H'+x0+' Z'}));
      g.appendChild(TX(x0+27, 24, 'boxkw', bx.label.split(' ')[0]));
      svg.appendChild(g); bx._el = g;
    });

    // participant headers + lifelines
    PARTS.forEach(function(p){
      var cx = px[p.id], created = p.created;
      var g = S('g', {'class':'fg', 'data-part':p.id});
      var topY = created ? (createY[p.id] - HEAD_H/2 - 2) : HEAD_Y - 2;
      var llTop = topY + HEAD_H, llBot = (destroyY[p.id] != null ? destroyY[p.id] : H - 40);
      g.appendChild(S('line', {'class':'lifeline', x1:cx, y1:llTop, x2:cx, y2:llBot}));
      if(p.st === 'actor'){
        g.appendChild(S('circle', {'class':'actor', cx:cx, cy:topY+10, r:6.5}));
        g.appendChild(S('path', {'class':'actor', d:'M'+cx+','+(topY+16.5)+' v13 M'+(cx-12)+','+(topY+22)+' h24 M'+cx+','+(topY+29.5)+' l-9,10 M'+cx+','+(topY+29.5)+' l9,10'}));
        g.appendChild(TX(cx, topY+52, 'seq-name', p.label));
      } else {
        var foc = p.focus ? ' seq-focus' : '', on = !!p.focus;
        g.appendChild(S('rect', {'class':'seq-box'+foc, x:cx-60, y:topY, width:120, height:HEAD_H, rx:9}));
        g.appendChild(TX(cx, topY+18, 'seq-name'+(on?' on':''), p.label));
        g.appendChild(TX(cx, topY+31, 'seq-st'+(on?' on':''), '«'+p.st+'»'));
      }
      svg.appendChild(g); p._el = g;
    });

    // activation bars (under the frames so the condition labels stay readable on top)
    acts.forEach(function(b){
      b._el = S('rect', {'class':'act-bar fg', x:px[b.part] + b.depth*5 - 5, y:b.start, width:10, height:Math.max(8, (b.end||b.start+ROW) - b.start), rx:1});
      svg.appendChild(b._el);
    });

    // fragment frames — left pad keeps the keyword tab clear of the leftmost lifeline
    frames.forEach(function(f){
      var tw = Math.max(42, f.kind.length * 6.2 + 16);
      var pad = tw + 14, x0 = f.minx - pad, x1 = f.maxx + 34;
      if(f.minx > f.maxx){ x0 = px[PARTS[2].id] - pad; x1 = px[PARTS[2].id] + 60; }
      var g = S('g', {'class':'frame'});
      g.appendChild(S('rect', {'class':'frame-box', x:x0, y:f.start, width:(x1-x0), height:(f.end - f.start), rx:4}));
      g.appendChild(S('path', {'class':'frame-tab', d:'M'+x0+','+f.start+' H'+(x0+tw)+' V'+(f.start+15)+' L'+(x0+tw-8)+','+(f.start+21)+' H'+x0+' Z'}));
      g.appendChild(TX(x0+tw/2-1, f.start+14, 'frame-kw', f.kind, 'middle'));
      if(f.label){ var ct = '['+f.label+']'; g.appendChild(S('rect', {'class':'mlabel-bg', x:x0+tw+5, y:f.start+3, width:(ct.length*6.0+8), height:15, rx:3})); g.appendChild(TX(x0+tw+9, f.start+14, 'frame-cond', ct)); }
      f._divEls = [];
      f.divs.forEach(function(d){
        var ct2 = d.label ? '['+d.label+']' : d.kind;
        var dl = S('line', {'class':'frame-div', x1:x0, y1:d.y, x2:x1, y2:d.y});
        var dbg = S('rect', {'class':'mlabel-bg frame-divbg', x:x0+7, y:d.y-15, width:(ct2.length*5.8+8), height:14, rx:3});
        var dt = TX(x0+11, d.y-4, 'frame-divcond', ct2);
        g.appendChild(dl); g.appendChild(dbg); g.appendChild(dt); f._divEls.push({line:dl, txt:dt, bg:dbg, y:d.y});
      });
      svg.appendChild(g); f._el = g;
    });

    // messages / notes / create / destroy → build steps in source order
    OPS.forEach(function(op){
      if(op.t === 'frag'){ var f = frames.filter(function(fr){ return !fr._used; })[0]; fr2(f); function fr2(fr){ fr._used = true; addStep({kind:'frag', els:[fr._el], primary:fr._el}); } return; }
      if(op.t === 'div' || op.t === 'end') return;

      if(op.t === 'note'){
        var g = S('g', {'class':'note'}), cx, w;
        if(op.over){ var a = px[op.over[0]], b = px[op.over[1]]; cx = (a+b)/2; w = Math.abs(b-a) + 96; }
        else { cx = px[op.part] + 70; w = op.text.length*6.4 + 26; }
        g.appendChild(S('rect', {'class':'note-box', x:cx-w/2, y:op.y-13, width:w, height:26, rx:3}));
        g.appendChild(TX(cx, op.y+5, 'note-txt', op.text));
        svg.appendChild(g); addStep({kind:'note', els:[g], primary:g}); return;
      }
      if(op.t === 'destroy'){
        var cx2 = px[op.part], yy0 = op.y, g2 = S('g', {'class':'fg'});
        g2.appendChild(S('path', {'class':'destroy-x', d:'M'+(cx2-8)+','+(yy0-8)+' l16,16 M'+(cx2+8)+','+(yy0-8)+' l-16,16'}));
        svg.appendChild(g2); addStep({kind:'destroy', els:[g2], primary:g2}); return;
      }

      var a = px[op.from], b = px[op.to || op.part], yy = op.y, dir = (b >= a) ? 1 : -1;
      var g = S('g', {'class':'edge ' + (op.kind||'sync')});
      var bar = op.act ? actBarFor(op) : null;
      var self = (a === b), mx1, mx2;
      if(self){
        mx1 = a + 5; mx2 = a + 31;
        g.appendChild(S('path', {'class':'mline', pathLength:1, d:'M'+(a+5)+','+(yy-8)+' h26 v16 h-22'}));
        arrowHead('sync', a+9, yy+8, -1).forEach(function(h){ g.appendChild(h); });
        g.appendChild(TX(a+40, yy+2, 'mlabel l', op.text));
      } else {
        mx1 = a + dir*5; mx2 = b - dir*5;
        g.appendChild(S('line', {'class':'mline', pathLength:1, x1:mx1, y1:yy, x2:mx2, y2:yy}));
        arrowHead(op.kind, mx2, yy, dir).forEach(function(h){ g.appendChild(h); });
        if(op.kind === 'bi'){ arrowHead('sync', mx1, yy, -dir).forEach(function(h){ g.appendChild(h); }); }
        labelBg((mx1+mx2)/2, yy, op.text).forEach(function(e){ g.appendChild(e); });
      }
      if(AUTON){ var nx = a + dir*16; g.appendChild(S('circle', {'class':'autonum', cx:nx, cy:yy, r:8})); g.appendChild(TX(nx, yy+3.2, 'autonum-t', String(op.num), 'middle')); }
      svg.appendChild(g);
      var els = [g]; if(bar) els.push(bar);
      if(op.t === 'create'){ els.push(PARTS.filter(function(p){return p.id===op.part;})[0]._el); }
      addStep({kind:(op.t === 'create' ? 'create' : 'msg'), els:els, primary:g, m:{x1:mx1, x2:mx2, y:yy}});
    });

    allDivs = [];
    frames.forEach(function(f){ (f._divEls||[]).forEach(function(d){ allDivs.push(d); }); });
  }

  /* ============================ PALETTE ============================ */
  var PAL_PARTS = [
    {st:'actor', label:'Actor'}, {st:'participant', label:'Participant'},
    {st:'boundary', label:'Boundary'}, {st:'control', label:'Control'},
    {st:'entity', label:'Entity'}, {st:'database', label:'Database'},
    {st:'collections', label:'Collections'}, {st:'queue', label:'Queue'}
  ];
  var PAL_FRAG = [
    {k:'loop', label:'loop'}, {k:'alt', label:'alt'}, {k:'opt', label:'opt'},
    {k:'par', label:'par'}, {k:'critical', label:'critical'}, {k:'break', label:'break'},
    {k:'note', label:'note'}, {k:'activate', label:'activate'}
  ];
  function chipIcon(st){
    // tiny inline svg matching the stereotype/fragment
    var P = 'stroke="currentColor" fill="none" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"';
    var m = {
      actor:'<circle cx="12" cy="6.5" r="3.2"/><path d="M12 9.8v6.4M7.5 13h9M12 16.2l-3.6 4.8M12 16.2l3.6 4.8"/>',
      participant:'<rect x="4" y="5" width="16" height="11" rx="1.6"/><path d="M4 9h16M12 16v4"/>',
      boundary:'<path d="M4 6v12M4 12h5"/><circle cx="15" cy="12" r="5"/>',
      control:'<circle cx="12" cy="12.5" r="7"/><path d="M12 5.5l-2.8 1.5M12 5.5l1.3 2.8"/>',
      entity:'<circle cx="12" cy="10" r="6.2"/><path d="M4.5 19h15"/>',
      database:'<ellipse cx="12" cy="6" rx="7" ry="2.6"/><path d="M5 6v12a7 2.6 0 0 0 14 0V6"/>',
      collections:'<rect x="3" y="7" width="12" height="11" rx="1.6"/><rect x="9" y="4" width="12" height="11" rx="1.6"/>',
      queue:'<rect x="2" y="7" width="20" height="11" rx="5.5"/><path d="M14 7v11"/>',
      loop:'<path d="M5 9a7 5 0 1 1 2 6"/><path d="M7 11l-2 4-3-2"/>',
      alt:'<rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 12h18M9 4l-3 8M15 12l-3 8" stroke-dasharray="0"/>',
      opt:'<rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 10h7"/>',
      par:'<rect x="3" y="4" width="18" height="16" rx="2"/><path d="M12 4v16" stroke-dasharray="3 2"/>',
      critical:'<rect x="3" y="4" width="18" height="16" rx="2"/><path d="M12 8v4M12 15v.5"/>',
      'break':'<rect x="3" y="4" width="18" height="16" rx="2"/><path d="M8 4l8 16"/>',
      note:'<path d="M5 4h10l4 4v12H5z"/><path d="M15 4v4h4"/>',
      activate:'<rect x="9" y="3" width="6" height="18" rx="1"/>'
    };
    return '<svg viewBox="0 0 24 24" '+P+'>'+(m[st]||m.participant)+'</svg>';
  }
  function buildPalette(){
    paletteEl.innerHTML = '';
    var h1 = document.createElement('div'); h1.className='palette-h'; h1.textContent='PARTICIPANTS'; paletteEl.appendChild(h1);
    var g1 = document.createElement('div'); g1.className='pgrid'; paletteEl.appendChild(g1);
    PAL_PARTS.forEach(function(it){ var c=document.createElement('div'); c.className='chip'; c.dataset.st=it.st; c.innerHTML='<span class="ci">'+chipIcon(it.st)+'</span>'+it.label; g1.appendChild(c); });
    var h2 = document.createElement('div'); h2.className='palette-h mt'; h2.textContent='FRAGMENTS & NOTES'; paletteEl.appendChild(h2);
    var g2 = document.createElement('div'); g2.className='pgrid'; paletteEl.appendChild(g2);
    PAL_FRAG.forEach(function(it){ var c=document.createElement('div'); c.className='chip'; c.dataset.st=it.k; c.innerHTML='<span class="ci">'+chipIcon(it.k)+'</span>'+it.label; g2.appendChild(c); });
  }
  buildPalette();
  var chipByStereo = {};
  [].slice.call(paletteEl.querySelectorAll('.chip')).forEach(function(c){ chipByStereo[c.dataset.st] = c; });
  function chipFor(p){ return chipByStereo[p.st] || chipByStereo.participant; }

  /* ============================ MERMAID SOURCE (optional overlay) ============================ */
  function buildSource(){
    var L = [];
    L.push('<span class="k">sequenceDiagram</span>');
    if(AUTON) L.push('  <span class="k">autonumber</span>');
    BOXES.forEach(function(b){ L.push('  <span class="k">box</span> <span class="s">'+b.label+'</span>'); PARTS.filter(function(p){return p.box===b.id;}).forEach(function(p){ if(!p.created) L.push('    <span class="k">participant</span> <span class="t">'+p.id+'</span> <span class="k">as</span> <span class="s">'+p.label+'</span>'); }); L.push('  <span class="k">end</span>'); });
    PARTS.forEach(function(p){ if(p.box||p.created) return; var kw = p.st==='actor'?'actor':'participant'; L.push('  <span class="k">'+kw+'</span> <span class="t">'+p.id+'</span> <span class="k">as</span> <span class="s">'+p.label+'</span>'); });
    var ind = '  ';
    OPS.forEach(function(op){
      if(op.t==='frag'){ L.push(ind+'<span class="k">'+op.kind+'</span> <span class="s">'+(op.label||'')+'</span>'); ind+='  '; return; }
      if(op.t==='div'){ var i2=ind.slice(0,-2); L.push(i2+'<span class="k">'+op.kind+'</span> <span class="s">'+(op.label||'')+'</span>'); return; }
      if(op.t==='end'){ ind=ind.slice(0,-2); L.push(ind+'<span class="k">end</span>'); return; }
      if(op.t==='note'){ var tgt = op.over? ('over <span class="t">'+op.over[0]+'</span>,<span class="t">'+op.over[1]+'</span>') : ('right of <span class="t">'+op.part+'</span>'); L.push(ind+'<span class="k">Note</span> '+tgt+'<span class="m">:</span> <span class="s">'+op.text+'</span>'); return; }
      if(op.t==='destroy'){ L.push(ind+'<span class="k">destroy</span> <span class="t">'+op.part+'</span>'); return; }
      var arr = {sync:'->>', reply:'-->>', async:'-)', cross:'-x', bi:'<<->>'}[op.kind] || '->>';
      var plus = op.act?'+':(op.deact?'-':'');
      if(op.t==='create'){ L.push(ind+'<span class="k">create</span> <span class="k">participant</span> <span class="t">'+op.part+'</span>'); L.push(ind+'<span class="t">'+op.from+'</span><span class="a">'+arr+'</span><span class="t">'+op.part+'</span><span class="m">:</span> <span class="s">'+op.text+'</span>'); return; }
      L.push(ind+'<span class="t">'+op.from+'</span><span class="a">'+arr+plus+'</span><span class="t">'+op.to+'</span><span class="m">:</span> <span class="s">'+op.text+'</span>');
    });
    document.querySelector('.srcbody').innerHTML = L.join('\n');
  }
  var srcToggle = document.querySelector('.src-toggle'), srcPanel = document.querySelector('.srcpanel');
  srcToggle.addEventListener('click', function(){ srcPanel.classList.toggle('on'); srcToggle.classList.toggle('on'); camFit(); });

  /* ============================ CAMERA (follow build → zoom-to-fit) ============================ */
  var camS=1, camTx=0, camTy=0;
  function applyCam(){ cam.style.transform = 'translate('+camTx+'px,'+camTy+'px) scale('+camS+')'; }
  function availBox(){ var src = srcPanel.classList.contains('on') ? 300 : 0; return {x:210, y:16, w: Math.max(200, stage.clientWidth - 210 - 22 - src), h: Math.max(160, stage.clientHeight - 32)}; }
  function buildScale(){ var a = availBox(); return Math.min(a.w / W, 1.0); }
  function camTop(){ var a = availBox(), s = buildScale(); camS=s; camTx=a.x; camTy=a.y; applyCam(); }
  function camToRow(yy){ var a = availBox(), s = buildScale(); camS=s; camTx=a.x; var ty = a.y + a.h/2 - yy*s; camTy = Math.max(a.y + a.h - H*s, Math.min(a.y, ty)); applyCam(); }
  function camFit(){ var a = availBox(), s = Math.min(a.w / W, a.h / H, 1.15); camS=s; camTx = a.x; camTy = a.y + Math.max(0, (a.h - H*s)/2); applyCam(); }
  function svgToWin(X, Y){ var sr = stage.getBoundingClientRect(), wr = win.getBoundingClientRect(); return {x: sr.left - wr.left + camTx + X*camS, y: sr.top - wr.top + camTy + Y*camS}; }
  function elCentreWin(el){ var b; try{ b = el.getBBox(); }catch(e){ return {x:0,y:0}; } return svgToWin(b.x + b.width/2, b.y + b.height/2); }
  window.addEventListener('resize', function(){ if(!playing) camFit(); });

  /* ============================ GHOST CHOREOGRAPHY ============================ */
  var gtimers = [];
  function clearG(){ gtimers.forEach(clearTimeout); gtimers = []; }
  function at(ms, fn){ gtimers.push(setTimeout(fn, ms)); }
  function tap(){ ring.classList.remove('tap'); void ring.getBoundingClientRect(); ring.classList.add('tap'); }
  function centreOf(el){ var r = el.getBoundingClientRect(), w = win.getBoundingClientRect(); return {x:r.left-w.left+r.width/2, y:r.top-w.top+r.height/2}; }
  function moveGhost(p){ ghost.style.transform = 'translate(' + (p.x-3) + 'px,' + (p.y-4) + 'px)'; }
  function movePreview(p){ preview.style.transform = 'translate(' + (p.x-22) + 'px,' + (p.y-20) + 'px)'; }
  function showPreview(p, html){ preview.innerHTML='<span class="ci">'+html+'</span>'; preview.style.transition='none'; movePreview(p); void preview.getBoundingClientRect(); preview.style.transition=''; preview.style.opacity='1'; }

  function resetAll(){
    [].slice.call(svg.querySelectorAll('.fg,.edge,.note,.frame')).forEach(function(e){ e.classList.remove('show'); });
    [].slice.call(svg.querySelectorAll('.frame-div,.frame-divcond,.frame-divbg')).forEach(function(e){ e.classList.remove('show'); });
    [].slice.call(paletteEl.querySelectorAll('.chip')).forEach(function(c){ c.classList.remove('grab'); });
    allDivs.forEach(function(d){ d._shown=false; });
    preview.style.opacity='0'; ghost.style.opacity='0';
  }

  var HEAD_CY = HEAD_Y - 2 + HEAD_H/2;
  function build(){
    clearG(); resetAll(); camTop();
    var t = 0;

    // PHASE 1 — drag the declared participants in from the palette
    var P1 = 500, decl = PARTS.filter(function(p){ return !p.created; });
    decl.forEach(function(p, i){
      var chip = chipFor(p), b = t + i*P1;
      at(b, function(){ camTop(); moveGhost(centreOf(chip)); });
      at(b+200, function(){ tap(); chip.classList.add('grab'); showPreview(centreOf(chip), chip.querySelector('.ci').innerHTML); });
      at(b+320, function(){ var hp = svgToWin(px[p.id], HEAD_CY); movePreview(hp); moveGhost(hp); });
      at(b+660, function(){ tap(); preview.style.opacity='0'; chip.classList.remove('grab'); p._el.classList.add('show'); });
    });
    t += decl.length * P1 + 120;

    // boxes around their members
    BOXES.forEach(function(bx, i){ at(t + i*240, function(){ moveGhost(elCentreWin(bx._el)); tap(); bx._el.classList.add('show'); }); });
    t += BOXES.length*240 + 160;

    // PHASE 2 — build the body steps top→bottom, camera following
    var P2 = 540;
    stepEls.forEach(function(step, i){
      var b = t + i*P2;
      at(b, function(){
        var ry = step.m ? step.m.y : (function(){ try{ var bb = step.primary.getBBox(); return bb.y + bb.height/2; }catch(e){ return 0; } })();
        camToRow(ry);
        revealDividersUpTo(ry);
        if(step.m){
          moveGhost(svgToWin(step.m.x1, step.m.y));
          at(150, function(){ tap(); step.els.forEach(function(e){ e.classList.add('show'); }); moveGhost(svgToWin(step.m.x2, step.m.y)); });
        } else {
          moveGhost(elCentreWin(step.primary));
          at(160, function(){ tap(); step.els.forEach(function(e){ e.classList.add('show'); }); });
        }
      });
    });
    t += stepEls.length * P2;

    // zoom-to-fit reveal of the whole complex diagram, then ghost out
    at(t + 260, function(){ revealAllDividers(); camFit(); ghost.style.opacity='0'; });
    return t + 1100;
  }

  // dividers reveal once the build passes their y (allDivs is rebuilt per scene by genScene)
  function showDiv(d){ d._shown=true; d.line.classList.add('show'); d.txt.classList.add('show'); if(d.bg) d.bg.classList.add('show'); }
  function revealDividersUpTo(ry){ allDivs.forEach(function(d){ if(d.y <= ry + 2 && !d._shown){ showDiv(d); } }); }
  function revealAllDividers(){ allDivs.forEach(function(d){ if(!d._shown){ showDiv(d); } }); }

  /* ============================ PLAYBACK (3 scenes) ============================ */
  var sceneBtns = [].slice.call(document.querySelectorAll('.scene-btn'));
  var cur = 0, playing = false, timer = null;
  function setActive(n){ sceneBtns.forEach(function(btn){ btn.classList.toggle('active', +btn.getAttribute('data-scene') === n); }); }
  function render(n){
    cur = n; var sc = SCENES[n];
    genScene(sc); buildSource(); diagTitle.textContent = sc.title; setActive(n); camTop();
    return build();
  }
  function stop(){ playing=false; clearG(); if(timer){clearTimeout(timer);timer=null;} playBtn.classList.remove('on'); }
  // when embedded in the landing, signal the parent after one full cycle so it can advance tabs
  function embedded(){ try{ return window.parent && window.parent !== window; }catch(e){ return false; } }
  function cycleDone(){ if(embedded()){ try{ window.parent.postMessage({ type:'kymo-demo-done' }, '*'); }catch(e){} return true; } return false; }
  function step(n){ if(!playing) return; var dur = render(n); timer = setTimeout(function(){
    if(n >= SCENES.length - 1){ if(cycleDone()){ stop(); return; } step(0); } else step(n + 1);
  }, dur + 1500); }
  function play(){ stop(); playing=true; playBtn.classList.add('on'); step(cur); }

  sceneBtns.forEach(function(btn){ btn.addEventListener('click', function(){ stop(); render(+btn.getAttribute('data-scene')); }); });
  document.querySelector('.sc-prev').addEventListener('click', function(){ stop(); render((cur + SCENES.length - 1) % SCENES.length); });
  document.querySelector('.sc-next').addEventListener('click', function(){ stop(); render((cur + 1) % SCENES.length); });
  playBtn.addEventListener('click', function(){ playing ? stop() : play(); });

  // ?scene=N deep-links a scene; ?autoplay cycles the storyboard; default = scene 0 static
  var qScene = (location.search.match(/[?&]scene=(\d)/) || [])[1];
  var start = (qScene != null && SCENES[+qScene]) ? +qScene : 0;
  if(/(?:^|[?&])source\b/.test(location.search)){ srcPanel.classList.add('on'); srcToggle.classList.add('on'); }
  setTimeout(function(){ if(/(?:^|[?&])autoplay\b/.test(location.search)){ cur = start; play(); } else render(start); }, 40);
})();
</script>
</body>
