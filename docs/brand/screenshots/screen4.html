<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KymoStudio — BPMN collaboration (live multiplayer)</title>
<script>if(/(?:^|[?&])embed\b/.test(location.search))document.documentElement.classList.add('embed');</script>
<style>
  :root{
    --bg:#ececec; --titlebar:#e9e9ea; --panel:#fff;
    --ink:#1c1c1e; --ink-soft:#3a3a3c; --muted:#8a8a8e; --muted2:#a9a9ad;
    --line:#e9e9ec; --hover:#f3f3f5; --navy:#242131;
    --green:#34c759; --green-ink:#1f9d4d; --blue-ink:#2f6fed; --teal-ink:#0e8aa0;
    --red-ink:#e0556a; --pink:#fde7ef; --pink-ink:#e0095f;
    --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Monaco,Consolas,monospace;
    --font:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}

  /* ---------- 3-layer presentation mockup ---------- */
  html{background:#000}
  html,body{width:100%;height:100%;overflow:hidden}
  body{margin:0;font-family:var(--font);color:var(--ink);background:#000;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;display:flex;align-items:center;justify-content:center;width:100vw;height:100vh}
  .mat{padding:80px 96px;background:#d6d6d8;border-radius:28px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px}

  /* scene controller */
  .scenebar{display:flex;align-items:center;gap:5px;background:#fff;border-radius:14px;padding:6px;box-shadow:0 8px 24px -8px rgba(0,0,0,.30),0 0 0 .5px rgba(0,0,0,.06)}
  .sc-ctrl{width:30px;height:30px;border:none;border-radius:9px;background:#f1f1f3;color:#5a5a5f;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0}
  .sc-ctrl:hover{background:#e9e9ec}
  .sc-ctrl svg{width:15px;height:15px}
  .sc-play.on{background:var(--pink);color:var(--pink-ink)}
  .sc-sep{width:1px;height:22px;background:var(--line);margin:0 3px}
  .scene-btn{height:30px;padding:0 12px 0 8px;border:none;border-radius:9px;background:transparent;color:var(--ink-soft);font:600 12.5px var(--font);cursor:pointer;display:flex;align-items:center;gap:7px;white-space:nowrap}
  .scene-btn:hover{background:var(--hover)}
  .scene-btn .g{width:18px;height:18px;display:flex;align-items:center;justify-content:center;color:#8a8a8e}
  .scene-btn .g svg{width:16px;height:16px}
  .scene-btn.active{background:var(--pink);color:var(--pink-ink)}
  .scene-btn.active .g{color:var(--pink-ink)}

  /* window */
  .window{width:1280px;height:720px;background:var(--bg);border-radius:16px;box-shadow:0 24px 60px -12px rgba(0,0,0,.35),0 0 0 .5px rgba(0,0,0,.10);overflow:hidden;position:relative;display:flex;flex-direction:column}
  html.embed,html.embed body{background:transparent}
  html.embed .mat{padding:0;background:transparent;border-radius:0;gap:0}
  html.embed .scenebar{display:none}
  html.embed .window{box-shadow:none}

  /* titlebar */
  .titlebar{height:44px;flex:none;display:flex;align-items:center;gap:10px;padding:0 14px 0 13px;background:var(--titlebar);position:relative}
  .traffic{display:flex;gap:8px;align-items:center;margin-right:6px}
  .dot{width:12px;height:12px;border-radius:50%}
  .dot.r{background:#ff5f57;box-shadow:inset 0 0 0 .5px rgba(0,0,0,.10)}
  .dot.y{background:#febc2e;box-shadow:inset 0 0 0 .5px rgba(0,0,0,.10)}
  .dot.g{background:#28c840;box-shadow:inset 0 0 0 .5px rgba(0,0,0,.10)}
  .tb-logo{width:18px;height:18px;border-radius:18%;display:block;flex:none;margin-right:2px;box-shadow:0 1px 2px rgba(0,0,0,.14)}
  .ed-tabs{display:flex;align-items:center;gap:3px;flex:none}
  .ed-tab{height:26px;display:flex;align-items:center;gap:7px;padding:0 11px;border-radius:8px;font:600 12.5px var(--font);color:var(--ink);white-space:nowrap;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.06),inset 0 0 0 .5px rgba(0,0,0,.07)}
  .ed-tab .ic{width:11px;height:11px;border-radius:3px;flex:none}
  .tb-plus{width:25px;height:25px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--muted2)}
  .tb-plus svg{width:16px;height:16px}
  /* live presence — collaborator avatars in the titlebar */
  .tb-right{margin-left:auto;display:flex;align-items:center;gap:10px}
  .avatars{display:flex;align-items:center}
  .ava{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font:800 10.5px var(--font);box-shadow:0 0 0 2px var(--titlebar);margin-left:-7px}
  .ava:first-child{margin-left:0}
  .live-chip{display:flex;align-items:center;gap:5px;font:700 10.5px var(--font);color:var(--pink-ink);background:var(--pink);padding:3px 9px 3px 7px;border-radius:999px}
  .live-chip .ld{width:6px;height:6px;border-radius:50%;background:var(--pink-ink);box-shadow:0 0 0 3px rgba(224,9,95,.16);animation:pulse 1.5s ease-in-out infinite}
  .iconbtn{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#6f6f74}
  .iconbtn svg{width:16px;height:16px}

  /* body */
  .body{display:flex;flex:1;min-height:0;overflow:hidden}
  .rail{width:48px;flex:none;background:#f1f1f3;border-right:.5px solid var(--line);display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 0}
  .rail .klogo{width:28px;height:28px;border-radius:18%;margin-bottom:8px;display:block;box-shadow:0 1px 2px rgba(0,0,0,.12)}
  .railbtn{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:#80808a}
  .railbtn svg{width:19px;height:19px}
  .railbtn.active{color:var(--pink-ink);background:var(--pink)}
  .railspring{flex:1}

  /* canvas */
  .canvas{flex:1;display:flex;flex-direction:column;min-width:0;background:#fbfbfc}
  .canvas-top{height:40px;flex:none;display:flex;align-items:center;gap:10px;padding:0 14px;border-bottom:.5px solid var(--line);background:var(--panel)}
  .diag-title{font-size:13px;font-weight:700;color:var(--ink)}
  .kind-badge{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:var(--pink-ink);background:var(--pink);padding:3px 9px 3px 8px;border-radius:999px}
  .kind-badge .kd{width:7px;height:7px;border-radius:2px;background:var(--pink-ink)}
  .cspring{flex:1}
  .ctools{display:flex;align-items:center;gap:1px;color:var(--muted)}
  .ct{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center}
  .ct svg{width:16px;height:16px}
  .pct{font-size:12px;font-weight:600;color:var(--muted);padding:0 7px}
  .canvas-stage{flex:1;position:relative;overflow:hidden;background-color:#fbfbfc;background-image:radial-gradient(circle,#e0e0e6 1.1px,transparent 1.1px);background-size:22px 22px}
  .cam{position:absolute;left:0;top:0;transform-origin:0 0;transition:transform .6s cubic-bezier(.45,.05,.2,1)}

  /* BPMN element palette (catalogue) */
  .palette{position:absolute;left:24px;top:50%;transform:translateY(-50%);width:166px;z-index:6;background:#fff;border-radius:15px;padding:11px 11px 9px;box-shadow:0 16px 38px -12px rgba(0,0,0,.24),0 0 0 .5px rgba(0,0,0,.06);max-height:calc(100% - 28px);overflow:hidden}
  .palette-h{font:700 9.5px var(--font);color:var(--muted2);letter-spacing:.07em;margin:2px 3px 7px}
  .palette-h.mt{margin-top:11px}
  .pgrid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
  .chip{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;height:46px;border-radius:9px;background:#fbfbfc;border:1px solid var(--line);font:600 9px var(--font);color:var(--ink-soft);text-align:center;cursor:grab;transition:transform .15s,box-shadow .15s,background .2s}
  .chip .ci{width:22px;height:18px;display:flex;align-items:center;justify-content:center}
  .chip .ci svg{width:18px;height:18px;color:var(--navy)}
  .chip.grab{background:#fff;transform:translateY(-1px) scale(1.04);box-shadow:0 0 0 2px rgba(224,9,95,.5),0 7px 14px -6px rgba(0,0,0,.22);z-index:2}
  .chip.grab .ci svg{color:var(--pink-ink)}
  /* one drag preview per collaborator, follows their cursor from palette to canvas */
  .drag-preview{position:absolute;left:0;top:0;z-index:55;pointer-events:none;opacity:0;display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 12px;border-radius:10px;background:#fff;box-shadow:0 10px 22px -6px rgba(0,0,0,.30),0 0 0 .5px rgba(0,0,0,.10);font:600 9px var(--font);color:var(--ink);white-space:nowrap;transition:transform .5s cubic-bezier(.45,.05,.2,1),opacity .2s}
  .drag-preview .ci svg{width:18px;height:18px;color:var(--pink-ink)}

  /* ---- BPMN element styles ---- */
  .fg{opacity:0}
  .fg.show{animation:pop .42s both}
  .fg.done{opacity:1;animation:none}
  .pool-box{fill:#fff;stroke:#c2c4d0;stroke-width:1.3}
  .pool-band{fill:#eceef4;stroke:#c2c4d0;stroke-width:1.1}
  .lane-line{stroke:#d6d8e0;stroke-width:1.1}
  .pool-name{fill:var(--ink-soft);font:700 12px var(--font);text-anchor:middle}
  .pool-name.two{font-size:10.5px}
  .lane-name{fill:var(--muted);font:600 10.5px var(--font);text-anchor:middle}

  .ev-start{fill:#fff;stroke:var(--green-ink);stroke-width:2}
  .ev-end{fill:#fff;stroke:var(--red-ink);stroke-width:3.4}
  .task-box{fill:#fff;stroke:var(--navy);stroke-width:1.5}
  .task-mk{fill:none;stroke:var(--ink-soft);stroke-width:1.3;stroke-linecap:round;stroke-linejoin:round}
  .task-mk.fill{fill:var(--ink-soft);stroke:none}
  .task-label{fill:var(--ink-soft);font:600 11.5px var(--font);text-anchor:middle}
  .gw-box{fill:#fff;stroke:#caa53a;stroke-width:1.6}
  .gw-mk{fill:none;stroke:#9a7d23;stroke-width:2.4;stroke-linecap:round}
  .gw-label{fill:var(--muted);font:600 10.5px var(--font);text-anchor:middle}
  .ev-label{fill:var(--muted);font:600 10px var(--font);text-anchor:middle}
  .flow-label{fill:#6f6f74;font:600 10px var(--font);text-anchor:middle}
  .flow-label-bg{fill:#fbfbfc}

  .flow{opacity:0}
  .flow.show{opacity:1}
  .flow.done{opacity:1}
  .flow .seqline{fill:none;stroke:var(--navy);stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:1;stroke-dashoffset:1}
  .flow.show .seqline{animation:flowdraw .5s ease forwards}
  .flow.done .seqline{stroke-dashoffset:0;animation:none}
  .flow .seqhead{fill:var(--navy);opacity:0}
  .flow.show .seqhead{animation:fadein .25s ease .42s both}
  .flow.done .seqhead{opacity:1;animation:none}
  .flow.msg .seqline{stroke:#9a9aa6;stroke-width:1.5;stroke-dasharray:6 4;stroke-dashoffset:0;opacity:0}
  .flow.msg.show .seqline{animation:fadein .42s ease both}
  .flow.msg.done .seqline{opacity:1;animation:none}
  .flow.msg .msgdot{fill:#fff;stroke:#9a9aa6;stroke-width:1.4;opacity:0}
  .flow.msg .msghead{fill:none;stroke:#9a9aa6;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;opacity:0}
  .flow.msg.show .msgdot,.flow.msg.show .msghead{animation:fadein .3s ease .2s both}
  .flow.msg.done .msgdot,.flow.msg.done .msghead{opacity:1;animation:none}
  .flow .flow-label,.flow .flow-label-bg{opacity:0}
  .flow.show .flow-label,.flow.show .flow-label-bg{animation:fadein .25s ease .3s both}
  .flow.done .flow-label,.flow.done .flow-label-bg{opacity:1;animation:none}

  /* flow pulse overlay */
  .pulse{opacity:0;transition:opacity .45s ease}
  .pulse.show{opacity:1}
  .pulse path{fill:none;stroke:var(--pink-ink);stroke-width:3;stroke-linecap:round;stroke-dasharray:.16 .84;filter:drop-shadow(0 0 3px rgba(224,9,95,.5));animation:flowrun 1.7s linear infinite}

  /* multiplayer cursors — one per collaborator, colour set inline */
  .cursor{position:absolute;left:0;top:0;z-index:60;pointer-events:none;opacity:0;display:flex;align-items:flex-start;filter:drop-shadow(0 3px 5px rgba(0,0,0,.22));transition:transform .42s cubic-bezier(.45,.05,.2,1),opacity .3s ease}
  .cursor svg{width:22px;height:22px;display:block}
  .cursor .ctag{margin:14px 0 0 -3px;color:#fff;font:700 11px var(--font);padding:2px 8px;border-radius:9px;border-top-left-radius:3px;white-space:nowrap}
  .cursor .ring{position:absolute;left:2px;top:2px;width:10px;height:10px;border-radius:50%;border:2px solid currentColor;opacity:0}
  .cursor .ring.tap{animation:tap .55s ease-out}
  @keyframes tap{0%{opacity:.6;transform:scale(.35)}100%{opacity:0;transform:scale(2.7)}}

  @keyframes flowdraw{to{stroke-dashoffset:0}}
  @keyframes flowrun{from{stroke-dashoffset:0}to{stroke-dashoffset:-1}}
  @keyframes pop{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
  @keyframes fadein{from{opacity:0}to{opacity:1}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
</style>
</head>
<body>
<div class="mat">

  <div class="scenebar">
    <button class="sc-ctrl sc-prev" title="Previous"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>
    <button class="sc-ctrl sc-play" title="Play"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 5l12 7-12 7z"/></svg></button>
    <span class="sc-sep"></span>
    <button class="scene-btn" data-scene="0"><span class="g"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="6" rx="1.5"/><rect x="3" y="14" width="18" height="6" rx="1.5"/><path d="M7 4v6M7 14v6"/></svg></span>Pools</button>
    <button class="scene-btn" data-scene="1"><span class="g"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="8" height="6" rx="1.5"/><rect x="13" y="12" width="8" height="6" rx="1.5"/><path d="M21 6l-5 0M16 6v6"/></svg></span>Activities</button>
    <button class="scene-btn" data-scene="2"><span class="g"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="2.5"/><circle cx="18" cy="18" r="2.5"/><path d="M8.5 8.5l7 7"/></svg></span>Flows</button>
    <span class="sc-sep"></span>
    <button class="sc-ctrl sc-next" title="Next"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></button>
  </div>

<div class="window">

  <div class="titlebar">
    <div class="traffic"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span></div>
    <svg class="tb-logo" viewBox="0 0 100 100" aria-hidden="true">
      <rect width="100" height="100" rx="18" fill="#e0095f"/>
      <g transform="translate(50 50) scale(0.98) translate(-50 -50)">
        <line x1="33" y1="26.5" x2="33" y2="73.5" stroke="#fff" stroke-width="11.5" stroke-linecap="round"/>
        <line x1="65.5" y1="27" x2="34" y2="58.5" stroke="#fff" stroke-width="11.5" stroke-linecap="round"/>
        <line x1="48" y1="49.5" x2="67" y2="73" stroke="#fff" stroke-width="11.5" stroke-linecap="round"/>
        <circle cx="33" cy="26.5" r="5.8" fill="#fff"/><circle cx="33" cy="26.5" r="2.44" fill="#e0095f"/>
        <circle cx="65.5" cy="27" r="5.8" fill="#fff"/><circle cx="65.5" cy="27" r="2.44" fill="#e0095f"/>
        <circle cx="33" cy="73.5" r="5.8" fill="#fff"/><circle cx="33" cy="73.5" r="2.44" fill="#e0095f"/>
        <circle cx="34" cy="58.5" r="5.8" fill="#fff"/><circle cx="34" cy="58.5" r="2.44" fill="#e0095f"/>
        <circle cx="48" cy="49.5" r="5.8" fill="#fff"/><circle cx="48" cy="49.5" r="2.44" fill="#e0095f"/>
        <circle cx="67" cy="73" r="5.8" fill="#fff"/><circle cx="67" cy="73" r="2.44" fill="#e0095f"/>
      </g>
    </svg>
    <div class="ed-tabs"><div class="ed-tab"><span class="ic" style="background:#e0095f"></span>order-flow.bpmn</div></div>
    <div class="tb-plus"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></div>
    <div class="tb-right">
      <div class="avatars"></div>
      <div class="live-chip"><span class="ld"></span>3 editing</div>
      <div class="iconbtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg></div>
    </div>
  </div>

  <div class="body">
    <div class="rail">
      <svg class="klogo" viewBox="0 0 100 100" aria-hidden="true">
        <rect width="100" height="100" rx="18" fill="#e0095f"/>
        <g transform="translate(50 50) scale(0.98) translate(-50 -50)">
          <line x1="33" y1="26.5" x2="33" y2="73.5" stroke="#fff" stroke-width="11.5" stroke-linecap="round"/>
          <line x1="65.5" y1="27" x2="34" y2="58.5" stroke="#fff" stroke-width="11.5" stroke-linecap="round"/>
          <line x1="48" y1="49.5" x2="67" y2="73" stroke="#fff" stroke-width="11.5" stroke-linecap="round"/>
          <circle cx="33" cy="26.5" r="5.8" fill="#fff"/><circle cx="33" cy="26.5" r="2.44" fill="#e0095f"/>
          <circle cx="65.5" cy="27" r="5.8" fill="#fff"/><circle cx="65.5" cy="27" r="2.44" fill="#e0095f"/>
          <circle cx="33" cy="73.5" r="5.8" fill="#fff"/><circle cx="33" cy="73.5" r="2.44" fill="#e0095f"/>
          <circle cx="34" cy="58.5" r="5.8" fill="#fff"/><circle cx="34" cy="58.5" r="2.44" fill="#e0095f"/>
          <circle cx="48" cy="49.5" r="5.8" fill="#fff"/><circle cx="48" cy="49.5" r="2.44" fill="#e0095f"/>
          <circle cx="67" cy="73" r="5.8" fill="#fff"/><circle cx="67" cy="73" r="2.44" fill="#e0095f"/>
        </g>
      </svg>
      <div class="railbtn active" title="Select / move"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3l7.5 18 2.2-7.3L20 11.5z"/></svg></div>
      <div class="railbtn" title="Shapes"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg></div>
      <div class="railbtn" title="Comments"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>
      <div class="railspring"></div>
      <div class="railbtn" title="Settings"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></div>
    </div>

    <section class="canvas">
      <div class="canvas-top">
        <span class="diag-title">Order fulfilment · live collaboration</span>
        <span class="kind-badge"><span class="kd"></span>BPMN</span>
        <span class="cspring"></span>

  function headPath(p, filled){

  /* ---- render the whole diagram; each step tagged with {scene, owner} ---- */
  var STEPS = [];
  function genDiagram(){
    svg.innerHTML=''; STEPS=[];

    // nodes (scene 1)

    // flow pulse — energy runs along EVERY sequence + message flow across all pools, cascading left→right
    var allF=SEQ.concat(MSG), fxs=allF.map(function(f){return N[f.f].x;}), fmin=Math.min.apply(null,fxs), fmax=Math.max.apply(null,fxs);

  /* ============================ PALETTE (BPMN catalogue) ============================ */
  var PAL = [
    {h:'EVENTS', items:[{k:'start',label:'Start'},{k:'end',label:'End'},{k:'timer',label:'Timer'},{k:'message',label:'Message'}]},

  var chipByK = {};

  /* ============================ CAMERA (fit, palette gutter) ============================ */

    STEPS.forEach(function(s){ s.el.classList.remove('show'); s.el.classList.toggle('done', s.scene<n); });

      maxN=Math.max(maxN, steps.length);
      if(!steps.length){ hideCur(o); return; }
      var f0=steps[0]; startCur(o, f0.kind==='flow' ? svgToWin(f0.pts[0].x,f0.pts[0].y) : centreOf(chipForStep(f0)));
      steps.forEach(function(s,i){
        var b=i*P;
        if(s.kind==='flow'){                                   // flows: drag source lifeline → target (connect)
          var a=s.pts[0], e=s.pts[s.pts.length-1];
          at(b, function(){ moveCur(o, svgToWin(a.x,a.y)); });
          at(b+200, function(){ tapCur(o); s.el.classList.add('show'); moveCur(o, svgToWin(e.x,e.y)); });
        } else {                                                // pools / lanes / items: drag the matching chip from the palette
          var chip=chipForStep(s);
          at(b, function(){ moveCur(o, centreOf(chip)); });
          at(b+230, function(){ tapCur(o); chip.classList.add('grab'); showPrev(o, centreOf(chip), chip.querySelector('.ci').innerHTML); });
          at(b+380, function(){ var w=svgToWin(s.at.x,s.at.y); movePrev(o,w); moveCur(o,w); });
          at(b+730, function(){ tapCur(o); hidePrev(o); chip.classList.remove('grab'); s.el.classList.add('show'); });
        }
      });
    });
    var dur=maxN*P;
    if(n===2 && svg._pulse){ at(Math.max(0,dur-260), function(){ svg._pulse.classList.add('show'); }); }
    return dur;   // tight — next scene begins as the last item settles (no inter-scene pause); cursors glide, never fade between scenes
  }

  function render(n){ camFit(); setActive(n); setBaseline(n); return playScene(n); }

  /* ============================ PLAYBACK (3 scenes) ============================ */
  var SCENES = ['Pools','Activities','Flows'], cur=0, playing=false, timer=null;
  function stop(){ playing=false; clearG(); if(timer){clearTimeout(timer);timer=null;} playBtn.classList.remove('on'); CURS.forEach(function(_,o){ hideCur(o); hidePrev(o); }); [].slice.call(document.querySelectorAll('.chip.grab')).forEach(function(c){ c.classList.remove('grab'); }); }
  function embedded(){ try{ return window.parent && window.parent !== window; }catch(e){ return false; } }
  function cycleDone(){ if(embedded()){ try{ window.parent.postMessage({ type:'kymo-demo-done' }, '*'); }catch(e){} return true; } return false; }
  function step(n){ if(!playing) return; cur=n; var dur=render(n); var hold=(n>=2)?1600:0; timer=setTimeout(function(){ if(n>=2){ if(cycleDone()){ stop(); return; } step(0); } else step(n+1); }, dur+hold); }
  function play(){ stop(); playing=true; playBtn.classList.add('on'); step(cur); }
  function once(n){ stop(); cur=n; var dur=render(n); at(dur+700, function(){ CURS.forEach(function(_,o){ hideCur(o); hidePrev(o); }); }); }

  [].slice.call(document.querySelectorAll('.scene-btn')).forEach(function(b){ b.addEventListener('click', function(){ once(+b.getAttribute('data-scene')); }); });
  document.querySelector('.sc-prev').addEventListener('click', function(){ once((cur+2)%3); });
  document.querySelector('.sc-next').addEventListener('click', function(){ once((cur+1)%3); });
  playBtn.addEventListener('click', function(){ playing ? stop() : play(); });

  genDiagram();
  setTimeout(function(){ camFit(); if(/(?:^|[?&])autoplay\b/.test(location.search)) play(); else once(0); }, 40);
})();
</script>
