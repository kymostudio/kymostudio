<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>kymo · playground</title>
  <meta name="description" content="Write a .kymo DSL or a BPMN file, get an SVG — live, in your browser. No server.">
  <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><rect x='3' y='3' width='18' height='18' rx='6' fill='%2376b900'/></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Light theme (base) — FigJam-flavoured: white board, dotted canvas,
         soft rounding, floating toolbelt. The Light/Dark/None toggle flips
         [data-theme] on <html>, re-theming the whole app, while the bottom
         toolbar's three buttons drive the SVG canvas background. kymo green
         stays the accent. */
      --bg:          #ffffff;
      --bg-soft:     #f4f5f7;
      --canvas:      #ffffff;
      --dot:         #d9dde2;
      --border:      #ebedf0;
      --border-hov:  #d4d8dd;
      --text:        #1b1d21;
      --text-dim:    #6b7280;
      --header-bg:   rgba(255, 255, 255, 0.82);
      --editor-bg:   #fbfbfc;
      --editor-text: #3b4148;
      --panel:       #ffffff;
      --panel-hov:   #f1f2f4;
      --checker-a:   #eceef1;
      --checker-b:   #f6f7f9;
      --shadow-sm:   rgba(20, 23, 28, 0.08);
      --shadow-bar:  0 8px 28px rgba(20, 23, 28, 0.16), 0 0 0 1px rgba(20, 23, 28, 0.05);
      --shadow-card: 0 12px 40px rgba(20, 23, 28, 0.14);
      --accent:      #76b900;
      --accent-2:    #ea580c;
      --accent-hov:  #84cc00;
      --on-accent:   #11240a;
      --radius:      14px;
      --font:        "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      --mono:        ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    }
    :root[data-theme="dark"] {
      --bg:          #131419;
      --bg-soft:     #1c1d23;
      --canvas:      #1b1c21;
      --dot:         #2f323b;
      --border:      #292b32;
      --border-hov:  #3a3d46;
      --text:        #ececf0;
      --text-dim:    #8b909b;
      --header-bg:   rgba(19, 20, 25, 0.82);
      --editor-bg:   #16171c;
      --editor-text: #d4d7de;
      --panel:       #23252c;
      --panel-hov:   #2c2f37;
      --checker-a:   #1d1e24;
      --checker-b:   #17181d;
      --shadow-sm:   rgba(0, 0, 0, 0.4);
      --shadow-bar:  0 8px 28px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
      --shadow-card: 0 14px 44px rgba(0, 0, 0, 0.5);
      --on-accent:   #0c1606;
    }

    /* ── canvas-studio design tokens (FR-CS-01, PLAN-STUDIO-001 P1) ──────
       Ported from the hi-fi prototype's tokens.css. ADDITIVE: new names
       only — every token the current playground references above is left
       untouched, so P1 changes no pixels (no selector consumes these yet;
       the top bar / tool rail / status bar in P2–P6 do). Light values live
       on :root, dark overrides on :root[data-theme="dark"]; theme-neutral
       tokens are defined once. The unused --shadow-sm is repurposed from a
       bare colour to a full box-shadow (the prototype's semantics). */
    :root {
      /* surfaces */
      --bg-elev:      #ffffff;
      --canvas-grid:  rgba(10, 10, 20, 0.05);
      --border-soft:  #ececea;
      --border-strong:#c8c4ba;
      /* text */
      --text-mute:    #9a9a9e;
      --text-on-canvas:     #1a1a24;
      --text-on-canvas-dim: #6a6a78;
      /* brand (theme-neutral) */
      --accent-soft:  rgba(118, 185, 0, 0.16);
      --accent-fg:    #0a0a0f;
      --accent-2-soft:rgba(234, 88, 12, 0.16);
      /* collaborator hues */
      --user-1: #76b900; --user-2: #ea580c; --user-3: #5c8dff; --user-4: #d946ef; --user-5: #facc15;
      /* cloud diagram palette */
      --aws-orange: #ff9900; --aws-blue: #2e5cc6; --aws-green: #1a8a4a; --aws-purple: #7a3eb1; --aws-navy: #1a2a55;
      /* DSL syntax (light) */
      --tok-comment: #9a9a9e; --tok-kw: #56880c; --tok-str: #c2410c; --tok-op: #3a3a48; --tok-num: #2a5fcc;
      /* geometry scale */
      --r-sm: 6px; --r: 10px; --r-md: 12px; --r-lg: 14px; --r-xl: 18px;
      /* shadows (light) */
      --shadow-sm:   0 1px 2px rgba(40, 30, 20, 0.08);
      --shadow:      0 4px 16px rgba(40, 30, 20, 0.10);
      --shadow-lg:   0 16px 48px rgba(40, 30, 20, 0.18);
      --shadow-glow: 0 0 0 4px rgba(118, 185, 0, 0.2);
      /* chrome layout metrics */
      --topbar-h: 52px; --rail-w: 56px;
    }
    :root[data-theme="dark"] {
      --bg-elev:      #1a1a24;
      --border-soft:  #1c1c26;
      --border-strong:#2e2e3c;
      --text-mute:    #5a5a68;
      --tok-comment: #6a6a78; --tok-kw: #76b900; --tok-str: #ea580c; --tok-op: #c0c0d0; --tok-num: #5c8dff;
      --shadow-sm:   0 1px 2px rgba(0, 0, 0, 0.3);
      --shadow:      0 4px 16px rgba(0, 0, 0, 0.35);
      --shadow-lg:   0 16px 48px rgba(0, 0, 0, 0.5);
    }

    * { box-sizing: border-box; }
    /* canvas-studio P4 (FR-CS-04): the signature flowing-dash edge animation. */
    @keyframes kymo-edge-flow { to { stroke-dashoffset: -10; } }
    html, body {
      margin: 0; height: 100%;
      background: var(--bg); color: var(--text);
      font-family: var(--font); -webkit-font-smoothing: antialiased;
    }
    body { display: flex; flex-direction: column; }
    /* React mounts here — an extra level between <body> and header/main, so it
       must carry the full-height flex column the vanilla <body> held, else
       main's flex:1 has nothing to stretch into and the panes collapse. */
    #root { flex: 1 1 auto; display: flex; flex-direction: column; min-height: 0; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Top bar (canvas-studio P2 · FR-CS-02) ───────────────────────
       Ported from the hi-fi prototype: brand · breadcrumb/title · centre
       Code/Preview tabs · undo/redo · theme · presence · Export/Share.
       Token-driven, so it themes via [data-theme]. */
    .k-topbar {
      flex: 0 0 var(--topbar-h); height: var(--topbar-h);
      display: flex; align-items: center; gap: 10px;
      padding: 0 12px;
      background: var(--bg-elev); border-bottom: 1px solid var(--border);
      position: relative; z-index: 30;
    }
    .k-topbar .sep { width: 1px; height: 22px; background: var(--border); margin: 0 4px; }

    .k-logo {
      display: inline-flex; align-items: center; gap: 8px;
      font-weight: 800; font-size: 15px; letter-spacing: -0.01em; color: var(--text);
    }
    .k-logo .dot {
      width: 18px; height: 18px; border-radius: 6px; background: var(--accent);
      box-shadow: 0 2px 6px rgba(118, 185, 0, 0.4), inset 0 0 0 1px rgba(255, 255, 255, 0.18);
    }
    .k-logo small { color: var(--text-dim); font-weight: 500; font-size: 12px; margin-left: 2px; }

    .k-topbar .title { display: flex; align-items: center; min-width: 0; color: var(--text); }
    .title-input {
      border: 0; background: transparent; color: var(--text);
      font: 600 13.5px/1 var(--font); padding: 4px 6px; border-radius: 6px;
      min-width: 60px; max-width: 240px; outline: none;
    }
    .title-input:hover { background: var(--bg-soft); }
    .title-input:focus { background: var(--bg-soft); box-shadow: 0 0 0 2px var(--accent-soft); }

    .center-tabs { display: flex; gap: 2px; background: var(--bg-soft); border-radius: 8px; padding: 3px; margin: 0 auto; }
    .center-tabs button {
      font: 500 12px/1 var(--font); color: var(--text-dim); background: transparent; border: none;
      padding: 6px 12px; border-radius: 6px; cursor: pointer; display: inline-flex; align-items: center; gap: 5px;
    }
    .center-tabs button:not(:disabled):hover { color: var(--text); }
    .center-tabs button.active { background: var(--bg-elev); color: var(--text); box-shadow: var(--shadow-sm); }
    .center-tabs button:disabled { opacity: .45; cursor: not-allowed; }

    /* Top-bar buttons (shared chip system; the floating toolbar keeps .tbtn). */
    .k-btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      height: 30px; padding: 0 12px; border-radius: var(--r);
      border: 1px solid transparent; background: transparent; color: var(--text);
      font: 500 13px/1 var(--font); cursor: pointer;
      transition: background .12s, border-color .12s, color .12s, transform .08s; white-space: nowrap;
    }
    .k-btn:hover { background: var(--bg-soft); }
    .k-btn:active { transform: translateY(1px); }
    .k-btn--ghost { color: var(--text-dim); }
    .k-btn--ghost:hover { color: var(--text); }
    .k-btn--outline { border-color: var(--border); color: var(--text); }
    .k-btn--outline:hover { border-color: var(--border-strong); background: var(--bg-soft); }
    .k-btn--primary { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); }
    .k-btn--primary:hover { background: var(--accent-hov); }
    .k-btn--sm { height: 28px; padding: 0 10px; font-size: 12px; border-radius: 8px; }
    .k-btn--icon { width: 30px; padding: 0; }
    .k-btn--icon.k-btn--sm { width: 28px; }

    /* ── Split panes ─────────────────────────────────────────────── */
    main { flex: 1 1 auto; display: grid; grid-template-columns: minmax(280px, 38%) 1fr; min-height: 0; }
    /* FR-CS-02: the top-bar Code tab hides the editor pane → canvas spans full width. */
    main.code-hidden { grid-template-columns: 1fr; }
    .pane { min-width: 0; min-height: 0; display: flex; flex-direction: column; position: relative; }
    .pane.editor { border-right: 1px solid var(--border); background: var(--editor-bg); }

    /* Editor header strip — a small "source" chip for polish. */
    .editor-bar {
      flex: 0 0 auto; display: flex; align-items: center; gap: 8px;
      padding: 10px 16px; border-bottom: 1px solid var(--border);
      font-size: 12px; color: var(--text-dim); user-select: none;
    }
    .editor-bar .chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 3px 9px; border-radius: 999px;
      background: var(--bg-soft); color: var(--text); font-weight: 600; font-size: 11.5px;
    }
    .editor-bar .chip::before {
      content: ""; width: 7px; height: 7px; border-radius: 50%; background: var(--accent);
    }
    .editor-bar .hint { margin-left: auto; opacity: .8; }

    #editor {
      flex: 1; width: 100%; resize: none; border: 0; outline: 0;
      padding: 16px 18px; background: var(--editor-bg); color: var(--editor-text);
      font-family: var(--mono); font-size: 13.5px; line-height: 1.65;
      tab-size: 2; white-space: pre; overflow: auto;
    }

    /* ── Canvas (the FigJam "board") ─────────────────────────────── */
    /* canvas-studio P3 (FR-CS-03): the view pane is a flex row — left tool rail
       + the canvas area. EngineBoard's position:absolute;inset:0 now anchors to
       .canvas-wrap (the floating toolbar + #error live inside it too). */
    .pane.view { display: flex; flex-direction: row; overflow: hidden; }
    .canvas-wrap { position: relative; flex: 1 1 auto; min-width: 0; overflow: hidden; background: var(--canvas); }

    /* Left tool rail — flush vertical sidebar driven by the tool registry. */
    .k-rail {
      flex: 0 0 var(--rail-w); width: var(--rail-w);
      display: flex; flex-direction: column; align-items: center;
      padding: 10px 0; gap: 2px;
      background: var(--bg-soft); border-right: 1px solid var(--border);
      z-index: 5;
    }
    .k-rail .tool {
      width: 38px; height: 38px; border-radius: 9px;
      display: inline-flex; align-items: center; justify-content: center;
      color: var(--text-dim); cursor: pointer; position: relative;
      transition: background .12s, color .12s;
    }
    .k-rail .tool:hover { background: var(--bg-elev); color: var(--text); }
    .k-rail .tool.active { background: var(--accent-soft); color: var(--accent); }
    .k-rail .tool.disabled { opacity: .38; cursor: not-allowed; }
    .k-rail .tool.disabled:hover { background: transparent; color: var(--text-dim); }
    .k-rail .tool .kbd {
      position: absolute; bottom: 3px; right: 4px;
      font: 600 9px/1 var(--mono); color: var(--text-mute);
    }
    .k-rail .sep { width: 24px; height: 1px; background: var(--border); margin: 6px 0; }
    #preview {
      flex: 1; overflow: auto; display: grid; place-items: center;
      padding: 40px 40px 96px;
      background-color: var(--canvas);
      background-image: radial-gradient(circle, var(--dot) 1.4px, transparent 1.6px);
      background-size: 24px 24px;
      background-position: -12px -12px;
    }
    #preview svg {
      max-width: 100%; height: auto;
      box-shadow: var(--shadow-card); border-radius: 10px;
    }
    /* "None" → checkerboard so SVG transparency reads clearly. */
    #preview.checker {
      background-color: var(--checker-a);
      background-image:
        linear-gradient(45deg, var(--checker-b) 25%, transparent 25%),
        linear-gradient(-45deg, var(--checker-b) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, var(--checker-b) 75%),
        linear-gradient(-45deg, transparent 75%, var(--checker-b) 75%);
      background-size: 22px 22px;
      background-position: 0 0, 0 11px, 11px -11px, -11px 0;
    }

    /* ── Floating toolbelt (bottom-centre of the board) ──────────── */
    /* Top-centre, clear of the canvas. */
    .toolbar {
      position: absolute; left: 50%; top: 14px; transform: translateX(-50%);
      z-index: 200;
      display: flex; align-items: center; gap: 6px;
      padding: 7px; border-radius: 18px;
      background: var(--panel); box-shadow: var(--shadow-bar);
    }
    .toolbar .sep { width: 1px; align-self: stretch; margin: 4px 3px; background: var(--border); }

    /* Sample picker, styled as a pill select. */
    .toolbar .pick { position: relative; display: inline-flex; align-items: center; }
    .toolbar select {
      appearance: none; -webkit-appearance: none;
      font-family: var(--font); font-size: 13px; font-weight: 600;
      color: var(--text); background: var(--panel-hov);
      border: 0; border-radius: 11px;
      padding: 9px 30px 9px 13px; cursor: pointer;
    }
    .toolbar select:hover { background: var(--border); }
    .toolbar .pick svg { position: absolute; right: 10px; pointer-events: none; opacity: .55; }

    /* Icon buttons (theme + download). */
    .tbtn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      min-width: 38px; height: 38px; padding: 0 10px;
      border: 0; border-radius: 11px; cursor: pointer;
      color: var(--text-dim); background: transparent;
      font-family: var(--font); font-size: 12.5px; font-weight: 600;
      transition: background .12s ease, color .12s ease;
    }
    .tbtn:hover { background: var(--panel-hov); color: var(--text); }
    .tbtn svg { width: 18px; height: 18px; }
    .tbtn.active { background: var(--accent); color: var(--on-accent); }
    .tbtn.active:hover { background: var(--accent); color: var(--on-accent); }

    /* The theme triplet shares the .bg-toggle group; JS toggles .active. */
    .bg-toggle { display: inline-flex; gap: 4px; }
    /* Canvas tool group (select · draw) — same chip layout as .bg-toggle. */
    .tool-toggle { display: inline-flex; gap: 4px; }

    /* ── Error card ──────────────────────────────────────────────── */
    #error {
      position: absolute; left: 18px; right: 18px; top: 70px;
      max-height: 42%; overflow: auto; z-index: 200;
      padding: 13px 15px; border-radius: 14px;
      background: var(--panel);
      border: 1px solid #f0a3a3; border-left: 4px solid #e23b3b;
      color: #b42318; font-family: var(--mono); font-size: 12.5px;
      white-space: pre-wrap; line-height: 1.55;
      box-shadow: var(--shadow-bar);
    }
    :root[data-theme="dark"] #error { color: #ffb4ab; border-color: #7a2020; border-left-color: #e23b3b; }
    #error[hidden] { display: none; }

    /* ── Toast ───────────────────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 84px; left: 50%; transform: translateX(-50%) translateY(10px);
      background: var(--text); color: var(--bg); font-size: 13px; font-weight: 600;
      padding: 10px 18px; border-radius: 999px; opacity: 0; pointer-events: none;
      box-shadow: var(--shadow-card); z-index: 40;
      transition: opacity .18s ease, transform .18s ease;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 760px) {
      main { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
      .pane.editor { border-right: 0; border-bottom: 1px solid var(--border); }
      .toolbar { gap: 4px; padding: 6px; top: 12px; }
      .toolbar select { padding: 8px 28px 8px 11px; }
      .tbtn { min-width: 34px; height: 34px; }
    }
  </style>
</head>
<body>
  <!-- React (src/main.tsx) renders the UI into #root; the bundle is built by
       build.sh. All styling lives in the <style> block above, unchanged. -->
  <div id="root"></div>

  <script type="module" src="kymo.bundle.js"></script>
</body>
</html>
