<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>kymo · playground</title>
  <meta name="description" content="Write a .kymo DSL or a BPMN file, get an SVG — live, in your browser. No server.">
  <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><rect x='3' y='3' width='18' height='18' rx='4' fill='%2376b900'/></svg>">
  <style>
    :root {
      /* Dark theme (base). The Light/Dark toggle flips [data-theme] on <html>,
         re-theming the whole app — header, editor, panes, preview — not just
         the SVG canvas. */
      --bg:          #0a0a0f;
      --bg-soft:     #14141c;
      --border:      #23232e;
      --border-hov:  #34343f;
      --text:        #e8e8ec;
      --text-dim:    #8a8a98;
      --header-bg:   rgba(10, 10, 15, 0.85);
      --editor-bg:   #0d0d13;
      --editor-text: #d8d8e0;
      --view-bg:     #0d0d13;
      --checker-a:   #1a1a22;
      --checker-b:   #15151c;
      --shadow:      rgba(0, 0, 0, 0.4);
      --accent:      #76b900;
      --accent-2:    #ea580c;
      --on-accent:   #0a0a0f;
      --radius:      12px;
      --font:        "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      --mono:        ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    }
    :root[data-theme="light"] {
      --bg:          #ffffff;
      --bg-soft:     #f1f5f9;
      --border:      #e2e8f0;
      --border-hov:  #cbd5e1;
      --text:        #0f172a;
      --text-dim:    #64748b;
      --header-bg:   rgba(255, 255, 255, 0.85);
      --editor-bg:   #f8fafc;
      --editor-text: #334155;
      --view-bg:     #eef2f6;
      --checker-a:   #e2e8f0;
      --checker-b:   #f1f5f9;
      --shadow:      rgba(15, 23, 42, 0.12);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; height: 100%;
      background: var(--bg); color: var(--text);
      font-family: var(--font); -webkit-font-smoothing: antialiased;
    }
    body { display: flex; flex-direction: column; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Top bar ─────────────────────────────────────────────────── */
    header {
      flex: 0 0 auto;
      display: flex; align-items: center; gap: 16px;
      padding: 12px 18px;
      border-bottom: 1px solid var(--border);
      background: var(--header-bg);
      backdrop-filter: saturate(180%) blur(10px);
    }
    .brand {
      display: flex; align-items: center; gap: 9px;
      font-weight: 700; font-size: 16px; color: var(--text);
    }
    .brand-dot { width: 11px; height: 11px; border-radius: 3px; background: var(--accent); }
    .brand small { color: var(--text-dim); font-weight: 500; font-size: 13px; }
    .spacer { flex: 1; }

    .control, select, button.btn {
      font-family: var(--font); font-size: 13px;
      color: var(--text); background: var(--bg-soft);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 7px 11px; cursor: pointer;
    }
    select { padding-right: 26px; }
    button.btn:hover, select:hover { border-color: var(--border-hov); }
    button.btn.primary { background: var(--accent); color: var(--on-accent); border-color: var(--accent); font-weight: 600; }
    button.btn.primary:hover { background: #8ad000; }

    .bg-toggle { display: inline-flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .bg-toggle button {
      font: inherit; font-size: 12px; color: var(--text-dim);
      background: var(--bg-soft); border: 0; padding: 7px 11px; cursor: pointer;
    }
    .bg-toggle button + button { border-left: 1px solid var(--border); }
    .bg-toggle button.active { background: var(--accent); color: var(--on-accent); font-weight: 600; }
    .label { font-size: 12px; color: var(--text-dim); margin-right: -8px; }

    /* ── Split panes ─────────────────────────────────────────────── */
    main { flex: 1 1 auto; display: grid; grid-template-columns: minmax(280px, 38%) 1fr; min-height: 0; }
    .pane { min-width: 0; min-height: 0; display: flex; flex-direction: column; position: relative; }
    .pane.editor { border-right: 1px solid var(--border); }

    #editor {
      flex: 1; width: 100%; resize: none; border: 0; outline: 0;
      padding: 16px 18px; background: var(--editor-bg); color: var(--editor-text);
      font-family: var(--mono); font-size: 13.5px; line-height: 1.6;
      tab-size: 2; white-space: pre; overflow: auto;
    }

    .pane.view { background: var(--view-bg); }
    #preview {
      flex: 1; overflow: auto; display: grid; place-items: center;
      padding: 24px;
    }
    #preview svg { max-width: 100%; height: auto; box-shadow: 0 10px 40px var(--shadow); border-radius: 8px; }
    #preview.checker {
      background-color: var(--checker-a);
      background-image:
        linear-gradient(45deg, var(--checker-b) 25%, transparent 25%),
        linear-gradient(-45deg, var(--checker-b) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, var(--checker-b) 75%),
        linear-gradient(-45deg, transparent 75%, var(--checker-b) 75%);
      background-size: 22px 22px;
      background-position: 0 0, 0 11px, 11px -11px, -11px 0;
    }

    #error {
      position: absolute; left: 14px; right: 14px; bottom: 14px;
      max-height: 45%; overflow: auto;
      padding: 12px 14px; border-radius: 10px;
      background: rgba(120, 20, 20, 0.92); border: 1px solid #b91c1c;
      color: #fee2e2; font-family: var(--mono); font-size: 12.5px;
      white-space: pre-wrap; line-height: 1.5;
      box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    }
    #error[hidden] { display: none; }

    #toast {
      position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%) translateY(10px);
      background: var(--text); color: var(--bg); font-size: 13px; font-weight: 600;
      padding: 9px 16px; border-radius: 999px; opacity: 0; pointer-events: none;
      transition: opacity .18s ease, transform .18s ease;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 760px) {
      main { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
      .pane.editor { border-right: 0; border-bottom: 1px solid var(--border); }
      header { flex-wrap: wrap; gap: 10px; }
    }
  </style>
</head>
<body>
  <header>
    <span class="brand"><span class="brand-dot"></span> kymo <small>playground</small></span>
    <div class="spacer"></div>
    <span class="label">Sample</span>
    <select id="sample" class="control" title="Load a starter diagram"></select>
    <div class="bg-toggle" title="Preview background">
      <button data-bg="light" class="active">Light</button>
      <button data-bg="dark">Dark</button>
      <button data-bg="transparent">None</button>
    </div>
    <button id="download" class="btn" title="Download the rendered SVG">Download SVG</button>
    <button id="copy" class="btn primary" title="Copy a shareable link to this diagram">Copy link</button>
  </header>

  <main>
    <section class="pane editor">
      <textarea id="editor" spellcheck="false" autocomplete="off" autocapitalize="off"
                placeholder="Write a .kymo DSL or paste a BPMN 2.0 file…"></textarea>
    </section>
    <section class="pane view">
      <div id="preview"></div>
      <div id="error" hidden></div>
    </section>
  </main>

  <div id="toast"></div>

  <script type="module" src="kymo.bundle.js"></script>
</body>
</html>
