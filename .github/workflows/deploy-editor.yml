name: Deploy editor to Cloudflare Pages

# packages/editor is a client-side static app: the kymo flowchart DSL renders
# entirely in the browser via the kymostudio JS engine + kymostudio-core wasm
# (inlined into the bundle). No server. This build compiles the wasm core +
# packages/js (the published npm engine predates flowchart{}), esbuild-bundles
# the editor, and deploys dist/ to the Cloudflare Pages project kymo-editor
# (editor.kymo.studio).

on:
  push:
    branches: [main]
    paths:
      - "packages/editor/web/**"
      - "packages/editor/build.sh"
      - "packages/editor/package.json"
      - "packages/js/**"
      - "packages/rust/kymostudio-core/**"
      - ".github/workflows/deploy-editor.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: editor-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack
      - name: Build kymostudio-core wasm (lean — no pdf/png exports)
        working-directory: packages/rust/kymostudio-core
        # Plain `wasm` (no `pdf`): the editor never calls svgToPng/svgToPdf (its
        # PNG export rasterizes via canvas), and those two exports carry resvg +
        # svg2pdf — 1.4 MB brotli vs 0.2 MB without. npm/vscode artifacts build
        # `wasm,pdf` and keep the full surface.
        run: wasm-pack build --target web --out-dir pkg --out-name kymostudio_core -- --no-default-features --features wasm
      - name: Build packages/js with the fresh core
        working-directory: packages/js
        run: |
          npm ci
          npm install --no-save ../rust/kymostudio-core/pkg
          npm run build
      - name: Build the editor bundle
        working-directory: packages/editor
        run: |
          npm install --no-package-lock --no-audit --no-fund
          ./build.sh
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/editor
          command: pages deploy dist --project-name=kymo-editor --branch=main
