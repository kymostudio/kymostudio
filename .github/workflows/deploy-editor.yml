name: Deploy editor to Hetzner

# packages/editor runs as a Node server + Python (kymostudio-core) on a Hetzner box,
# fronted by cloudflared at editor.kymo.studio. On a push touching the editor or the
# Python engine, SSH in and run the on-box deploy (git pull + venv + restart) to apply
# changes immediately. Secrets: EDITOR_SSH_KEY (deploy private key), EDITOR_SSH_HOST.

on:
  push:
    branches: [main]
    paths:
      - "packages/editor/**"
      - "packages/python/**"
      - ".github/workflows/deploy-editor.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: editor-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Apply on the editor box
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf "%s\n" "${{ secrets.EDITOR_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh -o StrictHostKeyChecking=accept-new claude-code@${{ secrets.EDITOR_SSH_HOST }} "sudo /usr/local/bin/kymo-editor-deploy"
