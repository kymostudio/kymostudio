name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

env:
  # Opt JS actions into Node 24 ahead of GitHub's 2026-06-16 forced switch —
  # silences the Node 20 deprecation warnings (some pinned actions have no
  # Node24-native release yet).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # Detect which packages a push/PR actually touches, so docs-only or
  # single-package changes don't fan out into every test suite.
  changes:
    name: Detect changed packages
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      js: ${{ steps.filter.outputs.js }}
      js-canvas: ${{ steps.filter.outputs.js-canvas }}
      vscode: ${{ steps.filter.outputs.vscode }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            python:
              - 'packages/python/**'
              - 'packages/icons/**'
              - 'samples/**'
              - '.github/workflows/test.yml'
            js:
              - 'packages/js/**'
              - 'packages/icons/**'
              - 'samples/**'
              - '.github/workflows/test.yml'
            js-canvas:
              - 'packages/js-canvas/**'
              - 'packages/js/**'
              - '.github/workflows/test.yml'
            vscode:
              - 'packages/vscode-extension/**'
              - 'packages/js/**'
              - '.github/workflows/test.yml'

  python:
    needs: changes
    if: ${{ needs.changes.outputs.python == 'true' }}
    name: Python tests (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    defaults:
      run:
        working-directory: packages/python
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Build the local kymostudio-core wheel (BPMN engine, required by BPMN)
        uses: PyO3/maturin-action@v1
        with:
          working-directory: packages/rust/kymostudio-core
          command: build
          args: --release --out ${{ github.workspace }}/dist-core
          manylinux: auto
      - name: Lint (ruff)
        run: uv run --python ${{ matrix.python-version }} --group dev ruff check src tests
      - name: Sync env + install the locally-built core
        run: |
          uv sync --python ${{ matrix.python-version }} --group dev
          uv pip install --reinstall "$(ls ${{ github.workspace }}/dist-core/*.whl)"
      - name: Run pytest
        run: uv run --no-sync --python ${{ matrix.python-version }} python -m pytest -q

  js:
    needs: changes
    if: ${{ needs.changes.outputs.js == 'true' }}
    name: JS tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/js
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack
      - name: Build the local kymostudio-core wasm pkg (BPMN engine)
        working-directory: packages/rust/kymostudio-core
        run: wasm-pack build --target web --out-dir pkg --out-name kymostudio_core -- --no-default-features --features wasm,pdf
      - name: Install deps
        run: npm ci
      - name: Link the locally-built core (BPMN wasm bindings)
        run: npm install --no-save ../rust/kymostudio-core/pkg
      - name: Type check
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Icon generator freshness (committed artifact == regenerated)
        working-directory: packages/icons
        run: |
          node scripts/build-manifest.mjs
          git diff --exit-code -- icons-manifest.json icons-collections.json sets/
      - name: Run tests
        run: npm test   # syncs catalogue from packages/icons, builds TS, then `node --test`

  js-canvas:
    needs: changes
    if: ${{ needs.changes.outputs.js-canvas == 'true' }}
    name: JS canvas engine tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/js-canvas
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Install deps
        run: npm ci
      - name: Type check
        run: npm run typecheck
      - name: Run tests
        run: npm test   # builds TS to dist/, then `node --test`

  vscode-extension:
    needs: changes
    if: ${{ needs.changes.outputs.vscode == 'true' }}
    name: VS Code extension build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/vscode-extension
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack
      - name: Build the local kymostudio-core wasm pkg (BPMN engine)
        working-directory: packages/rust/kymostudio-core
        run: wasm-pack build --target web --out-dir pkg --out-name kymostudio_core -- --no-default-features --features wasm,pdf
      - name: Build JS engine (bundled by the extension)
        working-directory: packages/js
        run: |
          npm ci
          npm install --no-save ../rust/kymostudio-core/pkg
          npm run build
      - name: Install deps
        run: |
          npm ci
          npm install --no-save ../rust/kymostudio-core/pkg
      - name: Type check
        run: npm run typecheck
      - name: Test
        run: npm test        # node --test (webview behaviour, via jsdom)
      - name: Bundle
        run: npm run build   # esbuild -> dist/extension.js (inlines kymostudio + wasm)
