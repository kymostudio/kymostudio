name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python tests (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    defaults:
      run:
        working-directory: packages/python
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Lint (ruff)
        run: uv run --python ${{ matrix.python-version }} --group dev ruff check src tests
      - name: Run pytest
        run: uv run --python ${{ matrix.python-version }} --group dev python -m pytest -q

  js:
    name: JS tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/js
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
      - name: Install deps
        run: npm ci
      - name: Type check
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Run tests
        run: npm test   # builds TS to dist/, then `node --test`

  js-canvas:
    name: JS canvas engine tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/js-canvas
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
      - name: Install deps
        run: npm ci
      - name: Type check
        run: npm run typecheck
      - name: Run tests
        run: npm test   # builds TS to dist/, then `node --test`

  vscode-extension:
    name: VS Code extension build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/vscode-extension
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
      - name: Build JS engine (bundled by the extension)
        working-directory: packages/js
        run: npm ci && npm run build
      - name: Install deps
        run: npm ci
      - name: Type check
        run: npm run typecheck
      - name: Test
        run: npm test        # node --test (webview behaviour, via jsdom)
      - name: Bundle
        run: npm run build   # esbuild -> dist/extension.js (inlines kymostudio)
