name: Deploy docs to Cloudflare Pages

# Publishes packages/docs (RSPress; self-contained MDX under docs/) to the
# Cloudflare Pages project "kymo-docs". Auth via the CLOUDFLARE_API_TOKEN
# (Pages:Edit) + CLOUDFLARE_ACCOUNT_ID repo secrets.

on:
  push:
    branches: [main]
    paths:
      - "packages/docs/**"
      # sync-assets.sh pulls these into docs/public/ at build time.
      - "samples/**"
      - "docs/brand/logo.svg"
      - "docs/brand/favicon.svg"
      - ".github/workflows/deploy-docs.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install
        run: npm install --no-audit --no-fund
        working-directory: packages/docs
      - name: Build
        run: npm run build
        working-directory: packages/docs
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/docs
          command: pages deploy doc_build --project-name=kymo-docs --branch=main
