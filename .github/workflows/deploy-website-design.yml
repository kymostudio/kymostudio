name: Deploy website-design

# Cloudflare Pages project "kymo-design", served at https://design.kymo.studio.
# React brand & design-system page (esbuild): ./build.sh bundles src/main.tsx →
# dist/bundle.js + copies the canonical brand assets from docs/brand, then
# wrangler deploys. Path-filtered to the page + the brand assets it embeds.
on:
  push:
    branches: [main]
    paths:
      - "packages/website-design/**"
      - "docs/brand/**"
      - ".github/workflows/deploy-website-design.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: website-design-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Build dist/
        run: ./build.sh
        working-directory: packages/website-design
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy packages/website-design/dist --project-name=kymo-design --branch=main
