name: E2E (engine render guard)

# Browser-level guard for the in-house canvas engine — chiefly the render-count
# regression guard (pan/zoom must not re-render the shape list). Heavy (browser
# download), so it only runs when the app or engine actually changes.

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'packages/js-canvas/**'
      - 'packages/js/**'
      - '.github/workflows/playwright.yml'
  pull_request:
    paths:
      - 'website/**'
      - 'packages/js-canvas/**'
      - 'packages/js/**'
      - '.github/workflows/playwright.yml'
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  render-guard:
    name: Playwright render-count guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Install engine-core deps
        run: npm ci
        working-directory: packages/js-canvas
      - name: Install JS-package deps
        run: npm ci
        working-directory: packages/js
      - name: Build the playground bundle (js + js-canvas → esbuild)
        run: ./build.sh # builds packages/js + packages/js-canvas dist, npm ci (app), esbuild → kymo.bundle.js
        working-directory: website/app
      - name: Install Playwright (chromium only)
        run: npx playwright install --with-deps chromium
        working-directory: website/app
      - name: Run the render-count guard
        run: npm run test:e2e
        working-directory: website/app
