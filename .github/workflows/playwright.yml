name: E2E (engine render guard)

# Browser-level guard for the in-house canvas engine — chiefly the render-count
# regression guard (pan/zoom must not re-render the shape list). Heavy (browser
# download), so it only runs when the app or engine actually changes.

on:
  push:
    branches: [main]
    paths:
      - 'packages/website/**'
      - 'packages/js-canvas/**'
      - 'packages/js/**'
      - '.github/workflows/playwright.yml'
  pull_request:
    paths:
      - 'packages/website/**'
      - 'packages/js-canvas/**'
      - 'packages/js/**'
      - '.github/workflows/playwright.yml'
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  # Opt JS actions into Node 24 ahead of GitHub's 2026-06-16 forced switch —
  # silences the Node 20 deprecation warnings (some pinned actions have no
  # Node24-native release yet).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  render-guard:
    name: Playwright render-count guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Install engine-core deps
        run: npm ci
        working-directory: packages/js-canvas
      - name: Install JS-package deps
        run: npm ci
        working-directory: packages/js
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack
      - name: Build the local kymostudio-core wasm pkg (BPMN engine)
        working-directory: packages/rust/kymostudio-core
        run: wasm-pack build --target web --out-dir pkg --out-name kymostudio_core -- --no-default-features --features wasm
      - name: Link the locally-built core into packages/js
        working-directory: packages/js
        run: npm install --no-save ../rust/kymostudio-core/pkg
      - name: Build the playground bundle (js + js-canvas → esbuild)
        run: ./build.sh # builds packages/js + packages/js-canvas dist, npm ci (app), esbuild → kymo.bundle.js
        working-directory: packages/website/app
      - name: Install Playwright (chromium only)
        run: npx playwright install --with-deps chromium
        working-directory: packages/website/app
      - name: Run the render-count guard
        run: npm run test:e2e
        working-directory: packages/website/app
