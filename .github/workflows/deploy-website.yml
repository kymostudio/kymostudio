name: Deploy website to Cloudflare Pages

# Publishes packages/website (landing + client-side playground at /app/) to the
# Cloudflare Pages project "kymo-studio", served at https://kymo.studio.
# build.sh assembles dist/ from src/ + the committed app/kymo.bundle.js (no JS
# recompile). Auth via the CLOUDFLARE_API_TOKEN (Pages:Edit) + CLOUDFLARE_ACCOUNT_ID
# repo secrets.

on:
  push:
    branches: [main]
    paths:
      - "packages/website/**"
      - "docs/brand/screenshots/**"   # build.sh embeds these as the landing demo iframes
      - ".github/workflows/deploy-website.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: website-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build website -> dist/
        run: ./build.sh
        working-directory: packages/website
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy packages/website/dist --project-name=kymo-studio --branch=main
