name: Deploy website to kymostudio.github.io

# Publishes packages/website (landing page + client-side playground at /app/)
# to the org Pages repo kymostudio/kymostudio.github.io, served at kymo.studio.
# build.sh assembles dist/ from src/ + the committed app/kymo.bundle.js (no JS
# recompile — the bundle is a committed artifact). Cross-repo push uses the
# fine-grained PAT PAGES_DEPLOY_TOKEN (the org has deploy keys disabled).

on:
  push:
    branches: [main]
    paths:
      - "packages/website/**"
      - ".github/workflows/deploy-website.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: website-deploy
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build website -> dist/
        run: ./build.sh
        working-directory: packages/website
      - name: Publish dist/ -> kymostudio.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PAGES_DEPLOY_TOKEN }}
          external_repository: kymostudio/kymostudio.github.io
          publish_branch: main
          publish_dir: ./packages/website/dist
          force_orphan: true
          cname: kymo.studio
          user_name: kymostudio-ci
          user_email: ci@users.noreply.github.com
          commit_message: "deploy: ${{ github.sha }}"
