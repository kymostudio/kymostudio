name: Deploy website to kymostudio.github.io

# Publishes the static site in `website/` (landing page + the client-side
# playground at /app/) to the org Pages repo `kymostudio/kymostudio.github.io`,
# which serves it at https://kymostudio.github.io/. Cross-repo push uses a
# fine-grained PAT (secret PAGES_DEPLOY_TOKEN) because the org has deploy keys
# disabled. The bundle is committed, so this just publishes `website/` as-is.

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/deploy-website.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: website-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Publish website/ → kymostudio.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PAGES_DEPLOY_TOKEN }}
          external_repository: kymostudio/kymostudio.github.io
          publish_branch: main
          publish_dir: ./website
          force_orphan: true
          user_name: kymostudio-ci
          user_email: ci@users.noreply.github.com
          commit_message: "deploy: ${{ github.sha }}"
