name: Release kymo VS Code extension

on:
  push:
    tags:
      - 'v*'  # Trigger on tags like v0.1.0
  workflow_dispatch:

# Extension lives in packages/vscode-extension/. It inlines the dependency-free
# JS engine from packages/js/ at bundle time, so that package is built first
# (mirrors the `vscode-extension` job in test.yml).
jobs:
  verify-version:
    name: Verify Version
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    defaults:
      run:
        working-directory: packages/vscode-extension
    steps:
      - uses: actions/checkout@v6
      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "Tag version: $TAG_VERSION"
          echo "package.json version: $PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "ERROR: Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi
          echo "✓ Versions match"

  publish:
    name: Build and Publish extension
    # On a tag push, gate on verify-version; on workflow_dispatch it is
    # skipped, so allow this job to run regardless of that result.
    needs: [verify-version]
    if: always() && (needs.verify-version.result == 'success' || needs.verify-version.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      # The bundled JS engine imports the core's type defs (tsc) AND inlines the
      # core wasm bytes (esbuild), so both packages must use the LOCAL core — the
      # published npm core may lag this release. Build the wasm pkg once, then link
      # it into both packages before their builds.
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: jetli/wasm-pack-action@v0.4.0
      - name: Build the local kymostudio-core wasm pkg (engine bindings)
        working-directory: packages/rust/kymostudio-core
        run: wasm-pack build --target web --out-dir pkg --out-name kymostudio_core -- --no-default-features --features wasm

      # The extension bundles packages/js, so build that first.
      - name: Build JS engine (bundled by the extension)
        working-directory: packages/js
        run: npm ci && npm install --no-save ../rust/kymostudio-core/pkg && npm run build

      - name: Install extension deps
        working-directory: packages/vscode-extension
        run: npm ci && npm install --no-save ../rust/kymostudio-core/pkg

      - name: Bundle extension
        working-directory: packages/vscode-extension
        run: npm run build   # esbuild -> dist/extension.js (inlines kymostudio)

      # Publish the current package.json version to the Visual Studio Marketplace.
      # Needs repo secret VSCE_PAT — a Marketplace (Manage) PAT for the
      # `kymostudio` publisher; vsce reads it from the VSCE_PAT env var.
      # Skipped (with a warning) until the secret is configured, so it never
      # red-fails the shared `v*` tag release before setup.
      # `|| grep "already exists"` makes the step idempotent: re-running the job
      # after a later step failed (e.g. the registry-wait below) must not red-fail
      # just because this exact version is already on the Marketplace.
      - name: Publish to VS Code Marketplace
        if: ${{ env.VSCE_PAT != '' }}
        working-directory: packages/vscode-extension
        run: |
          out=$(npx --yes @vscode/vsce publish --no-dependencies 2>&1) || {
            echo "$out"
            echo "$out" | grep -qi "already exists" \
              && { echo "::warning::This version is already on the VS Code Marketplace — treating as published."; exit 0; }
            exit 1
          }
          echo "$out"
      - name: Note if VSCE_PAT is missing
        if: ${{ env.VSCE_PAT == '' }}
        run: echo "::warning::VSCE_PAT secret not set — skipped VS Code Marketplace publish. Add it in Settings → Secrets and variables → Actions."

      # Optional mirror to Open VSX (VSCodium / Cursor / Gitpod). Runs only when
      # an OVSX_PAT secret (open-vsx.org, free, no Azure) is configured.
      - name: Publish to Open VSX
        if: ${{ env.OVSX_PAT != '' }}
        working-directory: packages/vscode-extension
        run: |
          out=$(npx --yes ovsx publish --no-dependencies -p "$OVSX_PAT" 2>&1) || {
            echo "$out"
            echo "$out" | grep -qi "already exists" \
              && { echo "::warning::This version is already on Open VSX — treating as published."; exit 0; }
            exit 1
          }
          echo "$out"

      # A successful `vsce`/`ovsx publish` only means the upload was accepted —
      # both registries then index asynchronously before the new version is
      # actually served. Poll each registry that we published to until it serves
      # the package.json version, so the job isn't "done" until the release is
      # live. Caps at 10 min (indexing is usually well under a minute, but the
      # VS Code Marketplace occasionally lags several minutes). The publish has
      # already succeeded by this point, so a timeout here is pure indexing lag,
      # not a release failure — surface it as a warning and pass, rather than
      # red-failing an otherwise-successful release.
      - name: Wait for registries to serve the new version
        if: ${{ env.VSCE_PAT != '' || env.OVSX_PAT != '' }}
        working-directory: packages/vscode-extension
        run: |
          set -u
          PUBLISHER=$(node -p "require('./package.json').publisher")
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          ID="$PUBLISHER.$NAME"
          echo "Waiting up to 10 min for $ID@$VERSION to be served by registries…"

          ovsx_version() {
            curl -sf "https://open-vsx.org/api/$PUBLISHER/$NAME/latest" 2>/dev/null \
              | python3 -c "import sys,json;print(json.load(sys.stdin).get('version',''))" 2>/dev/null || true
          }
          mp_version() {
            curl -sf "https://marketplace.visualstudio.com/_apis/public/gallery/extensionquery" \
              -H "Content-Type: application/json" \
              -H "Accept: application/json;api-version=7.2-preview.1" \
              -d "{\"filters\":[{\"criteria\":[{\"filterType\":7,\"value\":\"$ID\"}]}],\"flags\":914}" 2>/dev/null \
              | python3 -c "import sys,json;e=json.load(sys.stdin)['results'][0]['extensions'];print(e[0]['versions'][0]['version'] if e else '')" 2>/dev/null || true
          }

          need_mp=false; need_ovsx=false
          [ -n "${VSCE_PAT:-}" ] && need_mp=true
          [ -n "${OVSX_PAT:-}" ] && need_ovsx=true

          deadline=$(( $(date +%s) + 600 ))
          while :; do
            mp_ok=true; ovsx_ok=true
            if $need_mp;   then v=$(mp_version);   echo "  Marketplace: ${v:-<none>}"; [ "$v" = "$VERSION" ] || mp_ok=false; fi
            if $need_ovsx; then v=$(ovsx_version); echo "  Open VSX:    ${v:-<none>}"; [ "$v" = "$VERSION" ] || ovsx_ok=false; fi
            if $mp_ok && $ovsx_ok; then echo "✓ All target registries now serve $VERSION"; exit 0; fi
            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "::warning::Timed out after 10 min waiting for registries to serve $VERSION. The publish itself succeeded; this is registry indexing lag and the new version should appear shortly."
              exit 0
            fi
            sleep 15
          done
