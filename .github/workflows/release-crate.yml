name: Release kymostudio crates

on:
  push:
    tags:
      - 'v*'  # Trigger on tags like v0.1.0 (shared lockstep tag)
  workflow_dispatch:

# Two crates ship from packages/rust/:
#   • kymostudio-core — the resvg engine + Python (pyo3) / wasm bindings.
#     Publishes to crates.io, PyPI, and npm (each via Trusted Publishing OIDC;
#     only npm uses a stored token). Builds from packages/rust/kymostudio-core/.
#   • kymostudio — the `kymo` CLI (thin front-end over the core). Publishes to
#     crates.io only, AFTER the core (it depends on the just-published version).
# Most jobs default to the core dir; the CLI job overrides working-directory.
defaults:
  run:
    working-directory: packages/rust/kymostudio-core

env:
  # Opt JS actions into Node 24 ahead of GitHub's 2026-06-16 forced switch —
  # silences the Node 20 deprecation warnings (some pinned actions have no
  # Node24-native release yet).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verify-version:
    name: Verify Version
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v5
      - name: Verify tag matches both Cargo.toml versions
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          CORE_VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          CLI_VERSION=$(grep '^version = ' ../kymostudio/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "Tag version:                  $TAG_VERSION"
          echo "kymostudio-core Cargo.toml:   $CORE_VERSION"
          echo "kymostudio (CLI) Cargo.toml:  $CLI_VERSION"
          if [ "$TAG_VERSION" != "$CORE_VERSION" ]; then
            echo "ERROR: Tag ($TAG_VERSION) != kymostudio-core version ($CORE_VERSION)"
            exit 1
          fi
          if [ "$TAG_VERSION" != "$CLI_VERSION" ]; then
            echo "ERROR: Tag ($TAG_VERSION) != kymostudio (CLI) version ($CLI_VERSION)"
            exit 1
          fi
          echo "✓ Versions match"

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Run core test suite
        run: cargo test
      - name: Run CLI crate test suite
        run: cargo test --manifest-path ../kymostudio/Cargo.toml

  # ── Build Python wheels across platforms (abi3 → one wheel per platform) ──
  wheels:
    name: Wheel (${{ matrix.platform.runner }} / ${{ matrix.platform.target }})
    needs: [verify-version, test]
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { runner: ubuntu-latest,  target: x86_64 }
          - { runner: ubuntu-latest,  target: aarch64 }
          - { runner: windows-latest,  target: x64 }
          # macos-13 (Intel) runners were retired by GitHub on 2025-12-08, so a
          # macos-13 job queues forever. Match linebender/resvg's CI: arm64 on
          # macos-latest, Intel on the replacement `macos-15-intel` label.
          - { runner: macos-latest,    target: aarch64 }
          - { runner: macos-15-intel,  target: x86_64 }
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: packages/rust/kymostudio-core
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          sccache: 'true'
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.platform.runner }}-${{ matrix.platform.target }}
          path: packages/rust/kymostudio-core/dist/*.whl

  sdist:
    name: sdist
    needs: [verify-version, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          working-directory: packages/rust/kymostudio-core
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: dist-sdist
          path: packages/rust/kymostudio-core/dist/*.tar.gz

  # ── Publish to crates.io (OIDC Trusted Publishing — no token) ──
  publish-crate:
    name: Publish to crates.io
    needs: [verify-version, test]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Authenticate to crates.io (OIDC)
        uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - name: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          if out=$(cargo publish 2>&1); then echo "$out"; exit 0; fi
          echo "$out"
          echo "$out" | grep -qi "already exists" && { echo "::warning::kymostudio-core already on crates.io — treating as published."; exit 0; }
          exit 1

  # ── Publish the `kymo` CLI crate to crates.io (after the core) ──
  # `cargo install kymostudio` then provides the `kymo` binary. The CLI depends
  # on kymostudio-core via a caret-to-MINOR range (`version = "0.3"`, see the
  # dependency convention in docs/RELEASING.md), so on a PATCH release the dep already
  # resolves against a previously-published core and `cargo publish` succeeds at
  # once. The retry only matters on a MINOR bump, when the floor points at the
  # core version this same run just published — then it covers crates.io's
  # sparse-index lag. `already exists` is treated as success so re-runs are
  # idempotent. (First publish of a brand-new crate name must be done once
  # manually with a token to claim it + configure Trusted Publishing — already
  # done for `kymostudio`; subsequent runs use OIDC below.)
  publish-cli:
    name: Publish kymo CLI to crates.io
    needs: [publish-crate]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: packages/rust/kymostudio
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Authenticate to crates.io (OIDC)
        uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - name: cargo publish (retry for minor-bump index lag; idempotent)
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          for i in $(seq 1 20); do
            if out=$(cargo publish 2>&1); then echo "$out"; echo "✓ published kymostudio"; exit 0; fi
            echo "$out"
            echo "$out" | grep -qi "already exists" && { echo "::warning::kymostudio already on crates.io — treating as published."; exit 0; }
            echo "attempt $i: publish failed (core may not be indexed yet); sleeping 30s…"
            sleep 30
          done
          echo "::error::cargo publish (kymostudio) failed after retries"
          exit 1

  # ── Publish to PyPI (OIDC Trusted Publishing — no token) ──
  publish-pypi:
    name: Publish to PyPI
    needs: [wheels, sdist]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Download all built distributions
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true   # idempotent: a re-run after this version is published is a no-op

  # ── Publish wasm package to npm (token + OIDC provenance) ──
  publish-npm:
    name: Publish to npm
    needs: [verify-version, test]
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # npm provenance attestation
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: 'latest'
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Build wasm package
        run: wasm-pack build --target web --out-dir pkg --out-name kymostudio_core -- --no-default-features --features wasm
      - name: Publish to npm (idempotent — already-published is treated as success)
        working-directory: packages/rust/kymostudio-core/pkg
        run: |
          if npm publish --provenance --access public 2>publish.err; then exit 0; fi
          if grep -qiE "cannot publish over|previously published|E409|403" publish.err; then
            echo "::warning::kymostudio-core already on npm — treating as published."; exit 0
          fi
          cat publish.err >&2; exit 1
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
