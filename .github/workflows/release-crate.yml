name: Release crate

on:
  push:
    tags:
      - 'v*'  # Trigger on tags like v0.1.0 (shared lockstep tag)
  workflow_dispatch:

# Rust core lives in packages/rust/kymostudio-core/ — run all shell steps there.
defaults:
  run:
    working-directory: packages/rust/kymostudio-core

jobs:
  verify-version:
    name: Verify Version
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v5
      - name: Verify tag matches Cargo.toml version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          CARGO_VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "Tag version:        $TAG_VERSION"
          echo "Cargo.toml version: $CARGO_VERSION"
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "ERROR: Tag version ($TAG_VERSION) does not match Cargo.toml version ($CARGO_VERSION)"
            exit 1
          fi
          echo "✓ Versions match"

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Run test suite
        run: cargo test

  publish:
    name: Publish to crates.io
    needs: [verify-version, test]
    runs-on: ubuntu-latest
    # Trusted Publishing (OIDC) — no CARGO_REGISTRY_TOKEN secret needed. The
    # publisher is configured for `kymostudio-core` at
    # https://crates.io/crates/kymostudio-core/settings (workflow: release-crate.yml).
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Authenticate to crates.io (OIDC)
        uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - name: cargo publish
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
