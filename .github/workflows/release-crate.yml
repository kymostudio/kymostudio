name: Release kymostudio-core

on:
  push:
    tags:
      - 'v*'  # Trigger on tags like v0.1.0 (shared lockstep tag)
  workflow_dispatch:

# The kymostudio-core crate + its Python/wasm bindings all build from
# packages/rust/kymostudio-core/. Publishes to crates.io, PyPI, and npm — each
# via that registry's Trusted Publishing (OIDC); only npm uses a stored token.
defaults:
  run:
    working-directory: packages/rust/kymostudio-core

jobs:
  verify-version:
    name: Verify Version
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v5
      - name: Verify tag matches Cargo.toml version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          CARGO_VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "Tag version:        $TAG_VERSION"
          echo "Cargo.toml version: $CARGO_VERSION"
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "ERROR: Tag version ($TAG_VERSION) does not match Cargo.toml version ($CARGO_VERSION)"
            exit 1
          fi
          echo "✓ Versions match"

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Run test suite
        run: cargo test

  # ── Build Python wheels across platforms (abi3 → one wheel per platform) ──
  wheels:
    name: Wheel (${{ matrix.platform.runner }} / ${{ matrix.platform.target }})
    needs: [verify-version, test]
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { runner: ubuntu-latest,  target: x86_64 }
          - { runner: ubuntu-latest,  target: aarch64 }
          - { runner: windows-latest,  target: x64 }
          # macos-13 (Intel) runners were retired by GitHub on 2025-12-08, so a
          # macos-13 job queues forever. Match linebender/resvg's CI: arm64 on
          # macos-latest, Intel on the replacement `macos-15-intel` label.
          - { runner: macos-latest,    target: aarch64 }
          - { runner: macos-15-intel,  target: x86_64 }
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: packages/rust/kymostudio-core
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          sccache: 'true'
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.platform.runner }}-${{ matrix.platform.target }}
          path: packages/rust/kymostudio-core/dist/*.whl

  sdist:
    name: sdist
    needs: [verify-version, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          working-directory: packages/rust/kymostudio-core
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: dist-sdist
          path: packages/rust/kymostudio-core/dist/*.tar.gz

  # ── Publish to crates.io (OIDC Trusted Publishing — no token) ──
  publish-crate:
    name: Publish to crates.io
    needs: [verify-version, test]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Authenticate to crates.io (OIDC)
        uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - name: cargo publish
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  # ── Publish to PyPI (OIDC Trusted Publishing — no token) ──
  publish-pypi:
    name: Publish to PyPI
    needs: [wheels, sdist]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Download all built distributions
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

  # ── Publish wasm package to npm (token + OIDC provenance) ──
  publish-npm:
    name: Publish to npm
    needs: [verify-version, test]
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # npm provenance attestation
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: 'latest'
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Build wasm package
        run: wasm-pack build --target web --out-dir pkg --out-name kymostudio_core -- --no-default-features --features wasm
      - name: Publish to npm
        working-directory: packages/rust/kymostudio-core/pkg
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
