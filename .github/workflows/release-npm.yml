name: Release kymo to npm

on:
  push:
    tags:
      - 'v*'  # Trigger on tags like v0.1.0
  workflow_dispatch:

# JS package lives in packages/js/ — run all shell steps there.
env:
  # Opt JS actions into Node 24 ahead of GitHub's 2026-06-16 forced switch —
  # silences the Node 20 deprecation warnings (some pinned actions have no
  # Node24-native release yet).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verify-version:
    name: Verify Version
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    defaults:
      run:
        working-directory: packages/js
    steps:
      - uses: actions/checkout@v6
      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "Tag version: $TAG_VERSION"
          echo "package.json version: $PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "ERROR: Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi
          echo "✓ Versions match"

  publish:
    name: Build and Publish to npm
    # On a tag push, gate on verify-version; on workflow_dispatch it is
    # skipped, so allow this job to run regardless of that result.
    needs: [verify-version]
    if: always() && (needs.verify-version.result == 'success' || needs.verify-version.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # for npm provenance attestation
      contents: read
    defaults:
      run:
        working-directory: packages/js
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      # The TS build imports `mermaidToKymoJson` (+ BPMN bindings) from the core's
      # type defs, so it must build against the local core — the published npm core
      # may lag this release (core + JS publish in parallel, no ordering). Build &
      # link the local wasm pkg before `npm run build`, mirroring test.yml.
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack
      - name: Build the local kymostudio-core wasm pkg (engine bindings)
        working-directory: packages/rust/kymostudio-core
        run: wasm-pack build --target web --out-dir pkg --out-name kymostudio_core -- --no-default-features --features wasm,pdf
      - name: Install deps
        run: npm ci
      - name: Link the locally-built core
        run: npm install --no-save ../rust/kymostudio-core/pkg
      - name: Build (TypeScript -> dist/)
        run: npm run build
      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
