name: Feature request
description: Suggest an idea or enhancement for kymo
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do that's hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: dropdown
    id: package
    attributes:
      label: Affected package
      multiple: true
      options:
        - python
        - js
        - vscode-extension
        - website
        - docs
    validations:
      required: false
