<svg height="196" id="container" width="1680" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1680 196" style="max-width: 1680px;" role="graphics-document document" aria-roledescription="gantt"><style>#container{font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:16px;fill:#333;}@keyframes edge-animation-frame{from{stroke-dashoffset:0;}}@keyframes dash{to{stroke-dashoffset:0;}}#container .edge-animation-slow{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 50s linear infinite;stroke-linecap:round;}#container .edge-animation-fast{stroke-dasharray:9,5!important;stroke-dashoffset:900;animation:dash 20s linear infinite;stroke-linecap:round;}#container .error-icon{fill:#552222;}#container .error-text{fill:#552222;stroke:#552222;}#container .edge-thickness-normal{stroke-width:1px;}#container .edge-thickness-thick{stroke-width:3.5px;}#container .edge-pattern-solid{stroke-dasharray:0;}#container .edge-thickness-invisible{stroke-width:0;fill:none;}#container .edge-pattern-dashed{stroke-dasharray:3;}#container .edge-pattern-dotted{stroke-dasharray:2;}#container .marker{fill:#333333;stroke:#333333;}#container .marker.cross{stroke:#333333;}#container svg{font-family:"trebuchet ms",verdana,arial,sans-serif;font-size:16px;}#container p{margin:0;}#container .mermaid-main-font{font-family:"trebuchet ms",verdana,arial,sans-serif;}#container .exclude-range{fill:#eeeeee;}#container .section{stroke:none;opacity:0.2;}#container .section0{fill:rgba(102, 102, 255, 0.49);}#container .section2{fill:#fff400;}#container .section1,#container .section3{fill:white;opacity:0.2;}#container .sectionTitle0{fill:#333;}#container .sectionTitle1{fill:#333;}#container .sectionTitle2{fill:#333;}#container .sectionTitle3{fill:#333;}#container .sectionTitle{text-anchor:start;font-family:"trebuchet ms",verdana,arial,sans-serif;}#container .grid .tick{stroke:lightgrey;opacity:0.8;shape-rendering:crispEdges;}#container .grid .tick text{font-family:"trebuchet ms",verdana,arial,sans-serif;fill:#333;}#container .grid path{stroke-width:0;}#container .today{fill:none;stroke:red;stroke-width:2px;}#container .task{stroke-width:2;}#container .taskText{text-anchor:middle;font-family:"trebuchet ms",verdana,arial,sans-serif;}#container .taskTextOutsideRight{fill:black;text-anchor:start;font-family:"trebuchet ms",verdana,arial,sans-serif;}#container .taskTextOutsideLeft{fill:black;text-anchor:end;}#container .task.clickable{cursor:pointer;}#container .taskText.clickable{cursor:pointer;fill:#003163!important;font-weight:bold;}#container .taskTextOutsideLeft.clickable{cursor:pointer;fill:#003163!important;font-weight:bold;}#container .taskTextOutsideRight.clickable{cursor:pointer;fill:#003163!important;font-weight:bold;}#container .taskText0,#container .taskText1,#container .taskText2,#container .taskText3{fill:white;}#container .task0,#container .task1,#container .task2,#container .task3{fill:#8a90dd;stroke:#534fbc;}#container .taskTextOutside0,#container .taskTextOutside2{fill:black;}#container .taskTextOutside1,#container .taskTextOutside3{fill:black;}#container .active0,#container .active1,#container .active2,#container .active3{fill:#bfc7ff;stroke:#534fbc;}#container .activeText0,#container .activeText1,#container .activeText2,#container .activeText3{fill:black!important;}#container .done0,#container .done1,#container .done2,#container .done3{stroke:grey;fill:lightgrey;stroke-width:2;}#container .doneText0,#container .doneText1,#container .doneText2,#container .doneText3{fill:black!important;}#container .doneText0.taskTextOutsideLeft,#container .doneText0.taskTextOutsideRight,#container .doneText1.taskTextOutsideLeft,#container .doneText1.taskTextOutsideRight,#container .doneText2.taskTextOutsideLeft,#container .doneText2.taskTextOutsideRight,#container .doneText3.taskTextOutsideLeft,#container .doneText3.taskTextOutsideRight{fill:black!important;}#container .crit0,#container .crit1,#container .crit2,#container .crit3{stroke:#ff8888;fill:red;stroke-width:2;}#container .activeCrit0,#container .activeCrit1,#container .activeCrit2,#container .activeCrit3{stroke:#ff8888;fill:#bfc7ff;stroke-width:2;}#container .doneCrit0,#container .doneCrit1,#container .doneCrit2,#container .doneCrit3{stroke:#ff8888;fill:lightgrey;stroke-width:2;cursor:pointer;shape-rendering:crispEdges;}#container .milestone{transform:rotate(45deg) scale(0.8,0.8);}#container .milestoneText{font-style:italic;}#container .doneCritText0,#container .doneCritText1,#container .doneCritText2,#container .doneCritText3{fill:black!important;}#container .doneCritText0.taskTextOutsideLeft,#container .doneCritText0.taskTextOutsideRight,#container .doneCritText1.taskTextOutsideLeft,#container .doneCritText1.taskTextOutsideRight,#container .doneCritText2.taskTextOutsideLeft,#container .doneCritText2.taskTextOutsideRight,#container .doneCritText3.taskTextOutsideLeft,#container .doneCritText3.taskTextOutsideRight{fill:black!important;}#container .vert{stroke:navy;}#container .vertText{font-size:15px;text-anchor:middle;fill:navy!important;}#container .activeCritText0,#container .activeCritText1,#container .activeCritText2,#container .activeCritText3{fill:black!important;}#container .titleText{text-anchor:middle;font-size:18px;fill:#333;font-family:"trebuchet ms",verdana,arial,sans-serif;}#container .node .neo-node{stroke:#9370DB;}#container [data-look="neo"].node rect,#container [data-look="neo"].cluster rect,#container [data-look="neo"].node polygon{stroke:#9370DB;filter:drop-shadow(1px 2px 2px rgba(185, 185, 185, 1));}#container [data-look="neo"].node path{stroke:#9370DB;stroke-width:1px;}#container [data-look="neo"].node .outer-path{filter:drop-shadow(1px 2px 2px rgba(185, 185, 185, 1));}#container [data-look="neo"].node .neo-line path{stroke:#9370DB;filter:none;}#container [data-look="neo"].node circle{stroke:#9370DB;filter:drop-shadow(1px 2px 2px rgba(185, 185, 185, 1));}#container [data-look="neo"].node circle .state-start{fill:#000000;}#container [data-look=